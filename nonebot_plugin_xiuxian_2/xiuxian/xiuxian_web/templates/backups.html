{% extends "base.html" %}
{% block content %}
<div class="card animate-in">
    <h2><i class="fas fa-archive"></i> 备份管理</h2>
    <p>统一管理数据库与插件备份，支持本地恢复、批量删除、云端同步、云端恢复与云端批量删除。</p>

    <div class="tab-nav">
        <button class="tab-link active" id="tab-btn-db" onclick="switchTab('db', this)">
            <i class="fas fa-database"></i> 数据库备份
        </button>
        <button class="tab-link" id="tab-btn-plugin" onclick="switchTab('plugin', this)">
            <i class="fas fa-cubes"></i> 插件备份
        </button>
    </div>

    <!-- ================= 数据库备份 ================= -->
    <div id="tab-db" class="tab-pane active">
        <div class="card" style="margin-top: 10px;">
            <h3><i class="fas fa-server"></i> 数据库备份 / 恢复</h3>
            <div class="form-actions">
                <button class="btn btn-success" onclick="manualDbBackup()">
                    <i class="fas fa-plus-circle"></i> 立即数据库备份
                </button>
                <button class="btn btn-info" onclick="loadDbBackups()">
                    <i class="fas fa-sync"></i> 刷新本地
                </button>
                <button class="btn btn-info" onclick="loadCloudDbBackups()">
                    <i class="fas fa-cloud"></i> 刷新云端
                </button>
            </div>

            <div class="info-item" style="margin-top: 15px;">
                <h4><i class="fas fa-check-square"></i> 恢复数据库选择（至少1个）</h4>
                <div class="db-select-grid">
                    <label><input type="checkbox" class="db-check" value="xiuxian" checked> xiuxian</label>
                    <label><input type="checkbox" class="db-check" value="xiuxian_impart" checked> xiuxian_impart</label>
                    <label><input type="checkbox" class="db-check" value="player" checked> player</label>
                    <label><input type="checkbox" class="db-check" value="trade" checked> trade</label>
                </div>
            </div>
        </div>

        <div class="backup-source-switch" data-source-switch="db">
            <button class="source-switch-btn active" type="button" onclick="switchBackupSource('db', 'local', this)">
                <i class="fas fa-hdd"></i> 本地
            </button>
            <button class="source-switch-btn" type="button" onclick="switchBackupSource('db', 'cloud', this)">
                <i class="fas fa-cloud"></i> 云端
            </button>
        </div>

        <div class="backup-source-grid" data-source-grid="db">
            <section class="backup-source-card mobile-active" data-source-scope="db" data-source-kind="local">
                <div class="backup-source-head">
                    <h3><i class="fas fa-hdd"></i> 本地数据库备份</h3>
                    <button class="btn btn-sm btn-info" type="button" onclick="loadDbBackups()">
                        <i class="fas fa-sync"></i> 刷新
                    </button>
                </div>
                <div id="db-backups-list"><div class="loading">加载中...</div></div>
            </section>

            <section class="backup-source-card cloud-source" data-source-scope="db" data-source-kind="cloud">
                <div class="backup-source-head">
                    <h3><i class="fas fa-cloud"></i> 云端数据库备份</h3>
                    <button class="btn btn-sm btn-info" type="button" onclick="loadCloudDbBackups()">
                        <i class="fas fa-sync"></i> 刷新
                    </button>
                </div>
                <div id="cloud-db-backups-list"><div class="loading">加载中...</div></div>
            </section>
        </div>
    </div>

    <!-- ================= 插件备份 ================= -->
    <div id="tab-plugin" class="tab-pane">
        <div class="card" style="margin-top: 10px;">
            <h3><i class="fas fa-box-open"></i> 插件备份 / 恢复</h3>
            <div class="form-actions">
                <button class="btn btn-success" onclick="manualPluginBackup()">
                    <i class="fas fa-plus-circle"></i> 立即插件备份
                </button>
                <button class="btn btn-info" onclick="loadPluginBackups()">
                    <i class="fas fa-sync"></i> 刷新本地
                </button>
                <button class="btn btn-info" onclick="loadCloudPluginBackups()">
                    <i class="fas fa-cloud"></i> 刷新云端
                </button>
            </div>
        </div>

        <div class="backup-source-switch" data-source-switch="plugin">
            <button class="source-switch-btn active" type="button" onclick="switchBackupSource('plugin', 'local', this)">
                <i class="fas fa-folder-open"></i> 本地
            </button>
            <button class="source-switch-btn" type="button" onclick="switchBackupSource('plugin', 'cloud', this)">
                <i class="fas fa-cloud-download-alt"></i> 云端
            </button>
        </div>

        <div class="backup-source-grid" data-source-grid="plugin">
            <section class="backup-source-card mobile-active" data-source-scope="plugin" data-source-kind="local">
                <div class="backup-source-head">
                    <h3><i class="fas fa-folder-open"></i> 本地插件备份</h3>
                    <button class="btn btn-sm btn-info" type="button" onclick="loadPluginBackups()">
                        <i class="fas fa-sync"></i> 刷新
                    </button>
                </div>
                <div id="plugin-backups-list"><div class="loading">加载中...</div></div>
            </section>

            <section class="backup-source-card cloud-source" data-source-scope="plugin" data-source-kind="cloud">
                <div class="backup-source-head">
                    <h3><i class="fas fa-cloud-download-alt"></i> 云端插件备份</h3>
                    <button class="btn btn-sm btn-info" type="button" onclick="loadCloudPluginBackups()">
                        <i class="fas fa-sync"></i> 刷新
                    </button>
                </div>
                <div id="cloud-plugin-backups-list"><div class="loading">加载中...</div></div>
            </section>
        </div>
    </div>
</div>
<div id="backup-toast-container" class="backup-toast-container" aria-live="polite" aria-atomic="false"></div>

<style>
.hidden { display: none; }

.db-select-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
    margin-top: 8px;
}
.db-select-grid label {
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 8px 10px;
    display: flex;
    gap: 8px;
    align-items: center;
    cursor: pointer;
}

.backups-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
}
.backup-source-switch {
    display: none;
}
.source-switch-btn {
    min-height: 40px;
    border: 1px solid var(--border-color);
    border-radius: 7px;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-weight: 600;
    cursor: pointer;
}
.source-switch-btn.active {
    background: var(--accent-color);
    border-color: var(--accent-color);
    color: #fff;
}
.backup-source-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 12px;
    margin-top: 12px;
    align-items: start;
}
.backup-source-card {
    min-width: 0;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    background: var(--bg-secondary);
    padding: 12px;
    max-height: min(68vh, 760px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-color) transparent;
}
.backup-source-card::-webkit-scrollbar {
    width: 6px;
}
.backup-source-card::-webkit-scrollbar-thumb {
    background: color-mix(in srgb, var(--border-color) 70%, transparent);
    border-radius: 999px;
}
.backup-source-card.cloud-source {
    background: linear-gradient(to right, rgba(23, 162, 184, 0.05), transparent), var(--bg-secondary);
}
.backup-source-head {
    position: sticky;
    top: -12px;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin: -12px -12px 12px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-color);
    background: color-mix(in srgb, var(--bg-secondary) 94%, transparent);
    backdrop-filter: blur(8px);
}
.backup-source-head h3 {
    margin: 0;
    font-size: 1.04rem;
}
.backup-bulk-actions {
    position: sticky;
    top: 40px;
    z-index: 1;
    margin: 0 0 10px;
    padding: 8px 0 10px;
    border-bottom: 1px solid var(--border-color);
    background: color-mix(in srgb, var(--bg-secondary) 94%, transparent);
    backdrop-filter: blur(8px);
}
.backup-card.cloud-item {
    border-left: 4px solid var(--info-color);
    background: linear-gradient(to right, rgba(23, 162, 184, 0.05), transparent);
}
.backup-row-head {
    display: flex;
    gap: 8px;
    align-items: flex-start;
}
.backup-row-head strong {
    word-break: break-all;
}
.backup-detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.9em;
    margin-bottom: 6px;
}
.backup-detail-row strong { color: var(--text-primary); }

/* 进度条 */
.progress-head {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 0.92rem;
    color: var(--text-secondary);
}
.progress-bar-outer {
    width: 100%;
    height: 10px;
    border-radius: 999px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    overflow: hidden;
}
.progress-bar-inner {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent-color), var(--info-color));
    transition: width 0.25s ease;
}

.backup-toast-container {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 2000;
    width: min(420px, calc(100vw - 32px));
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}
.backup-toast {
    display: grid;
    grid-template-columns: 24px minmax(0, 1fr) 28px;
    gap: 10px;
    align-items: start;
    padding: 12px;
    border: 1px solid var(--border-color);
    border-left: 4px solid var(--info-color);
    border-radius: 8px;
    background: color-mix(in srgb, var(--bg-secondary) 96%, transparent);
    color: var(--text-primary);
    box-shadow: 0 14px 32px var(--shadow-color);
    backdrop-filter: blur(12px);
    pointer-events: auto;
    animation: toastIn 0.18s ease-out;
}
.backup-toast.toast-success { border-left-color: var(--success-color); }
.backup-toast.toast-error { border-left-color: var(--danger-color); }
.backup-toast.toast-progress { border-left-color: var(--accent-color); }
.toast-icon {
    display: flex;
    justify-content: center;
    color: var(--info-color);
    padding-top: 2px;
}
.toast-success .toast-icon { color: var(--success-color); }
.toast-error .toast-icon { color: var(--danger-color); }
.toast-content {
    min-width: 0;
}
.toast-title {
    display: block;
    margin-bottom: 2px;
    font-size: 0.92rem;
}
.toast-message {
    color: var(--text-secondary);
    white-space: pre-line;
    word-break: break-word;
    line-height: 1.45;
}
.toast-close {
    width: 28px;
    height: 28px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
}
.toast-close:hover {
    background: var(--bg-primary);
    color: var(--text-primary);
}
.backup-toast.is-leaving {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.16s ease, transform 0.16s ease;
}
@keyframes toastIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
    .backup-source-switch {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin: 12px 0;
        padding: 8px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: color-mix(in srgb, var(--accent-color) 5%, var(--bg-primary));
    }
    .backup-source-grid { grid-template-columns: 1fr; }
    .backup-source-card { display: none; }
    .backup-source-card.mobile-active { display: block; }
    .backup-source-card { max-height: none; }
    .backup-bulk-actions { position: static; }
    .backups-container { grid-template-columns: 1fr; }
    .backup-toast-container {
        right: 12px;
        bottom: 12px;
        width: calc(100vw - 24px);
    }
}
</style>

<script>
/* ====================== 勾选缓存 ====================== */
const selectedLocalPluginBackups = new Set();
const selectedCloudPluginBackups = new Set();
const selectedLocalDbBackups = new Set();
const selectedCloudDbBackups = new Set();

/* ====================== UI 工具 ====================== */
let toastSeq = 0;
let statusToastId = null;
let progressToastId = null;
const toastTimers = new Map();

function getToastIcon(type) {
    if (type === 'success') return 'fas fa-check-circle';
    if (type === 'error') return 'fas fa-exclamation-circle';
    if (type === 'progress') return 'fas fa-spinner fa-spin';
    return 'fas fa-info-circle';
}

function dismissToast(id, immediate=false) {
    const toast = document.querySelector(`[data-toast-id="${id}"]`);
    if (!toast) return;
    const timer = toastTimers.get(id);
    if (timer) clearTimeout(timer);
    toastTimers.delete(id);
    if (immediate) {
        toast.remove();
        return;
    }
    toast.classList.add('is-leaving');
    setTimeout(() => toast.remove(), 180);
}

function showToast(message, type='info', options={}) {
    if (!message) return null;
    const container = document.getElementById('backup-toast-container');
    if (!container) {
        alert(message);
        return null;
    }

    const id = `backup-toast-${++toastSeq}`;
    const toast = document.createElement('div');
    toast.className = `backup-toast toast-${type}`;
    toast.dataset.toastId = id;

    const icon = document.createElement('div');
    icon.className = 'toast-icon';
    icon.innerHTML = `<i class="${getToastIcon(type)}"></i>`;

    const content = document.createElement('div');
    content.className = 'toast-content';
    if (options.title) {
        const title = document.createElement('strong');
        title.className = 'toast-title';
        title.textContent = options.title;
        content.appendChild(title);
    }
    const body = document.createElement('div');
    body.className = 'toast-message';
    body.textContent = message;
    content.appendChild(body);

    const close = document.createElement('button');
    close.className = 'toast-close';
    close.type = 'button';
    close.setAttribute('aria-label', '关闭提示');
    close.innerHTML = '<i class="fas fa-times"></i>';
    close.onclick = () => dismissToast(id);

    toast.appendChild(icon);
    toast.appendChild(content);
    toast.appendChild(close);
    container.appendChild(toast);

    if (!options.persistent) {
        const duration = options.duration ?? (type === 'error' ? 7000 : 3800);
        toastTimers.set(id, setTimeout(() => dismissToast(id), duration));
    }
    return id;
}

function setStatus(msg, type='info') {
    if (!msg) {
        if (statusToastId) dismissToast(statusToastId);
        statusToastId = null;
        return;
    }
    if (statusToastId) dismissToast(statusToastId, true);
    statusToastId = showToast(msg, type, {
        persistent: type === 'info',
        duration: type === 'error' ? 7500 : 4200
    });
}

function switchTab(type, el){
    document.querySelectorAll('.tab-link').forEach(x=>x.classList.remove('active'));
    if (el) el.classList.add('active');
    document.getElementById('tab-db').classList.remove('active');
    document.getElementById('tab-plugin').classList.remove('active');
    document.getElementById('tab-'+type).classList.add('active');
}

function switchBackupSource(scope, source, el) {
    document.querySelectorAll(`[data-source-switch="${scope}"] .source-switch-btn`).forEach(btn => {
        btn.classList.remove('active');
    });
    if (el) el.classList.add('active');

    document.querySelectorAll(`[data-source-scope="${scope}"]`).forEach(card => {
        card.classList.toggle('mobile-active', card.dataset.sourceKind === source);
    });
}

function getSelectedDbs(){
    return Array.from(document.querySelectorAll('.db-check:checked')).map(x=>x.value);
}

/* ====================== 吐司进度 ====================== */
function showBatchProgress(title='处理中...') {
    if (progressToastId) dismissToast(progressToastId, true);
    progressToastId = showToast('批量任务进度', 'progress', {persistent: true, title});
    const toast = document.querySelector(`[data-toast-id="${progressToastId}"] .toast-content`);
    if (!toast) return;
    toast.innerHTML = `
        <strong class="toast-title" id="batch-progress-title">${title}</strong>
        <div class="progress-head">
            <span>批量任务进度</span>
            <span id="batch-progress-text">0 / 0</span>
        </div>
        <div class="progress-bar-outer">
            <div id="batch-progress-bar" class="progress-bar-inner" style="width: 0%;"></div>
        </div>
    `;
}
function updateBatchProgress(current, total, title=null) {
    if (!progressToastId) return;
    if (title) document.getElementById('batch-progress-title').innerText = title;
    const percent = total > 0 ? Math.round((current / total) * 100) : 0;
    document.getElementById('batch-progress-text').innerText = `${current} / ${total}`;
    document.getElementById('batch-progress-bar').style.width = `${percent}%`;
}
function hideBatchProgress(delay=600) {
    const id = progressToastId;
    progressToastId = null;
    setTimeout(() => {
        if (id) dismissToast(id);
    }, delay);
}

/* ====================== 勾选工具（4组） ====================== */
function getGroupConfig(group) {
    switch(group) {
        case 'local-plugin': return { cls: '.plugin-local-check', setRef: selectedLocalPluginBackups };
        case 'cloud-plugin': return { cls: '.plugin-cloud-check', setRef: selectedCloudPluginBackups };
        case 'local-db': return { cls: '.db-local-check', setRef: selectedLocalDbBackups };
        case 'cloud-db': return { cls: '.db-cloud-check', setRef: selectedCloudDbBackups };
        default: return null;
    }
}

function updateSelectionCache(checkbox, group) {
    const cfg = getGroupConfig(group);
    if (!cfg) return;
    if (checkbox.checked) cfg.setRef.add(checkbox.value);
    else cfg.setRef.delete(checkbox.value);
}

function reapplySelections(group) {
    const cfg = getGroupConfig(group);
    if (!cfg) return;
    document.querySelectorAll(cfg.cls).forEach(cb => {
        cb.checked = cfg.setRef.has(cb.value);
    });
}

function toggleSelectAll(group, checked) {
    const cfg = getGroupConfig(group);
    if (!cfg) return;
    document.querySelectorAll(cfg.cls).forEach(cb => {
        cb.checked = checked;
        updateSelectionCache(cb, group);
    });
}

function invertSelection(group) {
    const cfg = getGroupConfig(group);
    if (!cfg) return;
    document.querySelectorAll(cfg.cls).forEach(cb => {
        cb.checked = !cb.checked;
        updateSelectionCache(cb, group);
    });
}

/* ====================== 数据库 ====================== */
async function manualDbBackup(){
    setStatus('正在执行数据库备份...');
    const res = await fetch('/manual_db_backup',{method:'POST'});
    const data = await res.json();
    if (data.success) {
        setStatus(data.message, 'success');
        loadDbBackups();
    } else setStatus(data.error || '备份失败', 'error');
}

async function loadDbBackups(){
    const el = document.getElementById('db-backups-list');
    el.innerHTML = '<div class="loading">加载中...</div>';
    const res = await fetch('/get_db_backups');
    const data = await res.json();
    if(!data.success){ el.innerHTML = `<div class="error">加载失败: ${data.error}</div>`; return; }
    if(!data.backups.length){ el.innerHTML = '<div class="loading">暂无本地数据库备份</div>'; return; }

    el.innerHTML = `
        <div class="form-actions backup-bulk-actions">
            <button class="btn btn-secondary btn-sm" onclick="toggleSelectAll('local-db', true)">全选</button>
            <button class="btn btn-secondary btn-sm" onclick="toggleSelectAll('local-db', false)">全不选</button>
            <button class="btn btn-info btn-sm" onclick="invertSelection('local-db')">反选</button>
            <button class="btn btn-danger btn-sm" onclick="batchDeleteLocalDbBackups()">
                <i class="fas fa-trash-alt"></i> 批量删除
            </button>
        </div>
        <div class="backups-container">
            ${data.backups.map(b=>`
                <div class="backup-card">
                    <div class="backup-row-head">
                        <input type="checkbox" class="db-local-check" value="${b.filename}"
                               onchange="updateSelectionCache(this, 'local-db')">
                        <strong><i class="fas fa-file-archive"></i> ${b.filename}</strong>
                    </div>
                    <div class="backup-details" style="margin-top:10px;">
                        <div class="backup-detail-row"><strong>大小:</strong><span>${(b.size/1048576).toFixed(2)} MB</span></div>
                        <div class="backup-detail-row"><strong>创建时间:</strong><span>${new Date(b.created_at).toLocaleString()}</span></div>
                        <div class="backup-detail-row"><strong>类型:</strong><span>SQLite</span></div>
                    </div>
                    <div class="backup-actions">
                        <button class="btn btn-warning btn-sm" onclick="restoreDbBackup('${b.filename}')">
                            <i class="fas fa-undo"></i> 恢复
                        </button>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
    reapplySelections('local-db');
}

async function restoreDbBackup(filename){
    const selected = getSelectedDbs();
    if(selected.length < 1){ setStatus('最少选择1个数据库', 'error'); return; }
    if(!confirm(`确认恢复 ${filename} ?\n将恢复: ${selected.join(', ')}`)) return;

    setStatus('正在恢复数据库，请稍候...');
    const res = await fetch('/restore_db_backup',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({backup_filename:filename, selected_dbs:selected})
    });
    const data = await res.json();
    if (data.success) setStatus(data.message, 'success');
    else setStatus(data.error || '恢复失败', 'error');
}

async function loadCloudDbBackups(){
    const el = document.getElementById('cloud-db-backups-list');
    el.innerHTML = '<div class="loading">加载中...</div>';
    const res = await fetch('/get_cloud_db_backups');
    const data = await res.json();
    if(!data.success){ el.innerHTML = `<div class="error">加载失败: ${data.error}</div>`; return; }
    if(!data.backups.length){ el.innerHTML = '<div class="loading">暂无云端数据库备份</div>'; return; }

    el.innerHTML = `
        <div class="form-actions backup-bulk-actions">
            <button class="btn btn-secondary btn-sm" onclick="toggleSelectAll('cloud-db', true)">全选</button>
            <button class="btn btn-secondary btn-sm" onclick="toggleSelectAll('cloud-db', false)">全不选</button>
            <button class="btn btn-info btn-sm" onclick="invertSelection('cloud-db')">反选</button>

async function syncCloudDb(filename, overwrite=false){
    const res = await fetch('/sync_cloud_db_backup',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({filename, overwrite})
    });
    const data = await res.json();
    if(data.success){ setStatus(data.message, 'success'); loadDbBackups(); return; }
    if(data.error === 'FILE_EXISTS'){
        if(confirm(data.message)) return syncCloudDb(filename, true);
    } else setStatus(data.error || '同步失败', 'error');
}

async function cloudRestoreDb(filename){
    const selected = getSelectedDbs();
    if(selected.length < 1){ setStatus('最少选择1个数据库', 'error'); return; }
    if(!confirm(`确认云端恢复 ${filename} ?\n将恢复: ${selected.join(', ')}`)) return;

    setStatus('正在执行云端恢复...');
    const res = await fetch('/cloud_restore_db_backup',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({filename, selected_dbs:selected})
    });
    const data = await res.json();
    if (data.success) setStatus(data.message, 'success');
    else setStatus(data.error || '云恢复失败', 'error');
}

/* ===== 数据库批量 ===== */
async function batchDeleteLocalDbBackups() {
    const filenames = Array.from(selectedLocalDbBackups);
    if (!filenames.length) { setStatus('请先勾选要删除的本地数据库备份', 'error'); return; }
    if (!confirm(`确认删除选中的 ${filenames.length} 个数据库备份吗？`)) return;

    showBatchProgress('正在批量删除数据库备份...');
    updateBatchProgress(0, filenames.length);

    try {
        const res = await fetch('/batch_delete_db_backups', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ filenames })
        });
        const data = await res.json();
        updateBatchProgress(filenames.length, filenames.length);

        if (!data.success) return setStatus(data.error || '批量删除失败', 'error');

        (data.deleted || []).forEach(name => selectedLocalDbBackups.delete(name));
        setStatus(data.message || '批量删除完成', 'success');
        await loadDbBackups();
    } catch (e) {
        setStatus('批量删除请求失败: ' + e, 'error');
    } finally {
        hideBatchProgress();
    }
}

async function batchSyncCloudDbBackups(overwrite=false) {
    const filenames = Array.from(selectedCloudDbBackups);
    if (!filenames.length) { setStatus('请先勾选要同步的云端数据库备份', 'error'); return; }

            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ filenames, overwrite })

        const data = await res.json();
        updateBatchProgress(filenames.length, filenames.length);

        if (!data.success) return setStatus(data.error || '批量同步失败', 'error');

        if ((data.exists || []).length > 0 && !overwrite) {
            const ok = confirm(`有 ${data.exists.length} 个文件本地已存在，是否覆盖同步？`);

                hideBatchProgress(100);

async function manualPluginBackup(){

    el.innerHTML = `

            <button class="btn btn-secondary btn-sm" onclick="toggleSelectAll('local-plugin', true)">全选</button>
