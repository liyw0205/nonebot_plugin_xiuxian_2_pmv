{% extends "base.html" %}

{% block content %}
<section class="page-hero">
    <div>
        <p class="page-kicker">Row Editor</p>
        <h1 class="page-title">编辑 {{ table_info.name }}</h1>
        <p class="page-subtitle">{{ table_name }} 记录编辑，主键字段只读。</p>
    </div>
    <div class="hero-actions">
        <button type="button" onclick="exportRowData()" class="btn btn-secondary">
            <i class="fas fa-download"></i> 导出
        </button>
        <button type="button" onclick="triggerFileInput()" class="btn btn-secondary">
            <i class="fas fa-upload"></i> 导入
        </button>
        <a href="{{ url_for('table_view', table_name=table_name) }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> 返回
        </a>
    </div>
</section>

<section class="card">
    <form id="editForm" method="post">
        <div class="field-grid">
            {% for field in table_info.fields %}
                <div class="form-group">
                    <label for="{{ field }}">
                        {{ field }}
                        {% if field in primary_key_fields %}<span class="status-pill"><i class="fas fa-key"></i> 主键</span>{% endif %}
                    </label>
                    <input
                        type="text"
                        id="{{ field }}"
                        name="{{ field }}"
                        value="{{ row_data[field] }}"
                        {% if field in primary_key_fields %}readonly{% endif %}
                    >
                </div>
            {% endfor %}
        </div>

        <div class="form-actions">
            <button type="button" onclick="submitForm('update')" class="btn btn-success">
                <i class="fas fa-save"></i> 保存
            </button>
            <button type="button" onclick="confirmDelete()" class="btn btn-danger">
                <i class="fas fa-trash"></i> 删除
            </button>
            <a href="{{ url_for('table_view', table_name=table_name) }}" class="btn btn-secondary">
                取消
            </a>
        </div>

        <input type="hidden" name="action" id="action" value="">
        <input type="file" id="importFile" accept=".json" hidden>
    </form>
</section>

<script>
function submitForm(action) {
    document.getElementById('action').value = action;
    const formData = new FormData(document.getElementById('editForm'));
    let url = "{{ url_for('row_edit', table_name=table_name, row_id=request.view_args.row_id) }}";

    {% if is_composite_key %}
    const compositeKey = {{ primary_key_fields|tojson }}.map(field => {
        return document.getElementById(field).value;
    }).join('_');
    url = url.replace('{{ request.view_args.row_id }}', compositeKey);
    {% endif %}

    fetch(url, {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert(data.message);
            window.XiuxianWeb?.invalidatePageCache(url => url.pathname === '/' || url.pathname === '/database');
            window.XiuxianWeb?.startProgress();
            window.location.href = "{{ url_for('table_view', table_name=table_name) }}";
        } else {
            alert('错误：' + data.error);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('发生错误');
    });
}

function confirmDelete() {
    if (confirm('确定要删除这条记录吗？此操作不可撤销。')) {
        submitForm('delete');
    }
}

function exportRowData() {
    const jsonData = {};
    const primaryKeyFields = {{ primary_key_fields|tojson }};
    const primaryKeyValues = primaryKeyFields.map(field => document.getElementById(field).value);

    {% for field in table_info.fields %}
        {% if field not in primary_key_fields %}
            jsonData['{{ field }}'] = document.getElementById('{{ field }}').value;
        {% endif %}
    {% endfor %}

    const timestamp = new Date().getTime();
    const filename = primaryKeyValues.length > 0 && primaryKeyValues.every(Boolean)
        ? '{{ table_name }}_' + primaryKeyValues.join('_') + '_' + timestamp + '.json'
        : '{{ table_name }}_export_' + timestamp + '.json';

    const blob = new Blob([JSON.stringify(jsonData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}

function triggerFileInput() {
    document.getElementById('importFile').click();
}

document.getElementById('importFile').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const importedData = JSON.parse(e.target.result);
            const form = document.getElementById('editForm');
            for (const [key, value] of Object.entries(importedData)) {
                const input = form.elements[key];
                if (input && !input.readOnly) {
                    input.value = value;
                }
            }
            alert('数据已成功导入');
        } catch (error) {
            alert('导入失败：' + error.message);
        }
    };
    reader.readAsText(file);
});
</script>
{% endblock %}
