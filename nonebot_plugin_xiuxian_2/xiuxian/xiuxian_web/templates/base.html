<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修仙管理面板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> {# 链接到新的外部 CSS 文件 #}
</head>

<body>
    <div id="particles-js"></div>
    
    <header>
        <a href="{{ url_for('home') }}" class="logo"> {# Make logo clickable to home #}
            <div class="logo-icon">
                <i class="fas fa-mountain"></i>
            </div>
            <div class="logo-text">修仙管理面板</div>
        </a>
        
        <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </button>
        
        <nav id="mainNav">
            <ul>
                <li><a href="{{ url_for('home') }}" {% if is_active('home') %}class="active"{% endif %}><i class="fas fa-home"></i> <span>首页</span></a></li>
                <li><a href="{{ url_for('database') }}" {% if is_active(['database', 'table_view', 'row_edit']) %}class="active"{% endif %}><i class="fas fa-database"></i> <span>数据库管理</span></a></li>
                <li><a href="{{ url_for('commands') }}" {% if is_active('commands') %}class="active"{% endif %}><i class="fas fa-terminal"></i> <span>管理员指令</span></a></li>
                <li><a href="{{ url_for('config_management') }}" {% if is_active('config_management') %}class="active"{% endif %}><i class="fas fa-cog"></i> <span>配置管理</span></a></li>
                <li><a href="{{ url_for('update') }}" {% if is_active('update') %}class="active"{% endif %}><i class="fas fa-sync-alt"></i> <span>检测更新</span></a></li>
                <li><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> <span>退出</span></a></li>
            </ul>
            
            {# Theme/Settings Dropdown #}
            <div class="settings-dropdown">
                <button class="settings-button" id="settingsButton">
                    <i class="fas fa-palette"></i> 主题设置 <i class="fas fa-caret-down"></i>
                </button>
                <div class="dropdown-content" id="settingsDropdownContent">
                    <label>
                        <input type="radio" name="theme" value="light" checked>
                        <i class="fas fa-sun"></i> 浅色模式
                    </label>
                    <label>
                        <input type="radio" name="theme" value="dark">
                        <i class="fas fa-moon"></i> 深色模式
                    </label>
                    <label>
                        <input type="radio" name="theme" value="vibrant">
                        <i class="fas fa-paint-roller"></i> 活力模式
                    </label>
                    <hr>
                    <div class="color-picker-group">
                        <label for="customAccentColorInput"><i class="fas fa-fill-drip"></i> 自定义强调色:</label>
                        <input type="color" id="customAccentColorInput" value="#007bff">
                    </div>
                </div>
            </div>
        </nav>
    </header>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // --- Theme Switching & Custom Color Logic ---
        const body = document.body;
        const themeRadios = document.querySelectorAll('input[name="theme"]');
        const customAccentColorInput = document.getElementById('customAccentColorInput');
        const settingsButton = document.getElementById('settingsButton');
        const settingsDropdownContent = document.getElementById('settingsDropdownContent');

        function applyTheme(themeName) {
            body.dataset.theme = themeName;
            localStorage.setItem('theme', themeName);
            // If a custom color is active, make sure it's applied
            if (localStorage.getItem('customAccentColor')) {
                applyCustomAccentColor(localStorage.getItem('customAccentColor'));
            } else {
                body.removeAttribute('data-custom-accent-color');
                body.style.removeProperty('--custom-accent-color');
            }
        }

        function applyCustomAccentColor(color) {
            body.dataset.customAccentColor = 'true'; // Activate custom color override
            body.style.setProperty('--custom-accent-color', color);
            localStorage.setItem('customAccentColor', color);
            // Ensure a theme is active (e.g., light if none selected)
            if (!localStorage.getItem('theme')) {
                applyTheme('light');
            }
        }

        // Initialize theme on page load
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const savedCustomColor = localStorage.getItem('customAccentColor');

            // Apply saved theme
            applyTheme(savedTheme);
            document.querySelector(`input[name="theme"][value="${savedTheme}"]`).checked = true;

            // Apply saved custom color
            if (savedCustomColor) {
                customAccentColorInput.value = savedCustomColor;
                applyCustomAccentColor(savedCustomColor);
            }
        });

        // Event listeners for theme radios
        themeRadios.forEach(radio => {
            radio.addEventListener('change', () => {
                applyTheme(radio.value);
                // When switching to a preset theme, disable custom color
                body.removeAttribute('data-custom-accent-color');
                body.style.removeProperty('--custom-accent-color');
                localStorage.removeItem('customAccentColor'); // Clear custom color from storage
            });
        });

        // Event listener for custom accent color picker
        customAccentColorInput.addEventListener('input', (event) => {
            applyCustomAccentColor(event.target.value);
            // Uncheck preset themes when custom color is picked
            themeRadios.forEach(radio => radio.checked = false);
        });

        // Toggle settings dropdown
        settingsButton.addEventListener('click', (event) => {
            settingsDropdownContent.classList.toggle('show');
            event.stopPropagation(); // Prevent document click from closing it immediately
        });

        // Close dropdown if clicked outside
        document.addEventListener('click', (event) => {
            if (!settingsDropdownContent.contains(event.target) && !settingsButton.contains(event.target)) {
                settingsDropdownContent.classList.remove('show');
            }
        });

        // --- Existing JavaScript Logic ---
        // 移动端菜单切换
        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('mainNav').classList.toggle('active');
        });
        
        // 初始化粒子背景
        particlesJS('particles-js', {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: "#9370db" },
                shape: { type: "circle" },
                opacity: { value: 0.5, random: true },
                size: { value: 3, random: true },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: "#6a5acd",
                    opacity: 0.4,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 2,
                    direction: "none",
                    random: true,
                    straight: false,
                    out_mode: "out",
                    bounce: false
                }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: true, mode: "grab" },
                    onclick: { enable: true, mode: "push" },
                    resize: true
                }
            },
            retina_detect: true
        });
        
        // 添加浮动动画到卡片
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, index) => {
                card.style.animationDelay = `${index * 0.1}s`;
            });
        });

        // 手机端点击导航栏外部自动关闭
        document.addEventListener('click', function(event) {
            const nav = document.getElementById('mainNav');
            const menuToggle = document.getElementById('menuToggle');
            
            // 如果是移动端且导航栏已打开
            if (window.innerWidth <= 768 && nav.classList.contains('active')) {
                // 检查点击是否在导航栏内部或菜单按钮上
                const isClickInsideNav = nav.contains(event.target);
                const isClickOnToggle = menuToggle.contains(event.target);
                
                // 如果点击在导航栏外部且不是菜单按钮，则关闭导航栏
                if (!isClickInsideNav && !isClickOnToggle) {
                    nav.classList.remove('active');
                }
            }
        });

        // 标签页切换时关闭导航栏（移动端）
        document.addEventListener('DOMContentLoaded', function() {
            const tabLinks = document.querySelectorAll('.tab-link');
            
            tabLinks.forEach(tab => {
                tab.addEventListener('click', function() {
                    // 如果是移动端，关闭导航栏
                    if (window.innerWidth <= 768) {
                        const nav = document.getElementById('mainNav');
                        if (nav && nav.classList.contains('active')) {
                            nav.classList.remove('active');
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
