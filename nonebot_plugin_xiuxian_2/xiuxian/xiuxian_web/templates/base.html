<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修仙管理面板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- 1. 核心修复脚本：阻塞渲染，防止深色模式瞬间闪白 -->
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme === 'dark' ? 'dark' : 'light');
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
</head>

<body class="{% if is_active('messages_page') %}messages-layout{% endif %}">
    <!-- 粒子背景容器 -->
    <div id="particles-js"></div>
    
    <header>
        <a href="{{ url_for('home') }}" class="logo">
            <div class="logo-icon">
                <i class="fas fa-mountain"></i>
            </div>
            <div class="logo-text">修仙管理面板</div>
        </a>
        
        <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </button>
        
        <nav id="mainNav">
            <ul>
                <li><a href="{{ url_for('home') }}" {% if is_active('home') %}class="active"{% endif %}><i class="fas fa-home"></i> <span>首页</span></a></li>
                <li><a href="{{ url_for('database') }}" {% if is_active(['database', 'table_view', 'row_edit']) %}class="active"{% endif %}><i class="fas fa-database"></i> <span>数据库管理</span></a></li>
                <li><a href="{{ url_for('commands') }}" {% if is_active('commands') %}class="active"{% endif %}><i class="fas fa-terminal"></i> <span>管理员指令</span></a></li>
                <li><a href="{{ url_for('config_management') }}" {% if is_active('config_management') %}class="active"{% endif %}><i class="fas fa-cog"></i> <span>配置管理</span></a></li>
                <li><a href="{{ url_for('update') }}" {% if is_active('update') %}class="active"{% endif %}><i class="fas fa-sync-alt"></i> <span>检测更新</span></a></li>
                <li><a href="{{ url_for('terminal') }}" class="{% if is_active('terminal') %}active{% endif %}"><i class="fas fa-terminal"></i> 终端</a></li>
                <li><a href="{{ url_for('backups') }}" {% if is_active('backups') %}class="active"{% endif %}><i class="fas fa-archive"></i> <span>备份管理</span></a></li>
                <li><a href="{{ url_for('logs') }}" {% if is_active('logs') %}class="active"{% endif %}><i class="fas fa-file-alt"></i> <span>日志查看</span></a></li>
                <li><a href="{{ url_for('economy_logs') }}" {% if is_active('economy_logs') %}class="active"{% endif %}><i class="fas fa-coins"></i> <span>经济流水</span></a></li>
                <li><a href="{{ url_for('messages_page') }}" {% if is_active('messages_page') %}class="active"{% endif %}><i class="fas fa-comments"></i> <span>消息列表</span></a></li>
                <li><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> <span>退出</span></a></li>
            </ul>
            
            <button class="theme-toggle" id="themeToggle" type="button" title="切换日夜主题">
                <i class="fas fa-moon"></i>
                <span>夜间</span>
            </button>
        </nav>
    </header>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- 引入粒子库 -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        // --- 逻辑变量定义 ---
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const menuToggle = document.getElementById('menuToggle');
        const mainNav = document.getElementById('mainNav');

        function readLocalStorage(key, fallback = null) {
            try {
                const value = localStorage.getItem(key);
                return value === null ? fallback : value;
            } catch (e) {
                return fallback;
            }
        }

        function writeLocalStorage(key, value) {
            try {
                localStorage.setItem(key, value);
            } catch (e) {}
        }

        function applyTheme(themeName) {
            const normalizedTheme = themeName === 'dark' ? 'dark' : 'light';
            html.setAttribute('data-theme', normalizedTheme);
            writeLocalStorage('theme', normalizedTheme);
            updateThemeToggle(normalizedTheme);
            updateParticles(normalizedTheme);
        }

        function updateThemeToggle(themeName) {
            if (!themeToggle) return;
            const isDark = themeName === 'dark';
            themeToggle.innerHTML = isDark
                ? '<i class="fas fa-sun"></i><span>日间</span>'
                : '<i class="fas fa-moon"></i><span>夜间</span>';
            themeToggle.setAttribute('aria-label', isDark ? '切换到日间主题' : '切换到夜间主题');
        }

        // --- 初始化 UI 状态 (页面加载时执行) ---
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = readLocalStorage('theme', 'light') === 'dark' ? 'dark' : 'light';
            applyTheme(savedTheme);

            // 卡片入场动画延迟
            document.querySelectorAll('.card').forEach((card, index) => {
                card.style.animationDelay = `${index * 0.1}s`;
            });
        });

        // --- 事件监听器 ---

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                const nextTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                applyTheme(nextTheme);
            });
        }

        // 移动端菜单切换
        if (menuToggle && mainNav) {
            menuToggle.addEventListener('click', () => {
                mainNav.classList.toggle('active');
            });
        }

        // 移动端点击外部关闭导航
        document.addEventListener('click', (e) => {
            if (!menuToggle || !mainNav) return;
            if (window.innerWidth <= 768 && mainNav.classList.contains('active')) {
                if (!mainNav.contains(e.target) && !menuToggle.contains(e.target)) {
                    mainNav.classList.remove('active');
                }
            }
        });

        // --- 粒子系统初始化函数 ---
        function initParticles(theme) {
            if (typeof window.particlesJS !== 'function') return;
            const color = (theme === 'dark') ? "#35c7ff" : "#12b7f5";
            particlesJS('particles-js', {
                particles: {
                    number: { value: 60, density: { enable: true, value_area: 800 } },
                    color: { value: color },
                    shape: { type: "circle" },
                    opacity: { value: 0.5, random: true },
                    size: { value: 3, random: true },
                    line_linked: { enable: true, distance: 150, color: color, opacity: 0.4, width: 1 },
                    move: { enable: true, speed: 2, direction: "none", random: true, out_mode: "out" }
                },
                interactivity: { detect_on: "canvas", events: { onhover: { enable: true, mode: "grab" } } },
                retina_detect: true
            });
        }

        function updateParticles(theme) {
            if (document.body.classList.contains('messages-layout')) return;
            if (typeof window.particlesJS !== 'function') return;
            if (window.pJSDom && window.pJSDom.length > 0) {
                window.pJSDom[0].pJS.fn.vendors.destroypJS();
                window.pJSDom = [];
            }
            initParticles(theme);
        }
    </script>
</body>
</html>
