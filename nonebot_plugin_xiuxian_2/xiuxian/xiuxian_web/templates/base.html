<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修仙管理面板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- 1. 核心修复脚本：阻塞渲染，防止深色模式瞬间闪白 -->
    <script>
        (function() {
            // 立即读取存储的主题和颜色
            const savedTheme = localStorage.getItem('theme') || 'light';
            const savedColor = localStorage.getItem('customAccentColor');
            
            // 在 body 渲染前应用到 html 标签上
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            if (savedColor) {
                document.documentElement.setAttribute('data-custom-accent-color', 'true');
                document.documentElement.style.setProperty('--custom-accent-color', savedColor);
            }
        })();
    </script>
</head>

<body>
    <!-- 粒子背景容器 -->
    <div id="particles-js"></div>
    
    <header>
        <a href="{{ url_for('home') }}" class="logo">
            <div class="logo-icon">
                <i class="fas fa-mountain"></i>
            </div>
            <div class="logo-text">修仙管理面板</div>
        </a>
        
        <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </button>
        
        <nav id="mainNav">
            <ul>
                <li><a href="{{ url_for('home') }}" {% if is_active('home') %}class="active"{% endif %}><i class="fas fa-home"></i> <span>首页</span></a></li>
                <li><a href="{{ url_for('database') }}" {% if is_active(['database', 'table_view', 'row_edit']) %}class="active"{% endif %}><i class="fas fa-database"></i> <span>数据库管理</span></a></li>
                <li><a href="{{ url_for('commands') }}" {% if is_active('commands') %}class="active"{% endif %}><i class="fas fa-terminal"></i> <span>管理员指令</span></a></li>
                <li><a href="{{ url_for('config_management') }}" {% if is_active('config_management') %}class="active"{% endif %}><i class="fas fa-cog"></i> <span>配置管理</span></a></li>
                <li><a href="{{ url_for('update') }}" {% if is_active('update') %}class="active"{% endif %}><i class="fas fa-sync-alt"></i> <span>检测更新</span></a></li>
                <li><a href="{{ url_for('terminal') }}" class="{% if is_active('terminal') %}active{% endif %}"><i class="fas fa-terminal"></i> 终端</a></li>
                <li><a href="{{ url_for('backups') }}" {% if is_active('backups') %}class="active"{% endif %}><i class="fas fa-archive"></i> <span>备份管理</span></a></li>
                <li><a href="{{ url_for('logs') }}" {% if is_active('logs') %}class="active"{% endif %}><i class="fas fa-file-alt"></i> <span>日志查看</span></a></li>
                <li><a href="{{ url_for('messages_page') }}" {% if is_active('messages_page') %}class="active"{% endif %}><i class="fas fa-comments"></i> <span>消息列表</span></a></li>
                <li><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> <span>退出</span></a></li>
            </ul>
            
            <!-- 主题/设置下拉菜单 -->
            <div class="settings-dropdown">
                <button class="settings-button" id="settingsButton">
                    <i class="fas fa-palette"></i> 主题设置 <i class="fas fa-caret-down"></i>
                </button>
                <div class="dropdown-content" id="settingsDropdownContent">
                    <label>
                        <input type="radio" name="theme" value="light">
                        <i class="fas fa-sun"></i> 浅色模式
                    </label>
                    <label>
                        <input type="radio" name="theme" value="dark">
                        <i class="fas fa-moon"></i> 深色模式
                    </label>
                    <label>
                        <input type="radio" name="theme" value="vibrant">
                        <i class="fas fa-paint-roller"></i> 活力模式
                    </label>
                    <hr>
                    <div class="color-picker-group">
                        <label for="customAccentColorInput"><i class="fas fa-fill-drip"></i> 自定义强调色:</label>
                        <input type="color" id="customAccentColorInput" value="#007bff">
                    </div>
                </div>
            </div>
        </nav>
    </header>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- 引入粒子库 -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        // --- 逻辑变量定义 ---
        const html = document.documentElement;
        const themeRadios = document.querySelectorAll('input[name="theme"]');
        const customColorInput = document.getElementById('customAccentColorInput');
        const settingsButton = document.getElementById('settingsButton');
        const settingsDropdownContent = document.getElementById('settingsDropdownContent');
        const menuToggle = document.getElementById('menuToggle');
        const mainNav = document.getElementById('mainNav');

        // --- 主题控制函数 ---

        // 1. 设置预设主题 (浅色/深色/活力)
        function applyTheme(themeName) {
            html.setAttribute('data-theme', themeName);
            localStorage.setItem('theme', themeName);
            
            // 切换预设主题时，自动移除自定义强调色，恢复主题原生配色
            removeCustomAccent();
            
            // 更新粒子颜色
            updateParticles(themeName);
        }

        // 2. 设置自定义强调色
        function applyCustomAccent(color) {
            html.setAttribute('data-custom-accent-color', 'true');
            html.style.setProperty('--custom-accent-color', color);
            localStorage.setItem('customAccentColor', color);
            
            // 激活自定义颜色时，取消选中所有预设单选框
            themeRadios.forEach(radio => radio.checked = false);
        }

        // 3. 移除自定义强调色
        function removeCustomAccent() {
            html.removeAttribute('data-custom-accent-color');
            html.style.removeProperty('--custom-accent-color');
            localStorage.removeItem('customAccentColor');
        }

        // --- 初始化 UI 状态 (页面加载时执行) ---
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const savedColor = localStorage.getItem('customAccentColor');

            // 同步 UI 单选框状态
            if (savedColor) {
                applyCustomAccent(savedColor);
                customColorInput.value = savedColor;
            } else {
                const radio = document.querySelector(`input[name="theme"][value="${savedTheme}"]`);
                if (radio) radio.checked = true;
            }

            // 初始化粒子背景
            initParticles(savedTheme);

            // 卡片入场动画延迟
            document.querySelectorAll('.card').forEach((card, index) => {
                card.style.animationDelay = `${index * 0.1}s`;
            });
        });

        // --- 事件监听器 ---

        // 监听主题单选框点击
        themeRadios.forEach(radio => {
            radio.addEventListener('change', () => {
                if (radio.checked) applyTheme(radio.value);
            });
        });

        // 监听自定义取色器
        customColorInput.addEventListener('input', (e) => {
            applyCustomAccent(e.target.value);
        });

        // 下拉菜单切换
        settingsButton.addEventListener('click', (e) => {
            settingsDropdownContent.classList.toggle('show');
            e.stopPropagation();
        });

        // 点击外部关闭下拉菜单
        document.addEventListener('click', (e) => {
            if (!settingsDropdownContent.contains(e.target) && !settingsButton.contains(e.target)) {
                settingsDropdownContent.classList.remove('show');
            }
        });

        // 移动端菜单切换
        menuToggle.addEventListener('click', () => {
            mainNav.classList.toggle('active');
        });

        // 移动端点击外部关闭导航
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && mainNav.classList.contains('active')) {
                if (!mainNav.contains(e.target) && !menuToggle.contains(e.target)) {
                    mainNav.classList.remove('active');
                }
            }
        });

        // --- 粒子系统初始化函数 ---
        function initParticles(theme) {
            const color = (theme === 'dark') ? "#3498db" : "#9370db";
            particlesJS('particles-js', {
                particles: {
                    number: { value: 60, density: { enable: true, value_area: 800 } },
                    color: { value: color },
                    shape: { type: "circle" },
                    opacity: { value: 0.5, random: true },
                    size: { value: 3, random: true },
                    line_linked: { enable: true, distance: 150, color: color, opacity: 0.4, width: 1 },
                    move: { enable: true, speed: 2, direction: "none", random: true, out_mode: "out" }
                },
                interactivity: { detect_on: "canvas", events: { onhover: { enable: true, mode: "grab" } } },
                retina_detect: true
            });
        }

        function updateParticles(theme) {
            if (window.pJSDom && window.pJSDom.length > 0) {
                window.pJSDom[0].pJS.fn.vendors.destroypJS();
                window.pJSDom = [];
            }
            initParticles(theme);
        }
    </script>
</body>
</html>
