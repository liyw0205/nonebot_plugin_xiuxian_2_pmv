<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}修仙管理面板{% endblock %}</title>
    <meta name="xiuxian-csrf-token" content="{{ csrf_token() }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('theme') || 'dark';
                document.documentElement.setAttribute('data-theme', savedTheme === 'light' ? 'light' : 'dark');
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
        (function() {
            const nativeFetch = window.fetch.bind(window);
            window.xiuxianCsrfToken = function() {
                const meta = document.querySelector('meta[name="xiuxian-csrf-token"]');
                return meta ? meta.getAttribute('content') || '' : '';
            };
            window.fetch = function(input, init = {}) {
                const requestUrl = input instanceof Request ? input.url : input;
                const url = new URL(requestUrl, window.location.href);
                const method = String(init.method || (input instanceof Request ? input.method : 'GET')).toUpperCase();
                if (url.origin === window.location.origin && !['GET', 'HEAD', 'OPTIONS', 'TRACE'].includes(method)) {
                    const headers = new Headers(init.headers || (input instanceof Request ? input.headers : undefined));
                    if (!headers.has('X-CSRF-Token')) {
                        headers.set('X-CSRF-Token', window.xiuxianCsrfToken());
                    }
                    init = {...init, headers};
                }
                return nativeFetch(input, init);
            };
        })();
    </script>
</head>
<body class="app-shell {% if is_active('messages_page') %}messages-layout{% endif %} {% if is_active('login') %}login-layout{% endif %}">
    <div class="ambient-light-field" aria-hidden="true">
        <span class="ambient-light ambient-light-a"></span>
        <span class="ambient-light ambient-light-b"></span>
        <span class="ambient-light ambient-light-c"></span>
        <span class="ambient-light ambient-light-d"></span>
    </div>
    <div class="top-progress" id="topProgress" aria-hidden="true"></div>
    <div class="layout-shell">
        <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>
        <aside class="app-sidebar" id="mainNav" aria-label="主导航">
            <a href="{{ url_for('home') }}" class="brand" data-cache-page="true" data-cache-ttl="300000" aria-label="返回首页">
                <span class="brand-mark"><i class="fas fa-mountain-sun"></i></span>
                <span class="brand-copy">
                    <strong>修仙管理面板</strong>
                    <small>NoneBot Xiuxian Console</small>
                </span>
            </a>

            <nav class="app-nav">
                <div class="nav-section-label">主功能</div>
                <ul>
                    <li><a href="{{ url_for('home') }}" data-cache-page="true" data-cache-ttl="300000" {% if is_active('home') %}class="active"{% endif %}><i class="fas fa-gauge-high"></i><span>首页</span></a></li>
                    <li><a href="{{ url_for('database') }}" data-cache-page="true" data-cache-ttl="60000" {% if is_active(['database', 'table_view', 'row_edit']) %}class="active"{% endif %}><i class="fas fa-database"></i><span>数据库</span></a></li>
                    <li><a href="{{ url_for('commands') }}" data-cache-page="true" data-cache-ttl="300000" {% if is_active('commands') %}class="active"{% endif %}><i class="fas fa-wand-magic-sparkles"></i><span>指令中心</span></a></li>
                    <li><a href="{{ url_for('command_registry') }}" data-refresh-page="true" {% if is_active('command_registry') %}class="active"{% endif %}><i class="fas fa-list-check"></i><span>指令管理</span></a></li>
                    <li><a href="{{ url_for('activity_management') }}" data-cache-page="true" data-cache-ttl="60000" {% if is_active('activity_management') %}class="active"{% endif %}><i class="fas fa-calendar-check"></i><span>活动管理</span></a></li>
                    <li><a href="{{ url_for('reward_center') }}" data-cache-page="true" data-cache-ttl="60000" {% if is_active('reward_center') %}class="active"{% endif %}><i class="fas fa-hand-holding-heart"></i><span>发放中心</span></a></li>
                    <li><a href="{{ url_for('config_management') }}" data-refresh-page="true" {% if is_active('config_management') %}class="active"{% endif %}><i class="fas fa-sliders"></i><span>配置管理</span></a></li>
                    <li><a href="{{ url_for('messages_page') }}" data-refresh-page="true" {% if is_active('messages_page') %}class="active"{% endif %}><i class="fas fa-comments"></i><span>消息面板</span></a></li>
                    <li><a href="{{ url_for('economy_logs') }}" data-refresh-page="true" {% if is_active('economy_logs') %}class="active"{% endif %}><i class="fas fa-coins"></i><span>经济流水</span></a></li>
                </ul>

                <div class="nav-section-label">运维</div>
                <ul>
                    <li><a href="{{ url_for('logs') }}" data-refresh-page="true" {% if is_active('logs') %}class="active"{% endif %}><i class="fas fa-file-lines"></i><span>日志查看</span></a></li>
                    <li><a href="{{ url_for('backups') }}" data-refresh-page="true" {% if is_active('backups') %}class="active"{% endif %}><i class="fas fa-box-archive"></i><span>备份管理</span></a></li>
                    <li><a href="{{ url_for('update') }}" data-refresh-page="true" {% if is_active('update') %}class="active"{% endif %}><i class="fas fa-rotate"></i><span>检测更新</span></a></li>
                    <li><a href="{{ url_for('terminal') }}" data-refresh-page="true" {% if is_active('terminal') %}class="active"{% endif %}><i class="fas fa-terminal"></i><span>Web 终端</span></a></li>
                    <li><a href="{{ url_for('scheduler_management') }}" data-refresh-page="true" {% if is_active('scheduler_management') %}class="active"{% endif %}><i class="fas fa-clock"></i><span>定时任务</span></a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <a href="{{ url_for('logout') }}" class="logout-link" title="退出登录">
                    <i class="fas fa-right-from-bracket"></i>
                    <span>退出登录</span>
                </a>
            </div>
        </aside>

        <div class="app-main">
            <header class="app-header">
                <button class="menu-toggle icon-button" id="menuToggle" type="button" aria-label="打开导航">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="topbar-title">
                    <strong>修仙管理面板</strong>
                    <span>后台工作台</span>
                </div>
                <button class="theme-toggle" id="themeToggle" type="button" title="切换主题">
                    <i class="fas fa-moon"></i>
                    <span>夜间</span>
                </button>
            </header>

            <main class="container">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script>
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const menuToggle = document.getElementById('menuToggle');
        const mainNav = document.getElementById('mainNav');
        const sidebarBackdrop = document.getElementById('sidebarBackdrop');
        const topProgress = document.getElementById('topProgress');
        const pageCache = new Map();
        const DEFAULT_PAGE_CACHE_TTL = 120000;
        let progressTimer = null;
        let progressDoneTimer = null;
        let pageLoadToken = 0;

        function readLocalStorage(key, fallback = null) {
            try {
                const value = localStorage.getItem(key);
                return value === null ? fallback : value;
            } catch (e) {
                return fallback;
            }
        }

        function writeLocalStorage(key, value) {
            try {
                localStorage.setItem(key, value);
            } catch (e) {}
        }

        function updateThemeToggle(themeName) {
            if (!themeToggle) return;
            const isDark = themeName === 'dark';
            themeToggle.innerHTML = isDark
                ? '<i class="fas fa-sun"></i><span>日间</span>'
                : '<i class="fas fa-moon"></i><span>夜间</span>';
            themeToggle.setAttribute('aria-label', isDark ? '切换到日间主题' : '切换到夜间主题');
        }

        function applyTheme(themeName) {
            const normalizedTheme = themeName === 'light' ? 'light' : 'dark';
            html.setAttribute('data-theme', normalizedTheme);
            writeLocalStorage('theme', normalizedTheme);
            updateThemeToggle(normalizedTheme);
        }

        function startProgress() {
            if (!topProgress) return;
            clearInterval(progressTimer);
            clearTimeout(progressDoneTimer);
            topProgress.style.transition = 'none';
            topProgress.style.opacity = '1';
            topProgress.style.width = '0%';
            requestAnimationFrame(() => {
                topProgress.style.transition = 'width 0.22s ease, opacity 0.2s ease';
                topProgress.style.width = '28%';
            });
            let width = 28;
            progressTimer = setInterval(() => {
                width = Math.min(width + Math.max(1, (88 - width) * 0.18), 88);
                topProgress.style.width = `${width}%`;
            }, 180);
        }

        function finishProgress() {
            if (!topProgress) return;
            clearInterval(progressTimer);
            topProgress.style.width = '100%';
            progressDoneTimer = window.setTimeout(() => {
                topProgress.style.opacity = '0';
                window.setTimeout(() => {
                    topProgress.style.width = '0%';
                }, 220);
            }, 160);
        }

        function closeSidebar() {
            if (mainNav) mainNav.classList.remove('active');
            if (sidebarBackdrop) sidebarBackdrop.hidden = true;
        }

        function cleanupCurrentPage() {
            if (typeof window.__xiuxianPageCleanup === 'function') {
                try {
                    window.__xiuxianPageCleanup();
                } catch (e) {}
            }
            window.__xiuxianPageCleanup = null;
        }

        function executePageScripts(container, pageUrl) {
            container.querySelectorAll('script').forEach(oldScript => {
                const script = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => {
                    script.setAttribute(attr.name, attr.value);
                });
                script.async = false;
                script.textContent = oldScript.textContent;
                oldScript.replaceWith(script);
            });
            document.dispatchEvent(new CustomEvent('xiuxian:page-load', {detail: {url: pageUrl}}));
        }

        function getLinkCacheTtl(link) {
            const ttl = Number(link?.dataset?.cacheTtl);
            return Number.isFinite(ttl) && ttl > 0 ? ttl : DEFAULT_PAGE_CACHE_TTL;
        }

        function getCachedPage(url) {
            const cached = pageCache.get(url);
            if (!cached) return null;
            if (cached.expiresAt && cached.expiresAt < Date.now()) {
                pageCache.delete(url);
                return null;
            }
            return cached;
        }

        function setCachedPage(url, pageData, ttl = DEFAULT_PAGE_CACHE_TTL) {
            pageCache.set(url, {
                ...pageData,
                expiresAt: Date.now() + ttl
            });
        }

        function invalidatePageCache(match = null) {
            if (!match) {
                pageCache.clear();
                return;
            }

            for (const key of Array.from(pageCache.keys())) {
                const cachedUrl = new URL(key);
                if (typeof match === 'string') {
                    const target = new URL(match, window.location.origin);
                    if (cachedUrl.pathname === target.pathname || key === target.toString()) {
                        pageCache.delete(key);
                    }
                } else if (typeof match === 'function' && match(cachedUrl)) {
                    pageCache.delete(key);
                }
            }
        }

        function findExactNavLinkForUrl(url) {
            const target = new URL(url, window.location.origin);
            return Array.from(document.querySelectorAll('.app-sidebar .app-nav a')).find(link => {
                const linkUrl = new URL(link.href, window.location.origin);
                return linkUrl.pathname === target.pathname && linkUrl.search === target.search;
            });
        }

        function updateActiveNav(url) {
            const target = new URL(url, window.location.origin);
            document.querySelectorAll('.app-sidebar .app-nav a').forEach(link => {
                const linkUrl = new URL(link.href, window.location.origin);
                const active = linkUrl.pathname === target.pathname
                    || (target.pathname.startsWith('/table/') && linkUrl.pathname === '/database');
                link.classList.toggle('active', active);
            });
        }

        function setBodyLayoutForUrl(url) {
            const target = new URL(url, window.location.origin);
            document.body.classList.toggle('messages-layout', target.pathname === '/messages');
            document.body.classList.toggle('login-layout', target.pathname === '/login');
        }

        function applyBodyClass(className) {
            document.body.className = className || 'app-shell';
            if (!document.body.classList.contains('app-shell')) {
                document.body.classList.add('app-shell');
            }
        }

        async function requestJson(url, options = {}) {
            const headers = new Headers(options.headers || {});
            if (!headers.has('Accept')) headers.set('Accept', 'application/json');
            if (!headers.has('X-Requested-With')) headers.set('X-Requested-With', 'fetch');

            const response = await fetch(url, {...options, headers});
            let data;
            try {
                data = await response.json();
            } catch (e) {
                throw new Error(`HTTP ${response.status}`);
            }

            if (!response.ok || data.success === false) {
                throw new Error(data.error || data.message || `HTTP ${response.status}`);
            }
            return data;
        }

        function cacheCurrentPage() {
            const activeLink = findExactNavLinkForUrl(window.location.href);
            const main = document.querySelector('main.container');
            if (!activeLink || activeLink.dataset.cachePage !== 'true' || !main) return;

            setCachedPage(window.location.href, {
                title: document.title,
                bodyClass: document.body.className,
                content: main.innerHTML
            }, getLinkCacheTtl(activeLink));
        }

        async function loadCachedPage(url, pushState = true, options = {}) {
            const absoluteUrl = new URL(url, window.location.origin).toString();
            const main = document.querySelector('main.container');
            if (!main) {
                window.location.href = absoluteUrl;
                return;
            }

            if (absoluteUrl === window.location.href && pushState) {
                closeSidebar();
                return;
            }

            const token = ++pageLoadToken;
            startProgress();
            closeSidebar();

            const bypassCache = options.bypassCache === true;

            try {
                cleanupCurrentPage();
                let cached = bypassCache ? null : getCachedPage(absoluteUrl);

                if (!cached) {
                    const response = await fetch(absoluteUrl, {
                        headers: {
                            'Accept': 'text/html',
                            'X-Requested-With': 'fetch'
                        }
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const htmlText = await response.text();
                    const doc = new DOMParser().parseFromString(htmlText, 'text/html');
                    const nextMain = doc.querySelector('main.container');
                    if (!nextMain) throw new Error('页面结构不完整');
                    cached = {
                        title: doc.title || document.title,
                        bodyClass: doc.body ? doc.body.className : '',
                        content: nextMain.innerHTML
                    };
                    if (!bypassCache) {
                        setCachedPage(absoluteUrl, cached, options.cacheTtl || DEFAULT_PAGE_CACHE_TTL);
                    }
                }

                if (token !== pageLoadToken) return;

                document.title = cached.title;
                applyBodyClass(cached.bodyClass);
                setBodyLayoutForUrl(absoluteUrl);
                main.innerHTML = cached.content;
                executePageScripts(main, absoluteUrl);
                updateActiveNav(absoluteUrl);
                if (pushState && absoluteUrl !== window.location.href) {
                    history.pushState({spaPage: true}, '', absoluteUrl);
                }
                window.scrollTo({top: 0, behavior: 'auto'});
                finishProgress();
            } catch (error) {
                finishProgress();
                window.location.href = absoluteUrl;
            }
        }

        async function loadFreshPage(url, pushState = true) {
            invalidatePageCache(url);
            return loadCachedPage(url, pushState, {bypassCache: true});
        }

        function shouldSpaNavigate(link, url) {
            if (!link || !url) return false;
            if (link.classList.contains('logout-link')) return false;
            if (isDownloadLikeNavigation(link, url)) return false;
            if (link.dataset.fullReload === 'true') return false;
            if (link.dataset.cachePage === 'true') return true;
            if (link.dataset.refreshPage === 'true') return true;
            if (link.closest('.app-sidebar .app-nav')) return true;
            if (link.closest('main.container')) return true;
            return false;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = readLocalStorage('theme', 'dark') === 'light' ? 'light' : 'dark';
            applyTheme(savedTheme);
            cacheCurrentPage();
            const activeLink = findExactNavLinkForUrl(window.location.href);
            history.replaceState({cachedPage: activeLink?.dataset.cachePage === 'true'}, '', window.location.href);
        });

        window.XiuxianWeb = {
            requestJson,
            startProgress,
            finishProgress,
            invalidatePageCache,
            loadPage: loadCachedPage,
            loadFreshPage
        };

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                const nextTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                applyTheme(nextTheme);
            });
        }

        if (menuToggle && mainNav) {
            menuToggle.addEventListener('click', () => {
                const isOpen = mainNav.classList.toggle('active');
                if (sidebarBackdrop) sidebarBackdrop.hidden = !isOpen;
            });
        }

        if (sidebarBackdrop && mainNav) {
            sidebarBackdrop.addEventListener('click', () => {
                mainNav.classList.remove('active');
                sidebarBackdrop.hidden = true;
            });
        }

        document.addEventListener('click', (event) => {
            if (!menuToggle || !mainNav) return;
            if (window.innerWidth <= 900 && mainNav.classList.contains('active')) {
                if (!mainNav.contains(event.target) && !menuToggle.contains(event.target)) {
                    closeSidebar();
                }
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && mainNav && mainNav.classList.contains('active')) {
                closeSidebar();
            }
        });

        function isSamePageHashNavigation(url) {
            return url.pathname === window.location.pathname
                && url.search === window.location.search
                && Boolean(url.hash)
                && url.hash !== window.location.hash;
        }

        function isDownloadLikeNavigation(link, url) {
            return link.hasAttribute('download')
                || url.pathname.startsWith('/download/')
                || url.pathname.startsWith('/download_backup/')
                || url.pathname === '/economy_logs/export';
        }

        document.addEventListener('click', (event) => {
            const link = event.target.closest('a[href]');
            if (!link) return;
            if (event.defaultPrevented || event.button !== 0 || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
            if (link.target && link.target !== '_self') return;

            const url = new URL(link.getAttribute('href'), window.location.origin);
            if (!['http:', 'https:'].includes(url.protocol)) return;
            if (url.origin !== window.location.origin) return;
            if (isSamePageHashNavigation(url) || isDownloadLikeNavigation(link, url) || link.dataset.noProgress === 'true') return;

            if (shouldSpaNavigate(link, url)) {
                event.preventDefault();
                if (link.dataset.cachePage === 'true') {
                    loadCachedPage(url.toString(), true, {cacheTtl: getLinkCacheTtl(link)});
                } else {
                    loadFreshPage(url.toString(), true);
                }
                return;
            }

            closeSidebar();
            startProgress();
        });

        document.addEventListener('submit', (event) => {
            const form = event.target;
            if (event.defaultPrevented || !(form instanceof HTMLFormElement)) return;
            if (form.target && form.target !== '_self') return;
            if (form.dataset.noProgress === 'true' || form.dataset.fullReload === 'true') return;

            const method = (form.getAttribute('method') || 'get').toLowerCase();
            if (method === 'get' && form.closest('main.container')) {
                event.preventDefault();
                const action = form.getAttribute('action') || window.location.pathname;
                const url = new URL(action, window.location.origin);
                const formData = new FormData(form);
                formData.forEach((value, key) => {
                    url.searchParams.set(key, value);
                });
                form.querySelectorAll('input[type="checkbox"][name]').forEach((el) => {
                    if (!el.checked) url.searchParams.delete(el.name);
                });
                loadFreshPage(url.toString(), true);
                return;
            }

            startProgress();
        });

        window.addEventListener('popstate', () => {
            const href = window.location.href;
            const activeLink = findExactNavLinkForUrl(href);
            if (activeLink && activeLink.dataset.cachePage === 'true') {
                loadCachedPage(href, false, {cacheTtl: getLinkCacheTtl(activeLink)});
                return;
            }
            if (activeLink && shouldSpaNavigate(activeLink, new URL(href))) {
                loadFreshPage(href, false);
                return;
            }
            const path = window.location.pathname;
            if (path.startsWith('/table/')) {
                loadFreshPage(href, false);
                return;
            }
            startProgress();
            window.location.reload();
        });

        window.addEventListener('pageshow', (event) => {
            finishProgress();
            if (event.persisted) return;
        });
    </script>
</body>
</html>
