{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2><i class="fas fa-file-alt"></i> 日志查看</h2>
    <p>支持：日志文件选择、关键字、级别、起止时间筛选（ANSI 颜色可读性增强）</p>

    <div class="log-filters">
        <div class="form-group">
            <label for="log-file">日志文件</label>
            <select id="log-file"></select>
        </div>

        <div class="form-group">
            <label for="level">日志级别</label>
            <select id="level">
                <option value="ALL">全部</option>
                <option value="TRACE">TRACE</option>
                <option value="DEBUG">DEBUG</option>
                <option value="INFO">INFO</option>
                <option value="SUCCESS">SUCCESS</option>
                <option value="WARNING">WARNING</option>
                <option value="ERROR">ERROR</option>
                <option value="CRITICAL">CRITICAL</option>
            </select>
        </div>

        <div class="form-group">
            <label for="keyword">关键字（保留）</label>
            <input id="keyword" type="text" placeholder="例如：ModuleNotFoundError">
        </div>

        <div class="form-group">
            <label for="start">开始时间</label>
            <input id="start" type="datetime-local" step="1">
        </div>

        <div class="form-group">
            <label for="end">结束时间</label>
            <input id="end" type="datetime-local" step="1">
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" id="ignore-unknown" checked>
                忽略 UNKNOWN
            </label>
        </div>

        <div class="form-group">
            <label for="ignore-keywords">忽略关键字（|分隔）</label>
            <input id="ignore-keywords" type="text" placeholder="例如：/api/logs/tail|HTTP/1.1|GET /api/logs/">
        </div>
    </div>

    <div class="form-actions">
        <button class="btn btn-primary" onclick="loadLogs(1)">
            <i class="fas fa-search"></i> 查询
        </button>
        <button class="btn btn-info" onclick="resetFilters()">
            <i class="fas fa-undo"></i> 重置
        </button>
        <button class="btn btn-secondary" onclick="scrollToBottom()">
            <i class="fas fa-arrow-down"></i> 滚动到底
        </button>
    </div>

    <div class="form-actions" style="margin-top: 8px;">
        <button id="realtime-btn" class="btn btn-warning" onclick="toggleRealtime()">
            <i class="fas fa-bolt"></i> 实时日志：关闭
        </button>
    </div>

    <div id="log-meta" class="log-meta"></div>

    <div id="log-result" class="log-console">
        <div class="loading">请先选择日志并点击查询</div>
    </div>

    <div id="pager" class="pagination" style="margin-top: 12px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ansi_up@5.1.0/ansi_up.min.js"></script>

<style>
.log-filters {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
}

.log-meta {
    margin-top: 8px;
    color: var(--text-secondary);
    font-size: 0.9rem;
}

.log-console {
    margin-top: 12px;
    background: #0b1020;
    border: 1px solid #2b2f36;
    border-radius: 8px;
    min-height: 280px;
    max-height: 70vh;
    overflow: auto;
    padding: 10px;
    font-family: Consolas, Monaco, monospace;
    font-size: 13px;
    line-height: 1.55;
    color: #e5e7eb;
}

.log-line {
    border-bottom: 1px dashed rgba(255, 255, 255, 0.12);
    padding: 6px 4px;
    word-break: break-word;
}
.log-line:last-child { border-bottom: none; }

.log-prefix {
    display: inline-block;
    margin-right: 8px;
    color: #9aa4b2;
    white-space: nowrap;
}

.log-level {
    display: inline-block;
    min-width: 74px;
    text-align: center;
    border-radius: 999px;
    font-size: 11px;
    padding: 1px 8px;
    margin-right: 8px;
    color: #fff;
    vertical-align: middle;
}

.lv-TRACE { background: #607d8b; }
.lv-DEBUG { background: #3f51b5; }
.lv-INFO { background: #009688; }
.lv-SUCCESS { background: #2e7d32; }
.lv-WARNING { background: #f9a825; color: #222; }
.lv-ERROR { background: #d32f2f; }
.lv-CRITICAL { background: #6a1b9a; }
.lv-UNKNOWN { background: #334155; color: #f8fafc; }

.log-text {
    display: inline;
    white-space: pre-wrap;
}

/* ANSI 颜色覆盖 */
.log-console .ansi-black-fg { color: #cbd5e1 !important; }
.log-console .ansi-bright-black-fg { color: #94a3b8 !important; }
.log-console .ansi-red-fg { color: #f87171 !important; }
.log-console .ansi-green-fg { color: #4ade80 !important; }
.log-console .ansi-yellow-fg { color: #facc15 !important; }
.log-console .ansi-blue-fg { color: #60a5fa !important; }
.log-console .ansi-magenta-fg { color: #e879f9 !important; }
.log-console .ansi-cyan-fg { color: #22d3ee !important; }
.log-console .ansi-white-fg { color: #f8fafc !important; }
.log-console .ansi-bright-red-fg { color: #fb7185 !important; }
.log-console .ansi-bright-green-fg { color: #86efac !important; }
.log-console .ansi-bright-yellow-fg { color: #fde047 !important; }
.log-console .ansi-bright-blue-fg { color: #93c5fd !important; }
.log-console .ansi-bright-magenta-fg { color: #f0abfc !important; }
.log-console .ansi-bright-cyan-fg { color: #67e8f9 !important; }
.log-console .ansi-bright-white-fg { color: #ffffff !important; }

.log-console .ansi-black-bg { background-color: #111827 !important; }
.log-console .ansi-red-bg { background-color: #7f1d1d !important; }
.log-console .ansi-green-bg { background-color: #14532d !important; }
.log-console .ansi-yellow-bg { background-color: #713f12 !important; }
.log-console .ansi-blue-bg { background-color: #1e3a8a !important; }
.log-console .ansi-magenta-bg { background-color: #581c87 !important; }
.log-console .ansi-cyan-bg { background-color: #155e75 !important; }
.log-console .ansi-white-bg { background-color: #e5e7eb !important; color: #111 !important; }

[data-theme='light'] .log-console,
[data-theme='vibrant'] .log-console {
    background: #0f172a;
    border-color: #334155;
    color: #e2e8f0;
}
</style>

<script>
const ansiUp = new AnsiUp();
ansiUp.use_classes = true;

let currentPage = 1;
let currentTotal = 0;
const pageSize = 200;
let currentFile = '';

let realtimeEnabled = false;
let realtimeTimer = null;
let realtimeOffset = 0;
let realtimeFile = '';

function fmtDateTimeLocalToBackend(val) {
    if (!val) return '';
    let s = val.replace('T', ' ');
    if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}$/.test(s)) s += ':00';
    return s;
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m]));
}

function normalizeAnsi(s) {
    return String(s).replace(/(^|[^\x1b])\[(\d{1,3}(?:;\d{1,3})*)m/g, (m, p1, p2) => {
        return p1 + '\x1b[' + p2 + 'm';
    });
}

function ansiToHtmlSafe(text) {
    const fixed = normalizeAnsi(text || '');
    return ansiUp.ansi_to_html(fixed);
}

function levelClass(level) {
    const lv = (level || 'UNKNOWN').toUpperCase();
    return `lv-${lv}`;
}

/* 新增：判断是否接近底部（智能跟随滚动） */
function isNearBottom(el, threshold = 100) {
    return (el.scrollHeight - el.scrollTop - el.clientHeight) <= threshold;
}

/* 前端本地忽略（双保险） */
function shouldIgnoreRow(row) {
    const ignoreUnknown = document.getElementById('ignore-unknown')?.checked;
    const ignoreKeywordsRaw = (document.getElementById('ignore-keywords')?.value || '').trim();

    const level = (row.level || '').toUpperCase();
    const text = String(row.text || '');

    if (ignoreUnknown && level === 'UNKNOWN') return true;

    if (ignoreKeywordsRaw) {
        const words = ignoreKeywordsRaw.split('|').map(s => s.trim()).filter(Boolean);
        for (const w of words) {
            if (text.includes(w)) return true;
        }
    }
    return false;
}

function renderRows(rows) {
    rows = (rows || []).filter(r => !shouldIgnoreRow(r));
    if (rows.length === 0) {
        return `<div class="loading">无匹配日志</div>`;
    }

    return rows.map(r => {
        const t = r.time || '--';
        const lv = (r.level || 'UNKNOWN').toUpperCase();
        const htmlText = ansiToHtmlSafe(r.text || '');
        return `
            <div class="log-line">
                <span class="log-prefix">[${escapeHtml(t)}]</span>
                <span class="log-level ${levelClass(lv)}">${escapeHtml(lv)}</span>
                <span class="log-text">${htmlText}</span>
            </div>
        `;
    }).join('');
}

/* 关键修复：仅在“本来就在底部附近”时自动滚动 */
function appendRows(rows) {
    rows = (rows || []).filter(r => !shouldIgnoreRow(r));
    if (!rows.length) return;

    const box = document.getElementById('log-result');
    const shouldAutoScroll = isNearBottom(box, 100);

    if (box.querySelector('.loading') || box.querySelector('.error')) {
        box.innerHTML = '';
    }

    const html = rows.map(r => {
        const t = r.time || '--';
        const lv = (r.level || 'UNKNOWN').toUpperCase();
        const htmlText = ansiToHtmlSafe(r.text || '');
        return `
            <div class="log-line">
                <span class="log-prefix">[${escapeHtml(t)}]</span>
                <span class="log-level ${levelClass(lv)}">${escapeHtml(lv)}</span>
                <span class="log-text">${htmlText}</span>
            </div>
        `;
    }).join('');

    box.insertAdjacentHTML('beforeend', html);

    const lines = box.querySelectorAll('.log-line');
    const maxLines = 2000;
    if (lines.length > maxLines) {
        const removeCount = lines.length - maxLines;
        for (let i = 0; i < removeCount; i++) {
            if (lines[i] && lines[i].parentNode) lines[i].parentNode.removeChild(lines[i]);
        }
    }

    if (shouldAutoScroll) {
        box.scrollTop = box.scrollHeight;
    }
}

function renderPager() {
    const pager = document.getElementById('pager');
    const totalPages = Math.max(1, Math.ceil(currentTotal / pageSize));
    const maxShow = 12;

    let start = Math.max(1, currentPage - 5);
    let end = Math.min(totalPages, start + maxShow - 1);
    if (end - start + 1 < maxShow) start = Math.max(1, end - maxShow + 1);

    let html = '';
    if (currentPage > 1) {
        html += `<a href="javascript:void(0)" onclick="loadLogs(${currentPage - 1})">上一页</a>`;
    }
    for (let i = start; i <= end; i++) {
        html += `<a href="javascript:void(0)" class="${i === currentPage ? 'active' : ''}" onclick="loadLogs(${i})">${i}</a>`;
    }
    if (currentPage < totalPages) {
        html += `<a href="javascript:void(0)" onclick="loadLogs(${currentPage + 1})">下一页</a>`;
    }
    pager.innerHTML = html;
}

async function loadLogFiles() {
    const sel = document.getElementById('log-file');
    sel.innerHTML = `<option>加载中...</option>`;

    try {
        const res = await fetch('/api/logs/files');
        const data = await res.json();

        if (!data.success) {
            sel.innerHTML = `<option>加载失败</option>`;
            return;
        }

        if (!data.files || data.files.length === 0) {
            sel.innerHTML = `<option>未找到日志文件</option>`;
            return;
        }

        sel.innerHTML = data.files.map(f =>
            `<option value="${escapeHtml(f.name)}">${escapeHtml(f.name)} (${escapeHtml(f.mtime)})</option>`
        ).join('');

        currentFile = data.files[0].name;
    } catch (e) {
        sel.innerHTML = `<option>加载异常</option>`;
    }
}

async function loadLogs(page = 1, fromRealtime = false) {
    if (!fromRealtime && realtimeEnabled) {
        await toggleRealtime();
    }

    currentPage = page;

    const file = document.getElementById('log-file').value;
    const keyword = document.getElementById('keyword').value.trim();
    const level = document.getElementById('level').value;
    const start = fmtDateTimeLocalToBackend(document.getElementById('start').value);
    const end = fmtDateTimeLocalToBackend(document.getElementById('end').value);

    if (!file || file === '未找到日志文件') return;

    const qs = new URLSearchParams({
        file, keyword, level, start, end,
        page: String(page),
        page_size: String(pageSize)
    });

    const box = document.getElementById('log-result');
    const meta = document.getElementById('log-meta');
    box.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-spin"></i> 读取中...</div>`;

    try {
        const res = await fetch('/api/logs/read?' + qs.toString());
        const data = await res.json();

        if (!data.success) {
            box.innerHTML = `<div class="error">读取失败：${escapeHtml(data.error || '未知错误')}</div>`;
            meta.innerText = '';
            return;
        }

        currentTotal = data.total || 0;
        currentFile = data.file || file;

        meta.innerText = `文件：${currentFile} ｜ 共 ${currentTotal} 条 ｜ 第 ${data.page} 页`;
        box.innerHTML = renderRows(data.rows || []);
        renderPager();
    } catch (e) {
        box.innerHTML = `<div class="error">请求异常：${escapeHtml(String(e))}</div>`;
        meta.innerText = '';
    }
}

async function getLastPageNumber() {
    const file = document.getElementById('log-file').value;
    const keyword = document.getElementById('keyword').value.trim();
    const level = document.getElementById('level').value;
    const start = fmtDateTimeLocalToBackend(document.getElementById('start').value);
    const end = fmtDateTimeLocalToBackend(document.getElementById('end').value);

    if (!file || file === '未找到日志文件') return 1;

    const qs = new URLSearchParams({
        file, keyword, level, start, end,
        page: "1",
        page_size: String(pageSize)
    });

    const res = await fetch('/api/logs/read?' + qs.toString());
    const data = await res.json();
    if (!data.success) throw new Error(data.error || '获取总页失败');

    const total = data.total || 0;
    return Math.max(1, Math.ceil(total / pageSize));
}

async function jumpToLastPageAndLoad() {
    const lastPage = await getLastPageNumber();
    await loadLogs(lastPage, true);
    scrollToBottom();
}

async function getCurrentFileSize(fileName) {
    const res = await fetch('/api/logs/files');
    const data = await res.json();
    if (!data.success || !data.files) return 0;
    const hit = data.files.find(f => f.name === fileName);
    return hit ? (hit.size || 0) : 0;
}

async function pullRealtimeIncrement() {
    if (!realtimeEnabled) return;

    const file = document.getElementById('log-file').value;
    const keyword = document.getElementById('keyword').value.trim();
    const level = document.getElementById('level').value;
    const start = fmtDateTimeLocalToBackend(document.getElementById('start').value);
    const end = fmtDateTimeLocalToBackend(document.getElementById('end').value);

    const ignoreUnknown = document.getElementById('ignore-unknown')?.checked ? '1' : '0';
    const ignoreKeywords = (document.getElementById('ignore-keywords')?.value || '').trim();

    if (file !== realtimeFile) {
        realtimeFile = file;
        realtimeOffset = await getCurrentFileSize(file); // 切文件从末尾开始
        return;
    }

    const qs = new URLSearchParams({
        file,
        offset: String(realtimeOffset),
        keyword,
        level,
        start,
        end,
        ignore_unknown: ignoreUnknown,
        ignore_keywords: ignoreKeywords
    });

    const res = await fetch('/api/logs/tail?' + qs.toString());
    const data = await res.json();
    if (!data.success) return;

    realtimeOffset = data.next_offset || realtimeOffset;
    appendRows(data.lines || []);

    const meta = document.getElementById('log-meta');
    meta.innerText = `文件：${file} ｜ 实时模式（增量） ｜ offset: ${realtimeOffset}`;
}

async function toggleRealtime() {
    const btn = document.getElementById('realtime-btn');
    const file = document.getElementById('log-file').value;

    if (!file || file === '未找到日志文件') {
        alert('请先选择日志文件');
        return;
    }

    if (!realtimeEnabled) {
        realtimeEnabled = true;
        btn.classList.remove('btn-warning');
        btn.classList.add('btn-success');
        btn.innerHTML = '<i class="fas fa-stop-circle"></i> 实时日志：开启';

        // 先到最后页显示现场
        try {
            await jumpToLastPageAndLoad();
        } catch (e) {
            console.error('跳转最后页失败', e);
        }

        // 然后从文件末尾开始只读新增
        realtimeFile = file;
        realtimeOffset = await getCurrentFileSize(file);

        realtimeTimer = setInterval(async () => {
            try {
                await pullRealtimeIncrement();
            } catch (e) {
                console.error('实时增量失败', e);
            }
        }, 1000);

    } else {
        realtimeEnabled = false;
        if (realtimeTimer) {
            clearInterval(realtimeTimer);
            realtimeTimer = null;
        }
        btn.classList.remove('btn-success');
        btn.classList.add('btn-warning');
        btn.innerHTML = '<i class="fas fa-bolt"></i> 实时日志：关闭';
    }
}

function resetFilters() {
    document.getElementById('keyword').value = '';
    document.getElementById('level').value = 'ALL';
    document.getElementById('start').value = '';
    document.getElementById('end').value = '';
    document.getElementById('ignore-unknown').checked = true;
    document.getElementById('ignore-keywords').value = '';
    loadLogs(1);
}

function scrollToBottom() {
    const box = document.getElementById('log-result');
    box.scrollTop = box.scrollHeight;
}

window.addEventListener('beforeunload', () => {
    if (realtimeTimer) {
        clearInterval(realtimeTimer);
        realtimeTimer = null;
    }
});

document.addEventListener('DOMContentLoaded', async () => {
    await loadLogFiles();
    loadLogs(1);
});
</script>
{% endblock %}
