{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2><i class="fas fa-file-alt"></i> 日志查看</h2>
    <p>支持：日志文件选择、关键字、级别、起止时间筛选（ANSI 颜色可读性增强）</p>

    <div class="log-mode-tabs">
        <button id="log-file-tab" class="active" type="button" onclick="switchLogMode('file')">
            <i class="fas fa-file-lines"></i> 日志文件
        </button>
        <button id="log-user-tab" type="button" onclick="switchLogMode('user')">
            <i class="fas fa-user-clock"></i> 用户查看
        </button>
    </div>

    <div id="log-file-panel" class="log-panel">
    <div class="log-filters">
        <div class="form-group">
            <label for="log-file">日志文件</label>
            <select id="log-file"></select>
        </div>

        <div class="form-group">
            <label for="level">日志级别</label>
            <select id="level">
                <option value="ALL">全部</option>
                <option value="TRACE">TRACE</option>
                <option value="DEBUG">DEBUG</option>
                <option value="INFO">INFO</option>
                <option value="SUCCESS">SUCCESS</option>
                <option value="WARNING">WARNING</option>
                <option value="ERROR">ERROR</option>
                <option value="CRITICAL">CRITICAL</option>
            </select>
        </div>

        <div class="form-group">
            <label for="keyword">关键字（保留）</label>
            <input id="keyword" type="text" placeholder="例如：ModuleNotFoundError">
        </div>

        <div class="form-group">
            <label for="start">开始时间</label>
            <input id="start" type="datetime-local" step="1">
        </div>

        <div class="form-group">
            <label for="end">结束时间</label>
            <input id="end" type="datetime-local" step="1">
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" id="ignore-unknown" checked>
                忽略 UNKNOWN
            </label>
        </div>

        <div class="form-group">
            <label for="ignore-keywords">忽略关键字（|分隔）</label>
            <input id="ignore-keywords" type="text" placeholder="例如：/api/logs/tail|HTTP/1.1|GET /api/logs/">
        </div>
    </div>

    <div class="form-actions">
        <button class="btn btn-primary" onclick="loadLogs(1)">
            <i class="fas fa-search"></i> 查询
        </button>
        <button class="btn btn-info" onclick="resetFilters()">
            <i class="fas fa-undo"></i> 重置
        </button>
        <button class="btn btn-secondary" onclick="scrollToBottom()">
            <i class="fas fa-arrow-down"></i> 滚动到底
        </button>
    </div>

    <div class="form-actions" style="margin-top: 8px;">
        <button id="realtime-btn" class="btn btn-warning" onclick="toggleRealtime()">
            <i class="fas fa-bolt"></i> 实时日志：关闭
        </button>
    </div>

    <div id="log-meta" class="log-meta"></div>

    <div id="log-result" class="log-console">
        <div class="loading">请先选择日志并点击查询</div>
    </div>

    <div id="pager" class="pagination" style="margin-top: 12px;"></div>
    </div>

    <div id="log-user-panel" class="log-panel hidden">
        <div class="log-user-layout">
            <aside class="log-user-side">
                <div class="log-user-search">
                    <label for="log-user-search-input">道号 / ID</label>
                    <div class="log-user-search-row">
                        <input
                            id="log-user-search-input"
                            type="text"
                            placeholder="输入道号或用户ID"
                            onkeydown="if(event.key==='Enter') searchLogUsers()"
                        >
                        <button class="btn btn-primary btn-sm" type="button" onclick="searchLogUsers()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>

                <div id="log-user-list" class="log-user-list">
                    <div class="loading">输入道号或 ID 后搜索用户</div>
                </div>
            </aside>

            <section class="log-user-chat">
                <div class="log-user-chat-header">
                    <div id="log-user-avatar" class="log-user-avatar">人</div>
                    <div class="log-user-title-wrap">
                        <div id="log-user-title" class="log-user-title">请选择用户</div>
                        <div id="log-user-subtitle" class="log-user-subtitle">按道号或 ID 搜索后查看消息历史</div>
                    </div>
                </div>

                <div class="log-user-filters">
                    <div class="form-group">
                        <label for="log-user-scene">会话类型</label>
                        <select id="log-user-scene" onchange="loadLogUserMessages(1)">
                            <option value="ALL">全部</option>
                            <option value="private">私聊消息</option>
                            <option value="group">群消息</option>
                            <option value="channel_private">频道私信</option>
                            <option value="channel_group">频道消息</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="log-user-direction">方向</label>
                        <select id="log-user-direction" onchange="loadLogUserMessages(1)">
                            <option value="ALL">全部</option>
                            <option value="recv">用户指令</option>
                            <option value="send">Bot 回复</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="log-user-keyword">消息关键字</label>
                        <input
                            id="log-user-keyword"
                            type="text"
                            placeholder="筛选消息内容"
                            onkeydown="if(event.key==='Enter') loadLogUserMessages(1)"
                        >
                    </div>
                    <div class="form-group">
                        <label for="log-user-start">开始时间</label>
                        <input id="log-user-start" type="datetime-local" step="1" onchange="loadLogUserMessages(1)">
                    </div>
                    <div class="form-group">
                        <label for="log-user-end">结束时间</label>
                        <input id="log-user-end" type="datetime-local" step="1" onchange="loadLogUserMessages(1)">
                    </div>
                </div>

                <div class="form-actions log-user-actions">
                    <button class="btn btn-primary" type="button" onclick="loadLogUserMessages(1)">
                        <i class="fas fa-search"></i> 查询历史
                    </button>
                    <button class="btn btn-info" type="button" onclick="resetLogUserFilters()">
                        <i class="fas fa-undo"></i> 重置筛选
                    </button>
                    <button class="btn btn-secondary" type="button" onclick="scrollLogUserMessagesToBottom()">
                        <i class="fas fa-arrow-down"></i> 最新消息
                    </button>
                </div>

                <div id="log-user-meta" class="log-meta"></div>
                <div id="log-user-message-list" class="log-user-message-list">
                    <div class="empty-state">
                        <i class="fas fa-user-clock"></i>
                        <p>请选择用户</p>
                    </div>
                </div>
                <div id="log-user-pager" class="pagination" style="margin-top: 12px;"></div>
            </section>
        </div>
    </div>
</div>

<script>
window.__xiuxianLogsPageCleanup?.();

(function () {
const ansiUp = window.AnsiUp ? new window.AnsiUp() : null;
if (ansiUp) {
    ansiUp.use_classes = true;
}

let logsPageAbort = typeof AbortController !== 'undefined' ? new AbortController() : null;
let logsPageInitialized = false;

let currentPage = 1;
let currentTotal = 0;
const pageSize = 200;
let currentFile = '';
let logFileLabels = {};

let realtimeEnabled = false;
let realtimeTimer = null;
let realtimeOffset = 0;
let realtimeFile = '';

let currentLogMode = 'file';
let logUserRows = [];
let selectedLogUser = null;
let logUserPage = 1;
let logUserTotal = 0;
const logUserPageSize = 200;

const LOG_USER_SCENE_LABELS = {
    group: '群消息',
    private: '私聊消息',
    channel_group: '频道消息',
    channel_private: '频道私信'
};

function addLogsPageListener(target, type, handler, options = {}) {
    if (!target?.addEventListener) return;

    const opts = typeof options === 'boolean' ? { capture: options } : { ...options };
    if (logsPageAbort) {
        opts.signal = logsPageAbort.signal;
    }

    target.addEventListener(type, handler, opts);
}

function cleanupLogsPage() {
    realtimeEnabled = false;
    if (realtimeTimer) {
        clearInterval(realtimeTimer);
        realtimeTimer = null;
    }
    if (logsPageAbort) {
        logsPageAbort.abort();
        logsPageAbort = null;
    }
    if (window.__xiuxianLogsPageCleanup === cleanupLogsPage) {
        window.__xiuxianLogsPageCleanup = null;
    }
    if (window.__xiuxianPageCleanup === cleanupLogsPage) {
        window.__xiuxianPageCleanup = null;
    }
}

function fmtDateTimeLocalToBackend(val) {
    if (!val) return '';
    let s = val.replace('T', ' ');
    if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}$/.test(s)) s += ':00';
    return s;
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m]));
}

function switchLogMode(mode) {
    currentLogMode = mode === 'user' ? 'user' : 'file';
    document.getElementById('log-file-tab')?.classList.toggle('active', currentLogMode === 'file');
    document.getElementById('log-user-tab')?.classList.toggle('active', currentLogMode === 'user');
    document.getElementById('log-file-panel')?.classList.toggle('hidden', currentLogMode !== 'file');
    document.getElementById('log-user-panel')?.classList.toggle('hidden', currentLogMode !== 'user');

    if (currentLogMode === 'user' && !logUserRows.length) {
        searchLogUsers();
    }
}

function fmtTime(s) {
    if (!s) return '';
    return String(s).replace('T', ' ').slice(0, 19);
}

function shortTime(s) {
    const x = fmtTime(s);
    if (!x) return '';
    const today = new Date().toISOString().slice(0, 10);
    return x.startsWith(today) ? x.slice(11, 16) : x.slice(5, 16);
}

function getInitial(text, fallback = '?') {
    text = String(text || '').trim();
    return text ? text.slice(0, 1).toUpperCase() : fallback;
}

function isHttpUrl(url) {
    return /^https?:\/\//i.test(String(url || '').trim());
}

function renderAvatarImage(url) {
    return `<img class="avatar-img" src="${escapeHtml(url)}" alt="" loading="lazy">`;
}

function renderLogUserAvatar(user) {
    if (user?.avatar && isHttpUrl(user.avatar)) {
        return renderAvatarImage(user.avatar);
    }
    return escapeHtml(user?.avatar_text || getInitial(user?.title, '人'));
}

function setLogUserHeader(user) {
    const avatar = document.getElementById('log-user-avatar');
    const title = document.getElementById('log-user-title');
    const subtitle = document.getElementById('log-user-subtitle');

    if (!user) {
        avatar.innerText = '人';
        title.innerText = '请选择用户';
        subtitle.innerText = '按道号或 ID 搜索后查看消息历史';
        return;
    }

    avatar.innerHTML = renderLogUserAvatar(user);
    title.innerText = user.title || user.user_name || user.user_id || '未知用户';
    subtitle.innerText = user.subtitle || `ID: ${user.user_id || ''}`;
}

function renderLogUserList() {
    const list = document.getElementById('log-user-list');
    if (!logUserRows.length) {
        list.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash"></i><p>未找到用户</p></div>`;

        return `
            <div class="log-user-item ${active ? 'active' : ''}" onclick="selectLogUser(${idx})">

                <div class="log-user-item-info">
                    <div class="log-user-item-title">${escapeHtml(u.title || u.user_id || '未知用户')}</div>
                    <div class="log-user-item-subtitle">${escapeHtml(u.subtitle || '')}</div>
                    <div class="log-user-item-meta">${escapeHtml(meta)}${u.last_time ? ` ｜ ${escapeHtml(shortTime(u.last_time))}` : ''}</div>
                </div>
            </div>

}

async function searchLogUsers() {
    const list = document.getElementById('log-user-list');
    const query = document.getElementById('log-user-search-input').value.trim();
    list.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-spin"></i> 搜索中...</div>`;

function selectLogUser(index) {

function scrollLogUserMessagesToBottom() {

function decodeQQFaceExtText(ext) {
    try {
        let value = String(ext || '').replace(/\s+/g, '');
        value += '='.repeat((4 - value.length % 4) % 4);
        const binary = atob(value);
        const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
        const raw = new TextDecoder('utf-8').decode(bytes);
        const data = JSON.parse(raw);
        return String(data.text || '').trim();
    } catch (e) {
        return '';
    }
}

function stripQQFaceMarkup(text) {
    text = String(text || '');
    text = text.replace(
        /<faceType=\d+,\s*faceId=(?:"[^"]*"|'[^']*'|[^,>]+),\s*ext=(?:"([^"]*)"|'([^']*)'|([^>]+))>\s*/g,
        function(full, ext1, ext2, ext3) {
            const label = decodeQQFaceExtText(ext1 || ext2 || ext3 || '');
            return label ? `[表情:${label}]` : '';
        }
    );
    return text.replace(/\uFFFC/g, '').trim();
}

function normalizeLoggedHttpUrl(url) {
    return String(url || '').replace(/\s+/g, '').trim();
}

function decodeReprString(value) {
    return String(value || '')
        .replace(/\\r/g, '\r')
        .replace(/\\n/g, '\n')
        .replace(/\\t/g, '\t')
        .replace(/\\'/g, "'")
        .replace(/\\"/g, '"')
        .replace(/\\\\/g, '\\');
}

function extractReprField(dataBody, field) {
    dataBody = String(dataBody || '');
    const escapedField = String(field).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const singleRe = new RegExp(`['"]${escapedField}['"]\\s*:\\s*'((?:\\\\.|[^'])*)'`);
    const doubleRe = new RegExp(`['"]${escapedField}['"]\\s*:\\s*"((?:\\\\.|[^"])*)"`);
    const match = dataBody.match(singleRe) || dataBody.match(doubleRe);
    return match ? decodeReprString(match[1]) : '';
}

function extractAttachmentUrlFromData(dataBody) {
    for (const field of ['url', 'file', 'path', 'src']) {
        const value = extractReprField(dataBody, field);
        if (/^https?:\/\//i.test(value)) {
            return normalizeLoggedHttpUrl(value);
        }
    }
    return '';
}

function normalizeAttachmentRepr(text) {
    text = String(text || '');
    text = text.replace(
        /Attachment\(type=['"]([^'"]+)['"],\s*data=\{([\s\S]*?)\}\)/g,
        function(full, type, dataBody) {
            const url = extractAttachmentUrlFromData(dataBody);
            return url ? `<attachment[${type}]:${url}>` : '';
        }
    );
    text = text.replace(
        /\[(图片消息|语音消息|视频消息|文件消息|附件消息)\]\s*(https?:\/\/[^\s<>"']+)/g,
        function(full, label, url) {
            const typeMap = {
                '图片消息': 'image',
                '语音消息': 'audio',
                '视频消息': 'video',
                '文件消息': 'file',
                '附件消息': 'attachment'
            };
            return `<attachment[${typeMap[label] || 'attachment'}]:${normalizeLoggedHttpUrl(url)}>`;
        }
    );
    return text;
}

function getAttachmentLabel(type) {
    type = String(type || '').toLowerCase();
    const labelMap = {
        image: '图片消息',
        file: '文件消息',
        audio: '语音消息',
        record: '语音消息',
        voice: '语音消息',
        video: '视频消息',
        attachment: '附件消息'
    };
    return labelMap[type] || `${type}附件`;
}

function shouldProxyImageUrl(url) {
    try {
        const parsed = new URL(String(url || '').trim());
        const host = parsed.hostname.toLowerCase();
        return host === 'multimedia.nt.qq.com.cn' || host.endsWith('.qpic.cn');
    } catch (e) {
        return false;
    }
}

function getImageRenderUrl(url) {
    url = String(url || '').trim();
    if (!shouldProxyImageUrl(url)) return url;
    return `/api/messages/media_proxy?url=${encodeURIComponent(url)}`;
}

function renderAttachmentHtml(type, url) {
    type = String(type || '').toLowerCase();
    url = String(url || '').trim();
    if (!url) return '';

    const safeUrl = escapeHtml(url);
    const safeImageUrl = escapeHtml(getImageRenderUrl(url));
    const label = escapeHtml(getAttachmentLabel(type));

    if (type === 'image') {
        return `
            <div class="msg-media msg-image">
                <img src="${safeImageUrl}" alt="${label}" loading="lazy" onerror="this.closest('.msg-image')?.classList.add('load-failed')">
                <a class="msg-image-fallback" href="${safeUrl}" target="_blank" rel="noopener noreferrer">打开图片链接</a>
            </div>
        `;
    }

    if (type === 'audio' || type === 'record' || type === 'voice') {
        return `
            <div class="msg-media msg-audio">
                <div><i class="fas fa-microphone"></i> ${label}</div>
                <audio controls preload="none" style="max-width: 280px; width: 100%;"><source src="${safeUrl}"></audio>
            </div>
        `;
    }

    if (type === 'video') {
        return `
            <div class="msg-media msg-video">
                <div><i class="fas fa-video"></i> ${label}</div>
                <video controls preload="metadata" style="max-width: min(320px, 100%); max-height: 360px; border-radius: 8px; display: block;"><source src="${safeUrl}"></video>
            </div>
        `;
    }

    return `
        <div class="msg-media msg-file">
            <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="btn btn-info btn-sm">
                <i class="fas fa-paperclip"></i> ${label}
            </a>
        </div>
    `;
}

function looksLikeMarkdown(text) {
    text = String(text || '');
    return /(^#{1,6}\s)|(\*\*.+\*\*)|(```)|(^[-*]\s)|(\|.+\|)/m.test(text);
}

function renderMarkdownContent(text) {
    try {
        if (!window.marked) {
            return `<div class="msg-raw">${escapeHtml(text)}</div>`;
        }
        const raw = marked.parse(String(text || ''));
        const clean = window.DOMPurify ? DOMPurify.sanitize(raw) : raw;
        return `<div class="msg-md">${clean}</div>`;
    } catch (e) {
        return `<div class="msg-raw">${escapeHtml(text)}</div>`;
    }
}

function renderLogUserMessageContent(row) {
    let text = stripQQFaceMarkup(normalizeAttachmentRepr(row.display_content || row.content || ''));
    const attachmentRe = /<attachment\[([^\]]+)\]:(https?:\/\/[^>]+)>/g;

    if (attachmentRe.test(text)) {
        attachmentRe.lastIndex = 0;
        let html = '';
        let lastIndex = 0;
        let match;

        while ((match = attachmentRe.exec(text)) !== null) {
            const before = text.slice(lastIndex, match.index);
            if (before) {
                html += looksLikeMarkdown(before)
                    ? renderMarkdownContent(before)
                    : `<div class="msg-raw">${escapeHtml(before)}</div>`;
            }
            html += renderAttachmentHtml(match[1], match[2]);
            lastIndex = attachmentRe.lastIndex;
        }

        const rest = text.slice(lastIndex);
        if (rest) {
            html += looksLikeMarkdown(rest)
                ? renderMarkdownContent(rest)
                : `<div class="msg-raw">${escapeHtml(rest)}</div>`;
        }
        return html || `<div class="msg-raw">[空消息]</div>`;
    }

    if (row.content_format === 'markdown' || looksLikeMarkdown(text)) {
        return renderMarkdownContent(text);
    }

    return `<div class="msg-raw">${escapeHtml(text || '[空消息]')}</div>`;
}

function renderLogUserMessageRow(row, idx = 0) {
    const isSend = row.direction === 'send';
    const name = isSend
        ? (row.username || row.nickname || 'Bot')
        : (row.username || row.nickname || row.user_id || '未知用户');
    const avatarHtml = row.avatar && isHttpUrl(row.avatar)
        ? renderAvatarImage(row.avatar)
        : escapeHtml(getInitial(name, isSend ? '机' : '人'));
    const sceneText = LOG_USER_SCENE_LABELS[row.scene] || row.scene || '';
    const placeText = row.group_name || row.group_id || '';

    return `
        <div class="msg-row ${isSend ? 'send' : 'recv'}" data-msg-index="${idx}" data-row-id="${escapeHtml(row.id || '')}">
            <div class="msg-avatar">${avatarHtml}</div>
            <div class="msg-main">
                <div class="msg-meta">
                    <span class="msg-name">${escapeHtml(name)}</span>
                    <span>${escapeHtml(shortTime(row.created_at))}</span>
                    <span>${escapeHtml(row.adapter || '')}</span>
                    <span>${escapeHtml(sceneText)}</span>
                    ${placeText ? `<span>${escapeHtml(placeText)}</span>` : ''}
                </div>
                <div class="msg-bubble">${renderLogUserMessageContent(row)}</div>
                <div class="msg-extra">
                    ${isSend && row.source_message_id ? `回复源: ${escapeHtml(row.source_message_id)}` : ''}
                    ${!isSend && row.message_id ? `消息ID: ${escapeHtml(row.message_id)}` : ''}
                </div>
            </div>
        </div>
    `;
}

function renderLogUserMessageRows(rows) {
    let lastDate = '';
    let html = '';
    (rows || []).forEach((row, idx) => {
        const datePart = (row.created_at || '').slice(0, 10);
        if (datePart && datePart !== lastDate) {
            lastDate = datePart;
            html += `<div class="msg-date-divider"><span>${escapeHtml(datePart)}</span></div>`;
        }
        html += renderLogUserMessageRow(row, idx);
    });
    return html;
}

function renderLogUserPager() {
    const pager = document.getElementById('log-user-pager');
    const totalPages = Math.max(1, Math.ceil(logUserTotal / logUserPageSize));
    const maxShow = 10;
    let start = Math.max(1, logUserPage - 4);
    let end = Math.min(totalPages, start + maxShow - 1);
    if (end - start + 1 < maxShow) start = Math.max(1, end - maxShow + 1);

    let html = '';
    if (logUserPage > 1) {
        html += `<a href="javascript:void(0)" onclick="loadLogUserMessages(${logUserPage - 1})">上一页</a>`;
    }
    for (let i = start; i <= end; i++) {
        html += `<a href="javascript:void(0)" class="${i === logUserPage ? 'active' : ''}" onclick="loadLogUserMessages(${i})">${i}</a>`;
    }
    if (logUserPage < totalPages) {
        html += `<a href="javascript:void(0)" onclick="loadLogUserMessages(${logUserPage + 1})">下一页</a>`;
    }
    pager.innerHTML = html;
}

async function loadLogUserMessages(page = 1) {
    if (!selectedLogUser || !selectedLogUser.user_id) return;

    logUserPage = page;
    const box = document.getElementById('log-user-message-list');
    const meta = document.getElementById('log-user-meta');
    box.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-spin"></i> 读取消息中...</div>`;

    const qs = new URLSearchParams({
        user_id: selectedLogUser.user_id,
        scene: document.getElementById('log-user-scene').value,
        direction: document.getElementById('log-user-direction').value,
        keyword: document.getElementById('log-user-keyword').value.trim(),
        start: fmtDateTimeLocalToBackend(document.getElementById('log-user-start').value),
        end: fmtDateTimeLocalToBackend(document.getElementById('log-user-end').value),
        page: String(page),
        page_size: String(logUserPageSize)
    });

    try {
        const res = await fetch('/api/logs/user_messages?' + qs.toString());
        const data = await res.json();

        if (!data.success) {
            box.innerHTML = `<div class="error">读取失败：${escapeHtml(data.error || '未知错误')}</div>`;
            meta.innerText = '';
            return;
        }

        logUserTotal = data.total || 0;
        const rows = (data.rows || []).slice().reverse();
        meta.innerText = `用户：${selectedLogUser.title || selectedLogUser.user_id} ｜ 共 ${logUserTotal} 条 ｜ 第 ${data.page} 页`;

        if (!rows.length) {
            box.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无消息</p></div>`;
        } else {
            box.innerHTML = renderLogUserMessageRows(rows);
            scrollLogUserMessagesToBottom();
        }

        renderLogUserPager();
    } catch (e) {
        box.innerHTML = `<div class="error">请求异常：${escapeHtml(String(e))}</div>`;
        meta.innerText = '';
    }
}

function normalizeAnsi(s) {
    return String(s).replace(/(^|[^\x1b])\[(\d{1,3}(?:;\d{1,3})*)m/g, (m, p1, p2) => {
        return p1 + '\x1b[' + p2 + 'm';
    });
}

function ansiToHtmlSafe(text) {
    const fixed = normalizeAnsi(text || '');
    return ansiUp ? ansiUp.ansi_to_html(fixed) : escapeHtml(fixed);
}

function levelClass(level) {
    const lv = (level || 'UNKNOWN').toUpperCase();
    return `lv-${lv}`;
}

/* 新增：判断是否接近底部（智能跟随滚动） */
function isNearBottom(el, threshold = 100) {
    return (el.scrollHeight - el.scrollTop - el.clientHeight) <= threshold;
}

/* 前端本地忽略（双保险） */
function shouldIgnoreRow(row) {
    const ignoreUnknown = document.getElementById('ignore-unknown')?.checked;
    const ignoreKeywordsRaw = (document.getElementById('ignore-keywords')?.value || '').trim();

    const level = (row.level || '').toUpperCase();
    const text = String(row.text || '');

    if (ignoreUnknown && level === 'UNKNOWN') return true;

    if (ignoreKeywordsRaw) {
        const words = ignoreKeywordsRaw.split('|').map(s => s.trim()).filter(Boolean);
        for (const w of words) {
            if (text.includes(w)) return true;
        }
    }
    return false;
}

function renderRows(rows) {
    rows = (rows || []).filter(r => !shouldIgnoreRow(r));
    if (rows.length === 0) {
        return `<div class="loading">无匹配日志</div>`;
    }

    return rows.map(r => {
        const t = r.time || '--';
        const lv = (r.level || 'UNKNOWN').toUpperCase();
        const htmlText = ansiToHtmlSafe(r.text || '');
        return `
            <div class="log-line">
                <span class="log-prefix">[${escapeHtml(t)}]</span>
                <span class="log-level ${levelClass(lv)}">${escapeHtml(lv)}</span>
                <span class="log-text">${htmlText}</span>
            </div>
        `;
    }).join('');
}

/* 关键修复：仅在“本来就在底部附近”时自动滚动 */
function appendRows(rows) {
    rows = (rows || []).filter(r => !shouldIgnoreRow(r));
    if (!rows.length) return;

    const box = document.getElementById('log-result');
    const shouldAutoScroll = isNearBottom(box, 100);

    if (box.querySelector('.loading') || box.querySelector('.error')) {
        box.innerHTML = '';
    }

    const html = rows.map(r => {
        const t = r.time || '--';
        const lv = (r.level || 'UNKNOWN').toUpperCase();
        const htmlText = ansiToHtmlSafe(r.text || '');
        return `
            <div class="log-line">
                <span class="log-prefix">[${escapeHtml(t)}]</span>
                <span class="log-level ${levelClass(lv)}">${escapeHtml(lv)}</span>
                <span class="log-text">${htmlText}</span>
            </div>
        `;
    }).join('');

    box.insertAdjacentHTML('beforeend', html);

    const lines = box.querySelectorAll('.log-line');
    const maxLines = 2000;
    if (lines.length > maxLines) {
        const removeCount = lines.length - maxLines;
        for (let i = 0; i < removeCount; i++) {
            if (lines[i] && lines[i].parentNode) lines[i].parentNode.removeChild(lines[i]);
        }
    }

    if (shouldAutoScroll) {
        box.scrollTop = box.scrollHeight;
    }
}

function renderPager() {
    const pager = document.getElementById('pager');
    const totalPages = Math.max(1, Math.ceil(currentTotal / pageSize));
    const maxShow = 12;

    let start = Math.max(1, currentPage - 5);
    let end = Math.min(totalPages, start + maxShow - 1);
    if (end - start + 1 < maxShow) start = Math.max(1, end - maxShow + 1);

    let html = '';
    if (currentPage > 1) {
        html += `<a href="javascript:void(0)" onclick="loadLogs(${currentPage - 1})">上一页</a>`;
    }
    for (let i = start; i <= end; i++) {
        html += `<a href="javascript:void(0)" class="${i === currentPage ? 'active' : ''}" onclick="loadLogs(${i})">${i}</a>`;
    }
    if (currentPage < totalPages) {
        html += `<a href="javascript:void(0)" onclick="loadLogs(${currentPage + 1})">下一页</a>`;
    }
    pager.innerHTML = html;
}

async function loadLogFiles() {
    const sel = document.getElementById('log-file');
    sel.innerHTML = `<option value="">加载中...</option>`;
    logFileLabels = {};

    try {
        const res = await fetch('/api/logs/files');
        const data = await res.json();

        if (!data.success) {
            sel.innerHTML = `<option value="">加载失败</option>`;
            return;
        }

        if (!data.files || data.files.length === 0) {
            sel.innerHTML = `<option value="">未找到日志文件</option>`;
            return;
        }

        sel.innerHTML = data.files.map(f => {
            const id = f.id || f.path || f.name;
            const label = f.display_name || f.name || id;
            logFileLabels[id] = label;
            return `<option value="${escapeHtml(id)}">${escapeHtml(label)} (${escapeHtml(f.mtime)})</option>`;
        }).join('');

        currentFile = data.files[0].id || data.files[0].path || data.files[0].name;
    } catch (e) {
        sel.innerHTML = `<option value="">加载异常</option>`;
    }
}

function getLogFileLabel(file) {
    return logFileLabels[file] || file || '';
}

async function loadLogs(page = 1, fromRealtime = false) {
    if (!fromRealtime && realtimeEnabled) {
        await toggleRealtime();
    }

    currentPage = page;

    const file = document.getElementById('log-file').value;
    const keyword = document.getElementById('keyword').value.trim();
    const level = document.getElementById('level').value;
    const start = fmtDateTimeLocalToBackend(document.getElementById('start').value);
    const end = fmtDateTimeLocalToBackend(document.getElementById('end').value);

    if (!file) return;

    const qs = new URLSearchParams({
        file, keyword, level, start, end,
        page: String(page),
        page_size: String(pageSize)
    });

    const box = document.getElementById('log-result');
    const meta = document.getElementById('log-meta');
    box.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-spin"></i> 读取中...</div>`;

    try {
        const res = await fetch('/api/logs/read?' + qs.toString());
        const data = await res.json();

        if (!data.success) {
            box.innerHTML = `<div class="error">读取失败：${escapeHtml(data.error || '未知错误')}</div>`;
            meta.innerText = '';
            return;
        }

        currentTotal = data.total || 0;
        currentFile = data.file || file;

        meta.innerText = `文件：${data.display_name || getLogFileLabel(file)} ｜ 共 ${currentTotal} 条 ｜ 第 ${data.page} 页`;
        box.innerHTML = renderRows(data.rows || []);
        renderPager();
    } catch (e) {
        box.innerHTML = `<div class="error">请求异常：${escapeHtml(String(e))}</div>`;
        meta.innerText = '';
    }
}

async function getLastPageNumber() {
    const file = document.getElementById('log-file').value;
    const keyword = document.getElementById('keyword').value.trim();
    const level = document.getElementById('level').value;
    const start = fmtDateTimeLocalToBackend(document.getElementById('start').value);
    const end = fmtDateTimeLocalToBackend(document.getElementById('end').value);

    if (!file) return 1;

    const qs = new URLSearchParams({
        file, keyword, level, start, end,
        page: "1",
        page_size: String(pageSize)
    });

    const res = await fetch('/api/logs/read?' + qs.toString());
    const data = await res.json();
    if (!data.success) throw new Error(data.error || '获取总页失败');

    const total = data.total || 0;
    return Math.max(1, Math.ceil(total / pageSize));
}

async function jumpToLastPageAndLoad() {
    const lastPage = await getLastPageNumber();
    await loadLogs(lastPage, true);
    scrollToBottom();
}

async function getCurrentFileSize(fileName) {
    const res = await fetch('/api/logs/files');
    const data = await res.json();
    if (!data.success || !data.files) return 0;
    const hit = data.files.find(f => (f.id || f.path || f.name) === fileName || f.name === fileName);
    return hit ? (hit.size || 0) : 0;
}

async function pullRealtimeIncrement() {
    if (!realtimeEnabled) return;

    const file = document.getElementById('log-file').value;
    const keyword = document.getElementById('keyword').value.trim();
    const level = document.getElementById('level').value;
    const start = fmtDateTimeLocalToBackend(document.getElementById('start').value);
    const end = fmtDateTimeLocalToBackend(document.getElementById('end').value);

    const ignoreUnknown = document.getElementById('ignore-unknown')?.checked ? '1' : '0';
    const ignoreKeywords = (document.getElementById('ignore-keywords')?.value || '').trim();

    if (file !== realtimeFile) {
        realtimeFile = file;
        realtimeOffset = await getCurrentFileSize(file); // 切文件从末尾开始
        return;
    }

    const qs = new URLSearchParams({
        file,
        offset: String(realtimeOffset),
        keyword,
        level,
        start,
        end,
        ignore_unknown: ignoreUnknown,
        ignore_keywords: ignoreKeywords
    });

    const res = await fetch('/api/logs/tail?' + qs.toString());
    const data = await res.json();
    if (!data.success) return;

    realtimeOffset = data.next_offset || realtimeOffset;
    appendRows(data.lines || []);

    const meta = document.getElementById('log-meta');
    meta.innerText = `文件：${data.display_name || getLogFileLabel(file)} ｜ 实时模式（增量） ｜ offset: ${realtimeOffset}`;
}

async function toggleRealtime() {
    const btn = document.getElementById('realtime-btn');
    const file = document.getElementById('log-file').value;

    if (!file) {
        alert('请先选择日志文件');
        return;
    }

    if (!realtimeEnabled) {
        realtimeEnabled = true;
        btn.classList.remove('btn-warning');
        btn.classList.add('btn-success');
        btn.innerHTML = '<i class="fas fa-stop-circle"></i> 实时日志：开启';

        // 先到最后页显示现场
        try {
            await jumpToLastPageAndLoad();
        } catch (e) {
            console.error('跳转最后页失败', e);
        }

        // 然后从文件末尾开始只读新增
        realtimeFile = file;
        realtimeOffset = await getCurrentFileSize(file);

        realtimeTimer = setInterval(async () => {
            try {
                await pullRealtimeIncrement();
            } catch (e) {
                console.error('实时增量失败', e);
            }
        }, 1000);

    } else {
        realtimeEnabled = false;
        if (realtimeTimer) {
            clearInterval(realtimeTimer);
            realtimeTimer = null;
        }
        btn.classList.remove('btn-success');
        btn.classList.add('btn-warning');
        btn.innerHTML = '<i class="fas fa-bolt"></i> 实时日志：关闭';
    }
}

function resetFilters() {
    document.getElementById('keyword').value = '';
    document.getElementById('level').value = 'ALL';
    document.getElementById('start').value = '';
    document.getElementById('end').value = '';
    document.getElementById('ignore-unknown').checked = true;
    document.getElementById('ignore-keywords').value = '';
    loadLogs(1);
}

function scrollToBottom() {
    const box = document.getElementById('log-result');
    box.scrollTop = box.scrollHeight;
}

async function initLogsPage() {
    if (logsPageInitialized) return;
    logsPageInitialized = true;
    addLogsPageListener(window, 'beforeunload', cleanupLogsPage);
    await loadLogFiles();
    loadLogs(1);
}

window.switchLogMode = switchLogMode;
window.searchLogUsers = searchLogUsers;
window.selectLogUser = selectLogUser;
window.loadLogUserMessages = loadLogUserMessages;
window.resetLogUserFilters = resetLogUserFilters;
window.scrollLogUserMessagesToBottom = scrollLogUserMessagesToBottom;
window.loadLogs = loadLogs;
window.resetFilters = resetFilters;
window.scrollToBottom = scrollToBottom;
window.toggleRealtime = toggleRealtime;
window.__xiuxianLogsPageCleanup = cleanupLogsPage;
window.__xiuxianPageCleanup = cleanupLogsPage;

if (document.readyState === 'loading') {
    addLogsPageListener(document, 'DOMContentLoaded', initLogsPage, { once: true });
} else {
    initLogsPage();
}
})();
</script>
