{% extends "base.html" %}

{% block content %}
<div class="log-container-wrapper">
    <!-- 顶部控制栏 -->
    <div class="log-toolbar">
        <div class="toolbar-row main-controls">
            <button id="sidebar-toggle" class="toolbar-btn">
                <i class="fas fa-file-alt"></i> <span class="hide-mobile">文件</span>
            </button>
            <div class="auto-switches">
                <label><input type="checkbox" id="auto-scroll" checked> 滚动</label>
                <label><input type="checkbox" id="auto-refresh"> 监控(1s)</label>
            </div>
            <button onclick="loadLogContent()" class="toolbar-btn refresh-btn">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
        
        <div class="toolbar-row filter-row">
            <div class="filter-scroll-wrapper">
                <button class="f-btn active" data-level="ALL">全部</button>
                <button class="f-btn d-border" data-level="DEBUG">DEBUG</button>
                <button class="f-btn i-border" data-level="INFO">INFO</button>
                <button class="f-btn s-border" data-level="SUCCESS">SUCCESS</button>
                <button class="f-btn w-border" data-level="WARNING">WARN</button>
                <button class="f-btn e-border" data-level="ERROR">ERROR</button>
            </div>
        </div>
    </div>

    <!-- 主体区域 -->
    <div class="log-main">
        <!-- 侧边文件抽屉 -->
        <div id="log-sidebar" class="log-sidebar">
            <div class="sidebar-header">
                <span>选择日志文件</span>
                <button id="sidebar-close">&times;</button>
            </div>
            <div id="log-file-list" class="file-list"></div>
        </div>
        
        <!-- 日志显示区 (手机端现在是 100% 宽) -->
        <div id="log-viewport" class="log-viewport">
            <div id="log-content" class="log-terminal">
                <div class="empty-state">请先从左侧选择一个日志文件内容内容</div>
            </div>
        </div>
        
        <!-- 遮罩层 (手机端侧边栏打开时) -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
    </div>
</div>

<style>
    /* 核心容器 */
    .log-container-wrapper {
        display: flex;
        flex-direction: column;
        height: 85vh;
        background: #1e1e1e;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #333;
    }

    /* 顶部工具栏适配 */
    .log-toolbar {
        background: #2d2d2d;
        border-bottom: 1px solid #444;
        padding: 5px;
    }
    .toolbar-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 5px;
    }
    .main-controls { justify-content: space-between; }
    
    /* 筛选按钮横向滚动 (手机端核心) */
    .filter-row { overflow-x: auto; padding-bottom: 8px; }
    .filter-scroll-wrapper { display: flex; gap: 5px; flex-wrap: nowrap; }

    .f-btn {
        background: #3c3c3c;
        border: none;
        color: #aaa;
        padding: 5px 12px;
        border-radius: 4px;
        font-size: 12px;
        white-space: nowrap;
        cursor: pointer;
    }
    .f-btn.active { background: var(--accent-color); color: #fff; }
    .d-border { border-bottom: 2px solid #666; }
    .i-border { border-bottom: 2px solid #2196f3; }
    .s-border { border-bottom: 2px solid #4caf50; }
    .w-border { border-bottom: 2px solid #ffc107; }
    .e-border { border-bottom: 2px solid #f44336; }

    .auto-switches {
        display: flex;
        gap: 10px;
        color: #ccc;
        font-size: 12px;
        background: #1e1e1e;
        padding: 4px 10px;
        border-radius: 20px;
    }
    .toolbar-btn { background: #444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

    /* 主体布局 */
    .log-main { flex: 1; display: flex; position: relative; overflow: hidden; }

    /* 侧边栏抽屉化 (手机端) */
    .log-sidebar {
        width: 250px;
        background: #252526;
        border-right: 1px solid #333;
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease;
        z-index: 1000;
    }
    .sidebar-header { display: none; padding: 15px; border-bottom: 1px solid #333; justify-content: space-between; color: #fff; }
    .file-list { flex: 1; overflow-y: auto; }
    .file-item { padding: 12px; border-bottom: 1px solid #2d2d2d; cursor: pointer; color: #aaa; transition: 0.2s; }
    .file-item:hover { background: #2d2d2d; color: #fff; }
    .file-item.active { background: #37373d; color: #fff; border-left: 4px solid var(--accent-color); }
    .file-item small { display: block; font-size: 10px; color: #666; margin-top: 4px; }

    /* 内容区 */
    .log-viewport { flex: 1; overflow-y: auto; padding: 10px; background: #1e1e1e; scroll-behavior: smooth; }
    .log-terminal {
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 12px;
        line-height: 1.5;
        color: #d4d4d4;
        white-space: pre-wrap;
        word-break: break-all;
    }
    .log-line { border-bottom: 1px solid #252525; padding: 2px 0; }
    .empty-state { text-align: center; color: #555; margin-top: 50px; }

    /* 侧边栏遮罩 */
    .sidebar-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }

    /* ANSI 颜色映射 */
    .ansi-1 { font-weight: bold; }
    .ansi-31 { color: #f44747; } .ansi-32 { color: #608b4e; } .ansi-33 { color: #d7ba7d; }
    .ansi-34 { color: #569cd6; } .ansi-35 { color: #c586c0; } .ansi-36 { color: #4ec9b0; }
    .ansi-90 { color: #808080; } .ansi-94 { color: #9cdcfe; }
    .ansi-truecolor-bg { padding: 1px 3px; border-radius: 2px; }

    /* 移动端 (手机) 媒体查询 */
    @media (max-width: 768px) {
        .log-sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
        .log-sidebar.active { transform: translateX(0); }
        .sidebar-header { display: flex; }
        .sidebar-overlay.active { display: block; }
        .hide-mobile { display: none; }
        .log-terminal { font-size: 11px; } /* 缩小字体适应窄屏 */
        .f-btn { padding: 4px 10px; }
    }
</style>

<script>
let activeFile = '';
let filterLevel = 'ALL';
let currentLines = [];
let refreshTimer = null;

// ANSI 解析
function parseAnsiHtml(text) {
    if (!text) return '';
    let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    html = html.replace(/\x1b\[48;2;(\d+);(\d+);(\d+)m/g, (m, r, g, b) => 
        `<span class="ansi-truecolor-bg" style="background-color: rgb(${r},${g},${b}); color: #fff;">`);
    html = html.replace(/\x1b\[([0-9;]*)m/g, (match, p1) => {
        if (!p1 || p1 === '0') return '</span>';
        return `<span class="${p1.split(';').map(c => 'ansi-' + c).join(' ')}">`;
    });
    const open = (html.match(/<span/g) || []).length;
    const close = (html.match(/<\/span/g) || []).length;
    for (let i = 0; i < open - close; i++) html += '</span>';
    return html;
}

async function initFiles() {
    const res = await fetch('/get_log_list');
    const data = await res.json();
    if (data.success) {
        const list = document.getElementById('log-file-list');
        list.innerHTML = data.logs.map(f => `
            <div class="file-item ${activeFile === f.name ? 'active' : ''}" onclick="selectFile('${f.name}')">
                <strong>${f.name}</strong>
                <small>${f.mtime} | ${f.size}</small>
            </div>
        `).join('');
        if (!activeFile && data.logs.length > 0) selectFile(data.logs[0].name);
    }
}

function selectFile(name) {
    activeFile = name;
    document.querySelectorAll('.file-item').forEach(el => el.classList.toggle('active', el.innerText.includes(name)));
    // 关闭侧边栏
    toggleSidebar(false);
    loadLogContent();
}

async function loadLogContent() {
    if (!activeFile) return;
    const res = await fetch(`/read_log?filename=${encodeURIComponent(activeFile)}`);
    const data = await res.json();
    if (data.success) {
        currentLines = data.lines;
        renderLogs();
    }
}

function renderLogs() {
    const container = document.getElementById('log-content');
    const viewport = document.getElementById('log-viewport');
    const autoScroll = document.getElementById('auto-scroll').checked;

    let filtered = currentLines;
    if (filterLevel !== 'ALL') {
        filtered = currentLines.filter(line => line.includes(`[${filterLevel}]` || line.includes(`[1m${filterLevel}`)));
    }

    container.innerHTML = filtered.length ? filtered.map(line => `<div class="log-line">${parseAnsiHtml(line)}</div>`).join('') : '<div class="empty-state">无符合条件的日志</div>';

    if (autoScroll) viewport.scrollTop = viewport.scrollHeight;
}

// 侧边栏开关
function toggleSidebar(show) {
    document.getElementById('log-sidebar').classList.toggle('active', show);
    document.getElementById('sidebar-overlay').classList.toggle('active', show);
}

document.getElementById('sidebar-toggle').onclick = () => toggleSidebar(true);
document.getElementById('sidebar-close').onclick = () => toggleSidebar(false);
document.getElementById('sidebar-overlay').onclick = () => toggleSidebar(false);

// 筛选功能
document.querySelectorAll('.f-btn').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        filterLevel = this.dataset.level;
        renderLogs();
    };
});

// 自动监控
document.getElementById('auto-refresh').onchange = function() {
    if (this.checked) refreshTimer = setInterval(loadLogContent, 1000);
    else clearInterval(refreshTimer);
};

document.addEventListener('DOMContentLoaded', initFiles);
</script>
{% endblock %}
