{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>欢迎, 管理员 {{ admin_id }}</h2>
    
    <div style="margin-bottom: 20px; text-align: center;">
        <p><strong>GitHub 仓库:</strong> 
            <a href="https://github.com/liyw0205/nonebot_plugin_xiuxian_2_pmv" target="_blank" class="btn btn-info btn-sm">
                <i class="fab fa-github"></i> nonebot_plugin_xiuxian_2_pmv
            </a>
        </p>
    </div>

    <!-- 统计数据 -->
    <div class="stats-grid">
        <!-- 机器人与消息统计卡片 -->
        <div class="stat-card">
            <div class="stat-icon" style="background: #673ab7;">
                <i class="fas fa-robot"></i>
            </div>
            <div class="stat-content">
                <h3 id="bot-count">0</h3>
                <p>在线机器人</p>
                <!-- 消息收发统计 -->
                <div style="font-size: 0.85rem; margin-top: 5px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 5px;">
                    <div style="display: flex; justify-content: space-between;">
                        <span style="color:var(--text-secondary)"><i class="fas fa-download" style="color:#4caf50;width:15px"></i> 接收:</span>
                        <strong id="msg-received">0</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span style="color:var(--text-secondary)"><i class="fas fa-upload" style="color:#2196f3;width:15px"></i> 发送:</span>
                        <strong id="msg-sent">0</strong>
                    </div>
                </div>
                <div id="bot-list-detail" style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 8px; font-style: italic;">
                    等待连接...
                </div>
            </div>
        </div>

        <!-- 存量统计 -->
        <div class="stat-card">
            <div class="stat-icon" style="background: var(--success-color);">
                <i class="fas fa-users"></i>
            </div>
            <div class="stat-content">
                <h3 id="total-users">0</h3>
                <p>总用户数</p>
            </div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon" style="background: var(--info-color);">
                <i class="fas fa-landmark"></i>
            </div>
            <div class="stat-content">
                <h3 id="total-sects">0</h3>
                <p>宗门数量</p>
            </div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon" style="background: var(--warning-color);">
                <i class="fas fa-chart-line"></i>
            </div>
            <div class="stat-content">
                <h3 id="active-users">0</h3>
                <p>今日活跃用户</p>
                <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 5px;">
                    昨日活跃: <span id="yesterday-users">0</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 系统监控区 (保持您原有的布局) -->
    <div class="card" style="margin-top: 20px;">
        <h3><i class="fas fa-chart-pie"></i> 系统监控</h3>
        <div class="monitor-grid">
            <div class="monitor-card">
                <h4><i class="fas fa-microchip"></i> CPU使用率</h4>
                <div class="monitor-content">
                    <div class="circular-progress" id="cpu-progress">
                        <div class="progress-circle">
                            <svg viewBox="0 0 100 100"><circle class="progress-bg" cx="50" cy="50" r="45"></circle><circle class="progress-fill" cx="50" cy="50" r="45"></circle></svg>
                            <div class="progress-text"><span id="cpu-percent">0%</span></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="monitor-card">
                <h4><i class="fas fa-memory"></i> 内存使用</h4>
                <div class="monitor-content">
                    <div class="circular-progress" id="mem-progress">
                        <div class="progress-circle">
                            <svg viewBox="0 0 100 100"><circle class="progress-bg" cx="50" cy="50" r="45"></circle><circle class="progress-fill" cx="50" cy="50" r="45"></circle></svg>
                            <div class="progress-text"><span id="memory-percent">0%</span></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="monitor-card">
                <h4><i class="fas fa-clock"></i> 运行时间</h4>
                <div class="monitor-content" style="text-align: center;">
                    <p style="font-size: 0.9rem; margin-bottom: 5px;">Bot 已运行:</p>
                    <h4 id="bot-uptime-val" style="color:var(--accent-color)">--</h4>
                    <p style="font-size: 0.8rem; color: gray; margin-top: 10px;">NoneBot2: <span id="nb-ver-val">--</span></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 快捷操作区... (保留您原来的内容) -->
</div>

<script>
async function loadStats() {
    try {
        const response = await fetch('/get_stats');
        const data = await response.json();
        
        if (data.success) {
            // 更新基础统计
            document.getElementById('total-users').textContent = data.total_users.toLocaleString();
            document.getElementById('total-sects').textContent = data.total_sects.toLocaleString();
            document.getElementById('active-users').textContent = data.active_users.toLocaleString();
            document.getElementById('yesterday-users').textContent = data.yesterday_users.toLocaleString();
            
            // 更新消息收发
            document.getElementById('msg-received').textContent = data.msg_received.toLocaleString();
            document.getElementById('msg-sent').textContent = data.msg_sent.toLocaleString();
            
            // 更新 Bot 信息
            document.getElementById('bot-count').textContent = data.bot_count;
            document.getElementById('bot-uptime-val').textContent = data.bot_uptime;
            document.getElementById('nb-ver-val').textContent = data.nb_version;
            
            const botDetail = document.getElementById('bot-list-detail');
            if (data.bots && data.bots.length > 0) {
                botDetail.innerHTML = data.bots.map(b => `<div>${b.bot_id} <small>(${b.adapter})</small></div>`).join('');
            } else {
                botDetail.innerHTML = '无机器人在线';
            }
        }
    } catch (e) { console.error('加载统计失败', e); }
}

function updateCircularProgress(containerId, percent) {
    const fill = document.querySelector(`#${containerId} .progress-fill`);
    const text = document.querySelector(`#${containerId} .progress-text span`);
    const circumference = 2 * Math.PI * 45;
    fill.style.strokeDashoffset = circumference - (percent / 100 * circumference);
    text.textContent = `${Math.round(percent)}%`;
}

async function loadMonitor() {
    try {
        const response = await fetch('/get_system_info_extended');
        const data = await response.json();
        if (data.success) {
            updateCircularProgress('cpu-progress', parseFloat(data.cpu_info['CPU使用率']));
            updateCircularProgress('mem-progress', parseFloat(data.mem_info['内存使用率']));
        }
    } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => {
    loadStats();
    loadMonitor();
    setInterval(loadStats, 5000); // 5秒刷新一次基础统计（含消息数）
    setInterval(loadMonitor, 3000); // 3秒刷新一次硬件监控
});
</script>
{% endblock %}
