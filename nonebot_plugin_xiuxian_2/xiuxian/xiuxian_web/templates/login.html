{% extends "base.html" %}

{% block content %}
<div class="login-shell">
    <section class="card login-card">
        <div class="login-brand">
            <span class="brand-mark"><i class="fas fa-mountain-sun"></i></span>
            <div>
                <h1 class="page-title">管理员登录</h1>
                <p class="page-subtitle">使用 NoneBot 超级用户 ID 和独立面板密码登录。</p>
            </div>
        </div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="admin_id">管理员 ID</label>
                <input type="text" id="admin_id" name="admin_id" required autofocus autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">面板密码</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-right-to-bracket"></i> 登录
                </button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
