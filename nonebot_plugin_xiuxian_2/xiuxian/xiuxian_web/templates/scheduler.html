{% extends "base.html" %}
{% block title %}定时任务 - 修仙管理面板{% endblock %}
{% block content %}
<section class="page-hero scheduler-hero">
    <div>
        <p class="page-kicker">Scheduler</p>
        <h1 class="page-title">定时任务</h1>
        <p class="page-subtitle">查看、启停、改计划并手动运行后台任务。点选「每小时 / 每天 / 每周」等常用周期即可保存。</p>
    </div>
    <div class="hero-actions scheduler-hero-actions">
        <span class="status-pill" id="schedulerStatTotal"><i class="fas fa-clock"></i> —</span>
        <span class="status-pill" id="schedulerStatEnabled"><i class="fas fa-toggle-on"></i> —</span>
        <button type="button" class="btn btn-secondary" id="schedulerRefresh">
            <i class="fas fa-rotate"></i> 刷新
        </button>
    </div>
</section>

<div id="schedulerToast" class="alert scheduler-toast" hidden></div>

<section class="card scheduler-toolbar-card">
    <div class="scheduler-toolbar">
        <div class="form-group scheduler-search-group">
            <label for="schedulerSearch">筛选</label>
            <input id="schedulerSearch" type="search" placeholder="任务名 / ID，如 鬼市、备份、宗门">
        </div>
        <div class="scheduler-filter-chips" role="group" aria-label="状态筛选">
            <button type="button" class="chip is-active" data-filter="all">全部</button>
            <button type="button" class="chip" data-filter="enabled">仅启用</button>
            <button type="button" class="chip" data-filter="disabled">仅禁用</button>
            <button type="button" class="chip" data-filter="editable">可改计划</button>
        </div>
    </div>
</section>

<section class="scheduler-list" id="schedulerList" aria-live="polite">
    <div class="scheduler-empty">加载中…</div>
</section>

<script>
(function () {
    const listEl = document.getElementById('schedulerList');
    const toast = document.getElementById('schedulerToast');
    const refresh = document.getElementById('schedulerRefresh');
    const searchInput = document.getElementById('schedulerSearch');
    const statTotal = document.getElementById('schedulerStatTotal');
    const statEnabled = document.getElementById('schedulerStatEnabled');

    // 常用计划：点一下即选中，再点「保存计划」
    const PRESETS = [
        { key: 'hourly', label: '每小时', hint: '每小时整点' },
        { key: 'every_2h', label: '每2小时', hint: '0,2,4…点' },
        { key: 'every_4h', label: '每4小时', hint: '0,4,8…点' },
        { key: 'every_6h', label: '每6小时', hint: '0,6,12,18点' },
        { key: 'every_12h', label: '每12小时', hint: '0点/12点' },
        { key: 'daily', label: '每天', hint: '每天 00:00' },
        { key: 'daily_8', label: '每天8点', hint: '每天 08:00' },
        { key: 'daily_12', label: '每天12点', hint: '每天 12:00' },
        { key: 'weekly', label: '每周一', hint: '周一 00:00' },
        { key: 'every_30m', label: '每30分钟', hint: '间隔 30 分' },
        { key: 'every_10m', label: '每10分钟', hint: '间隔 10 分' },
        { key: 'custom', label: '自定义', hint: '手写 cron' }
    ];

    const PRESET_FIELDS = {
        hourly: { minute: '0', hour: '*', day: '*', month: '*', day_of_week: '*', second: '0' },
        every_2h: { minute: '0', hour: '*/2', day: '*', month: '*', day_of_week: '*', second: '0' },
        every_4h: { minute: '0', hour: '*/4', day: '*', month: '*', day_of_week: '*', second: '0' },
        every_6h: { minute: '0', hour: '*/6', day: '*', month: '*', day_of_week: '*', second: '0' },
        every_12h: { minute: '0', hour: '*/12', day: '*', month: '*', day_of_week: '*', second: '0' },
        daily: { minute: '0', hour: '0', day: '*', month: '*', day_of_week: '*', second: '0' },
        daily_8: { minute: '0', hour: '8', day: '*', month: '*', day_of_week: '*', second: '0' },
        daily_12: { minute: '0', hour: '12', day: '*', month: '*', day_of_week: '*', second: '0' },
        weekly: { minute: '0', hour: '0', day: '*', month: '*', day_of_week: 'mon', second: '0' }
    };

    let jobsCache = [];
    let statusFilter = 'all';
    let searchText = '';

    function text(value) {
        return String(value == null ? '' : value);
    }

    function escapeHtml(value) {
        const el = document.createElement('div');
        el.textContent = text(value);
        return el.innerHTML;
    }

    function showToast(message, ok) {
        toast.hidden = false;
        toast.textContent = message;
        toast.className = 'alert scheduler-toast ' + (ok ? 'alert-success' : 'alert-error');
        clearTimeout(showToast._t);
        showToast._t = setTimeout(function () { toast.hidden = true; }, 3500);
    }

    function formatNextRun(value) {
        if (!value) return '已暂停';
        const raw = text(value);
        const d = new Date(raw);
        if (!Number.isNaN(d.getTime())) {
            const pad = function (n) { return String(n).padStart(2, '0'); };
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
                ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        }
        return raw;
    }

    function fieldsToExpression(fields) {
        const f = fields || {};
        return [
            f.minute != null ? f.minute : '*',
            f.hour != null ? f.hour : '*',
            f.day != null ? f.day : '*',
            f.month != null ? f.month : '*',
            f.day_of_week != null ? f.day_of_week : '*'
        ].join(' ');
    }

    function expressionToFields(expression) {
        const parts = String(expression || '').trim().split(/\s+/);
        if (parts.length !== 5) return null;
        return {
            minute: parts[0],
            hour: parts[1],
            day: parts[2],
            month: parts[3],
            day_of_week: parts[4],
            second: '0'
        };
    }

    function detectPreset(trigger) {
        if (!trigger) return 'custom';
        if (trigger.type === 'interval') {
            const s = Number(trigger.seconds);
            if (s === 600) return 'every_10m';
            if (s === 1800) return 'every_30m';
            if (s === 3600) return 'hourly';
            return 'custom';
        }
        if (trigger.type !== 'cron') return 'custom';
        const f = trigger.fields || {};
        const norm = {
            minute: String(f.minute != null ? f.minute : '*'),
            hour: String(f.hour != null ? f.hour : '*'),
            day: String(f.day != null ? f.day : '*'),
            month: String(f.month != null ? f.month : '*'),
            day_of_week: String(f.day_of_week != null ? f.day_of_week : '*')
        };
        // * and */1 等价
        function eq(a, b) {
            const x = a === '*/1' ? '*' : a;
            const y = b === '*/1' ? '*' : b;
            return x === y;
        }
        for (const key of Object.keys(PRESET_FIELDS)) {
            const p = PRESET_FIELDS[key];
            if (
                eq(norm.minute, p.minute) &&
                eq(norm.hour, p.hour) &&
                eq(norm.day, p.day) &&
                eq(norm.month, p.month) &&
                eq(norm.day_of_week, p.day_of_week)
            ) {
                return key;
            }
        }
        return 'custom';
    }

    function triggerText(trigger) {
        if (!trigger) return '未知';
        if (trigger.summary) return trigger.summary;
        if (trigger.type === 'interval') {
            const n = Number(trigger.seconds) || 0;
            if (n % 86400 === 0) return '每 ' + (n / 86400) + ' 天';
            if (n % 3600 === 0) return '每 ' + (n / 3600) + ' 小时';
            if (n % 60 === 0) return '每 ' + (n / 60) + ' 分钟';
            return '每 ' + n + ' 秒';
        }
        if (trigger.type === 'cron') {
            return fieldsToExpression(trigger.fields);
        }
        return trigger.description || trigger.type || '不可编辑';
    }

    function triggerForm(trigger) {
        const editable = trigger && (trigger.type === 'cron' || trigger.type === 'interval');
        if (!editable) {
            return '<p class="muted-text">此触发器类型不可在网页改计划</p>';
        }
        const active = detectPreset(trigger);
        const expr = trigger.type === 'cron'
            ? fieldsToExpression(trigger.fields)
            : (active === 'every_10m' ? '*/10 * * * *' : active === 'every_30m' ? '*/30 * * * *' : '0 * * * *');

        const chips = PRESETS.map(function (p) {
            return (
                '<button type="button" class="schedule-preset-chip' +
                (p.key === active ? ' is-active' : '') +
                '" data-preset="' + escapeHtml(p.key) + '" title="' + escapeHtml(p.hint) + '">' +
                escapeHtml(p.label) +
                '</button>'
            );
        }).join('');

        return (
            '<div class="schedule-preset-block">' +
            '<div class="schedule-preset-label">常用周期（点选后点保存）</div>' +
            '<div class="schedule-preset-chips" role="group">' + chips + '</div>' +
            '<label class="schedule-field schedule-cron-expr-field">' +
            '<span class="schedule-field-label">Cron 表达式 <small>分 时 日 月 周</small></span>' +
            '<input class="cron-expression" type="text" value="' + escapeHtml(expr) + '" ' +
            'placeholder="0 * * * *  （每小时）" autocomplete="off" spellcheck="false">' +
            '</label>' +
            '<p class="schedule-hint">例：每小时 <code>0 * * * *</code> · 每天0点 <code>0 0 * * *</code> · 每周一 <code>0 0 * * mon</code></p>' +
            '<input type="hidden" class="schedule-preset-value" value="' + escapeHtml(active) + '">' +
            '</div>'
        );
    }

    async function post(url, payload) {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload || {})
        });
        const data = await response.json();
        if (!data.success) throw new Error(data.error || '操作失败');
        return data;
    }

    async function waitForRun(runId) {
        for (let attempt = 0; attempt < 120; attempt += 1) {
            const response = await fetch('/api/scheduler/runs/' + encodeURIComponent(runId));
            const data = await response.json();
            if (!data.success) throw new Error(data.error || '无法读取执行结果');
            if (data.run.status === 'succeeded' || data.run.status === 'failed') return data.run;
            await new Promise(function (resolve) { setTimeout(resolve, 500); });
        }
        throw new Error('任务仍在执行，请稍后刷新查看');
    }

    function jobMatches(job) {
        const editable = job.trigger && (job.trigger.type === 'cron' || job.trigger.type === 'interval');
        if (statusFilter === 'enabled' && !job.enabled) return false;
        if (statusFilter === 'disabled' && job.enabled) return false;
        if (statusFilter === 'editable' && !editable) return false;
        if (!searchText) return true;
        const hay = [
            job.name, job.title, job.id, job.raw_name,
            job.schedule_text, triggerText(job.trigger), job.next_run_time || ''
        ].join(' ').toLowerCase();
        return hay.indexOf(searchText) !== -1;
    }

    function updateStats(jobs) {
        const total = jobs.length;
        const enabled = jobs.filter(function (j) { return j.enabled; }).length;
        statTotal.innerHTML = '<i class="fas fa-clock"></i> 共 ' + total + ' 个';
        statEnabled.innerHTML = '<i class="fas fa-toggle-on"></i> 启用 ' + enabled;
    }

    const CRON_PRESET_LABELS = {}; // filled by PRESETS loop below

    // 前端兜底中文名：覆盖 UUID 任务的 raw name / id / 函数名
    const JOB_TITLE_MAP = {
        auto_guishi_transactions: '鬼市自动交易',
        auto_guishi_transactions_job: '鬼市自动交易',
        clear_expired_baitan_orders: '清理超时摆摊',
        clear_expired_baitan_orders_job: '清理超时摆摊',
        auto_start_auction: '自动开启拍卖',
        auto_start_auction_job: '自动开启拍卖',
        check_auction_end: '拍卖收尾检查',
        check_auction_end_job: '拍卖收尾检查',
        materialsupdate_: '发放宗门资材',
        materialsupdate: '发放宗门资材',
        sect_materials_grant: '发放宗门资材',
        auto_harvest: '灵田傀儡自动收取',
        auto_harvest_scheduled: '灵田傀儡自动收取',
        generate_all_bosses: '自动生成世界BOSS',
        generate_all_bosses_task: '自动生成世界BOSS',
        daily_dungeon_reset: '每日副本重置',
        demon_invasion_schedule: '魔修入侵开关',
        demon_invasion_schedule_job: '魔修入侵开关',
        demon_invasion_refresh_schedule: '魔修入侵刷新',
        demon_invasion_refresh_schedule_job: '魔修入侵刷新',
        spirit_vein_schedule: '灵脉争夺',
        spirit_vein_schedule_job: '灵脉争夺',
        reset_message_rate_limits: '重置消息频率限制',
        limit_all_message_: '重置消息频率限制',
        recover_user_stamina: '体力恢复',
        limit_all_stamina_: '体力恢复',
        daily_reset_sign: '每日签到重置',
        daily_reset_beg: '仙途奇缘重置',
        daily_reset_day_num: '丹药次数重置',
        daily_reset_mixelixir_num: '炼丹次数重置',
        daily_reset_impart_num: '传承抽卡重置',
        daily_reset_arena: '竞技场每日重置',
        weekly_reduce_arena_rank: '竞技场周排名衰减',
        daily_reset_lottery: '抽奖次数重置',
        daily_reset_stone_limits: '灵石获取上限重置',
        daily_reset_stone_limits_job: '灵石获取上限重置',
        daily_reset_xiangyuan: '香缘重置',
        daily_reset_boss_limits: 'Boss次数重置',
        daily_reset_two_exp: '双修次数重置',
        daily_reset_impart_pk: '传承对决重置',
        daily_clean_expired_items: '清理过期物品',
        weekly_reduce_impart_lv: '传承等级周衰减',
        weekly_reset_tower_floors: '通天塔周重置',
        daily_add_impart_lv: '传承等级日增长',
        daily_reset_illusion: '幻境重置',
        daily_reset_sect_task: '宗门任务重置',
        daily_reset_work_refresh_num: '悬赏令次数重置',
        scheduled_rift_generation_job: '秘境重置',
        auto_handle_inactive_sect_owners_job: '处理不活跃宗主',
        reset_data_by_time_job: '早晚数据重置',
        backup_database_files: '数据库备份',
        newapi_auto_checkin_daily: 'NewAPI 自动签到'
    };

    function looksLikeUuid(value) {
        const t = String(value || '').replace(/-/g, '').toLowerCase();
        return t.length === 32 && /^[0-9a-f]+$/.test(t);
    }

    function mapJobTitle(value) {
        const key = String(value || '').trim();
        if (!key) return '';
        if (JOB_TITLE_MAP[key]) return JOB_TITLE_MAP[key];
        // strip common suffixes
        for (const suffix of ['_job', '_scheduled', '_task', '_']) {
            if (key.endsWith(suffix) && key.length > suffix.length) {
                const base = key.slice(0, -suffix.length);
                if (JOB_TITLE_MAP[base]) return JOB_TITLE_MAP[base];
            }
        }
        return '';
    }

    function displayName(job) {
        // 优先后端中文 title；否则用 id/函数名/raw_name 映射
        const backend = String(job.title || job.name || '').trim();
        if (backend && !looksLikeUuid(backend) && /[\u4e00-\u9fff]/.test(backend)) {
            return backend;
        }
        const mapped = mapJobTitle(job.id) || mapJobTitle(job.func_name) || mapJobTitle(job.raw_name) || mapJobTitle(job.name);
        if (mapped) return mapped;
        if (backend && !looksLikeUuid(backend)) return backend;
        if (job.func_name && !looksLikeUuid(job.func_name)) return '定时任务·' + job.func_name;
        return '后台定时任务';
    }

    function naturalSchedule(job) {
        const direct = String(job.schedule_text || (job.trigger && job.trigger.summary) || '').trim();
        if (direct && !/时=|分=|秒=|月=|日=|周=/.test(direct)) return direct;
        const trigger = job.trigger || {};
        if (trigger.type === 'interval') {
            const n = Number(trigger.seconds) || 0;
            if (n % 86400 === 0) return '每 ' + (n / 86400) + ' 天';
            if (n % 3600 === 0) return '每 ' + (n / 3600) + ' 小时';
            if (n % 60 === 0) return '每 ' + (n / 60) + ' 分钟';
            return '每 ' + n + ' 秒';
        }
        if (trigger.type === 'cron') {
            const f = trigger.fields || {};
            const minute = String(f.minute != null ? f.minute : '*');
            const hour = String(f.hour != null ? f.hour : '*');
            const day = String(f.day != null ? f.day : '*');
            const month = String(f.month != null ? f.month : '*');
            const dow = String(f.day_of_week != null ? f.day_of_week : '*');
            const norm = function (v) { return (v === '*/1' ? '*' : v); };
            const m = norm(minute), h = norm(hour), d = norm(day), mo = norm(month), w = norm(dow);
            if (h === '*' && /^\d+$/.test(m) && d === '*' && mo === '*' && w === '*') {
                return m === '0' ? '每小时' : ('每小时的第 ' + Number(m) + ' 分');
            }
            if (h.indexOf('*/') === 0 && d === '*' && mo === '*' && w === '*') {
                const n = Number(h.slice(2));
                if (n > 0) {
                    if (m === '0' || m === '*') return '每 ' + n + ' 小时';
                    if (/^\d+$/.test(m)) return '每 ' + n + ' 小时的第 ' + Number(m) + ' 分';
                }
            }
            if (/^\d+$/.test(h) && /^\d+$/.test(m) && d === '*' && mo === '*' && w === '*') {
                return '每天 ' + String(Number(h)).padStart(2, '0') + ':' + String(Number(m)).padStart(2, '0');
            }
            if (h.indexOf('-') !== -1 && /^\d+$/.test(m) && d === '*' && mo === '*' && w === '*') {
                return m === '0' ? ('每天 ' + h + ' 点') : ('每小时 ' + h + ' 点段的第 ' + Number(m) + ' 分');
            }
            if (h.indexOf(',') !== -1 && h.split(',').every(function (p) { return /^\d+$/.test(p); }) && /^\d+$/.test(m)) {
                return '每天 ' + h.split(',').map(function (p) { return String(Number(p)).padStart(2, '0'); }).join(',') + ':' + String(Number(m)).padStart(2, '0');
            }
            return fieldsToExpression(f);
        }
        return direct || triggerText(trigger) || '未知';
    }

    function render() {
        updateStats(jobsCache);
        const jobs = jobsCache.filter(jobMatches);
        if (!jobsCache.length) {
            listEl.innerHTML = '<div class="scheduler-empty">没有已注册的定时任务</div>';
            return;
        }
        if (!jobs.length) {
            listEl.innerHTML = '<div class="scheduler-empty">没有匹配的任务，试试清空筛选</div>';
            return;
        }
        listEl.innerHTML = jobs.map(function (job) {
            const editable = job.trigger && (job.trigger.type === 'cron' || job.trigger.type === 'interval');
            const typeLabel = (job.trigger && job.trigger.type) || 'other';
            const scheduleLabel = naturalSchedule(job);
            return (
                '<article class="scheduler-card' + (job.enabled ? '' : ' is-disabled') + '" data-job-id="' +
                escapeHtml(job.id) + '">' +
                '<header class="scheduler-card-head">' +
                '<div class="scheduler-card-title">' +
                '<strong>' + escapeHtml(displayName(job)) + '</strong>' +
                '<code class="scheduler-job-id" title="任务 ID">' + escapeHtml(job.id) + '</code>' +
                '</div>' +
                '<div class="scheduler-card-badges">' +
                '<span class="badge badge-type">' + escapeHtml(typeLabel) + '</span>' +
                '<span class="badge ' + (job.enabled ? 'badge-on' : 'badge-off') + '">' +
                (job.enabled ? '启用中' : '已禁用') + '</span>' +
                '</div>' +
                '</header>' +
                '<div class="scheduler-card-body">' +
                '<div class="scheduler-meta-row">' +
                '<span class="scheduler-meta-label">下次执行</span>' +
                '<span class="scheduler-meta-value">' + escapeHtml(formatNextRun(job.next_run_time)) + '</span>' +
                '</div>' +
                '<div class="scheduler-meta-row">' +
                '<span class="scheduler-meta-label">当前计划</span>' +
                '<code class="scheduler-meta-value schedule-summary">' + escapeHtml(scheduleLabel) + '</code>' +
                '</div>' +
                (editable
                    ? ('<div class="schedule-editor" data-trigger="' +
                        escapeHtml(JSON.stringify(job.trigger || {})) + '">' +
                        triggerForm(job.trigger || {}) +
                        '</div>')
                    : '') +
                '</div>' +
                '<footer class="scheduler-card-actions">' +
                '<label class="cmd-toggle scheduler-enable-toggle" title="启用/禁用">' +
                '<input class="cmd-toggle-input job-enabled" type="checkbox" ' + (job.enabled ? 'checked' : '') + '>' +
                '<span class="cmd-toggle-track" aria-hidden="true"></span>' +
                '<span class="cmd-toggle-label">' + (job.enabled ? '启用' : '禁用') + '</span>' +
                '</label>' +
                '<div class="scheduler-action-btns">' +
                '<button type="button" class="btn btn-secondary btn-sm job-run"><i class="fas fa-play"></i> 运行</button>' +
                (editable
                    ? '<button type="button" class="btn btn-primary btn-sm job-save"><i class="fas fa-floppy-disk"></i> 保存计划</button>'
                    : '') +
                '</div>' +
                '</footer>' +
                '</article>'
            );
        }).join('');
    }

    async function load() {
        listEl.innerHTML = '<div class="scheduler-empty">加载中…</div>';
        try {
            const response = await fetch('{{ url_for("api_scheduler_jobs") }}');
            const data = await response.json();
            if (!data.success) throw new Error(data.error || '加载失败');
            jobsCache = Array.isArray(data.jobs) ? data.jobs : [];
            render();
        } catch (error) {
            listEl.innerHTML = '<div class="scheduler-empty scheduler-empty-error">加载失败：' +
                escapeHtml(error.message) + '</div>';
            showToast(error.message, false);
        }
    }

    // 点选常用周期：填入表达式并高亮
    listEl.addEventListener('click', function (event) {
        const chip = event.target.closest('.schedule-preset-chip');
        if (!chip) return;
        const editor = chip.closest('.schedule-editor');
        if (!editor) return;
        const key = chip.dataset.preset || 'custom';
        editor.querySelectorAll('.schedule-preset-chip').forEach(function (c) {
            c.classList.toggle('is-active', c === chip);
        });
        const presetInput = editor.querySelector('.schedule-preset-value');
        if (presetInput) presetInput.value = key;
        const exprInput = editor.querySelector('.cron-expression');
        if (!exprInput) return;
        if (key === 'custom') {
            exprInput.focus();
            return;
        }
        if (key === 'every_10m') {
            exprInput.value = '*/10 * * * *';
            return;
        }
        if (key === 'every_30m') {
            exprInput.value = '*/30 * * * *';
            return;
        }
        const fields = PRESET_FIELDS[key];
        if (fields) exprInput.value = fieldsToExpression(fields);
    });

    listEl.addEventListener('change', async function (event) {
        if (!event.target.classList.contains('job-enabled')) return;
        const input = event.target;
        const card = input.closest('.scheduler-card');
        if (!card) return;
        const enabled = input.checked;
        const label = card.querySelector('.cmd-toggle-label');
        if (label) label.textContent = enabled ? '启用' : '禁用';
        input.disabled = true;
        try {
            await post('/api/scheduler/jobs/' + encodeURIComponent(card.dataset.jobId) + '/enabled', { enabled: enabled });
            showToast(enabled ? '已启用' : '已禁用', true);
            await load();
        } catch (error) {
            input.checked = !enabled;
            if (label) label.textContent = !enabled ? '启用' : '禁用';
            showToast(error.message, false);
        } finally {
            input.disabled = false;
        }
    });

    listEl.addEventListener('click', async function (event) {
        const card = event.target.closest('.scheduler-card');
        if (!card) return;
        // 预设 chip 已处理
        if (event.target.closest('.schedule-preset-chip')) return;

        const jobId = encodeURIComponent(card.dataset.jobId);

        if (event.target.closest('.job-run')) {
            const btn = event.target.closest('.job-run');
            btn.disabled = true;
            btn.classList.add('is-busy');
            try {
                const queued = await post('/api/scheduler/jobs/' + jobId + '/run');
                showToast('任务已加入执行队列', true);
                const run = await waitForRun(queued.run_id);
                showToast(
                    run.status === 'succeeded'
                        ? '任务执行成功'
                        : '任务执行失败：' + (run.error || '未知错误'),
                    run.status === 'succeeded'
                );
                await load();
            } catch (error) {
                showToast(error.message, false);
            } finally {
                btn.disabled = false;
                btn.classList.remove('is-busy');
            }
            return;
        }

        if (event.target.closest('.job-save')) {
            const btn = event.target.closest('.job-save');
            const editor = card.querySelector('.schedule-editor');
            if (!editor) return;
            const preset = (editor.querySelector('.schedule-preset-value') || {}).value || 'custom';
            let trigger;

            // 间隔类快捷
            if (preset === 'every_10m') {
                trigger = { type: 'interval', seconds: 600 };
            } else if (preset === 'every_30m') {
                trigger = { type: 'interval', seconds: 1800 };
            } else if (preset !== 'custom' && PRESET_FIELDS[preset]) {
                // 优先用 preset，后端也认
                trigger = { type: 'cron', preset: preset };
            } else {
                const expr = ((editor.querySelector('.cron-expression') || {}).value || '').trim();
                const fields = expressionToFields(expr);
                if (!fields) {
                    showToast('请填写 5 段 cron：分 时 日 月 周', false);
                    return;
                }
                trigger = { type: 'cron', fields: fields, expression: expr };
            }

            btn.disabled = true;
            try {
                await post('/api/scheduler/jobs/' + jobId + '/schedule', { trigger: trigger });
                showToast('计划已保存', true);
                await load();
            } catch (error) {
                showToast(error.message, false);
            } finally {
                btn.disabled = false;
            }
        }
    });

    document.querySelectorAll('.scheduler-filter-chips .chip').forEach(function (chip) {
        chip.addEventListener('click', function () {
            document.querySelectorAll('.scheduler-filter-chips .chip').forEach(function (c) {
                c.classList.remove('is-active');
            });
            chip.classList.add('is-active');
            statusFilter = chip.dataset.filter || 'all';
            render();
        });
    });

    let searchTimer = null;
    searchInput.addEventListener('input', function () {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function () {
            searchText = (searchInput.value || '').trim().toLowerCase();
            render();
        }, 120);
    });

    refresh.addEventListener('click', load);
    load();
})();
</script>
{% endblock %}
