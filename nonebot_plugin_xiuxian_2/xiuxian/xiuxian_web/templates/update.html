{% extends "base.html" %}

{% block content %}
<!-- 1. 检测更新模块 -->
<div class="card animate-in">
    <h2><i class="fas fa-sync-alt"></i> 检测系统更新</h2>
    
    <div id="update-status">
        <div class="loading">正在检查当前版本状态...</div>
    </div>
    
    <!-- 历史发布版本列表 (折叠) -->
    <div id="releases-list" class="collapsible-section" style="display: none;">
        <div class="section-header">
            <h3><i class="fab fa-github"></i> 远程版本记录</h3>
        </div>
        <div class="releases-container"></div>
    </div>
    
    <div class="form-actions">
        <button onclick="checkForUpdates()" class="btn btn-primary">
            <i class="fas fa-search"></i> 检查新版本
        </button>
        <button onclick="toggleReleasesList()" class="btn btn-info">
            <i class="fas fa-history"></i> <span id="btn-text-list">查看历史版本</span>
        </button>
        <button onclick="manualBackup()" class="btn btn-success">
            <i class="fas fa-folder-plus"></i> 立即创建备份
        </button>
    </div>
</div>

<!-- 2. 备份管理模块 (Tab 切换) -->
<div class="card animate-in delay-1" style="margin-top: 20px;">
    <h2><i class="fas fa-archive"></i> 备份与回退管理</h2>
    <p>管理本地备份或通过 WebDAV 同步云端数据。恢复备份需要重启机器人。</p>
    
    <div class="tab-nav">
        <button id="tab-btn-local" class="tab-link active" onclick="switchBackupTab('local')">
            <i class="fas fa-hdd"></i> 本地备份
        </button>
        <button id="tab-btn-cloud" class="tab-link" onclick="switchBackupTab('cloud')">
            <i class="fas fa-cloud"></i> 云端仓库 (WebDAV)
        </button>
    </div>

    <!-- 本地备份列表容器 -->
    <div id="local-backups-section">
        <div id="backups-list">
            <div class="loading">正在读取本地备份目录...</div>
        </div>
    </div>

    <!-- 云端备份列表容器 -->
    <div id="cloud-backups-section" class="hidden">
        <div id="cloud-backups-list">
            <div class="loading">正在尝试连接 WebDAV 服务器...</div>
        </div>
        <div id="cloud-config-tip" class="info-item hidden" style="margin-top: 15px; border-left: 4px solid var(--warning-color);">
            <p><i class="fas fa-exclamation-triangle"></i> 无法连接？请确保已在 <strong><a href="{{ url_for('config_management') }}">配置管理</a></strong> 中正确设置了 WebDAV 地址、账号和密码。</p>
        </div>
    </div>
    
    <div class="form-actions">
        <button onclick="refreshCurrentBackupList()" class="btn btn-info">
            <i class="fas fa-sync"></i> 刷新列表
        </button>
    </div>
</div>

<!-- 模态框：版本详情 -->
<div id="versionDetailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="versionDetailTitle">版本说明</h3>
            <span class="close" onclick="closeModal('versionDetailModal')">×</span>
        </div>
        <div class="modal-body">
            <div id="version-detail-content"></div>
            <div class="modal-actions">
                <button id="modal-update-btn" class="btn btn-success">执行操作</button>
                <button onclick="closeModal('versionDetailModal')" class="btn btn-secondary">关闭</button>
            </div>
        </div>
    </div>
</div>

<style>
    /* 备份卡片增强 */
    .backup-card.cloud-item { border-left: 4px solid var(--info-color); background: linear-gradient(to right, rgba(23, 162, 184, 0.05), transparent); }
    .backup-detail-row { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 6px; }
    .backup-detail-row strong { color: var(--text-primary); }
    
    /* 更新内容显示 */
    .changelog-box { background: var(--bg-primary); padding: 12px; border-radius: 6px; max-height: 250px; overflow-y: auto; font-family: monospace; font-size: 13px; border: 1px solid var(--border-color); }
    
    .hidden { display: none; }
    .success-text { color: var(--success-color); font-weight: bold; }
</style>

<script>
let currentBackupType = 'local';
let releasesListExpanded = false;

/**
 * 1. 更新检测逻辑
 */
async function checkForUpdates() {
    const statusDiv = document.getElementById('update-status');
    statusDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> 正在请求 GitHub API...</div>';
    try {
        const res = await fetch('/check_update');
        const data = await res.json();
        if (data.success) {
            if (data.update_available) {
                statusDiv.innerHTML = `
                    <div class="update-available">
                        <h3 class="success-text"><i class="fas fa-gift"></i> 发现新版本: ${data.latest_version}</h3>
                        <p>当前: ${data.current_version} ➔ 最新: ${data.latest_version}</p>
                        <div style="margin: 10px 0;">
                            <button class="btn btn-sm btn-info" onclick="showChangelog('${data.latest_version}', \`${data.changelog.replace(/`/g, '\\`')}\`)">查看更新内容</button>
                        </div>
                        <button onclick="performUpdate('${data.latest_version}')" class="btn btn-success">立即升级并备份</button>
                    </div>`;
            } else {
                statusDiv.innerHTML = `<div class="no-update"><h3><i class="fas fa-check-circle"></i> 当前已是最新版本 (${data.current_version})</h3></div>`;
            }
        }
    } catch (e) { statusDiv.innerHTML = '<div class="error">检查更新失败，请检查网络连接或稍后重试。</div>'; }
}

function showChangelog(ver, text) {
    const modal = document.getElementById('versionDetailModal');
    document.getElementById('versionDetailTitle').innerText = `版本 ${ver} 更新日志`;
    document.getElementById('version-detail-content').innerHTML = `<pre class="changelog-box">${text}</pre>`;
    const btn = document.getElementById('modal-update-btn');
    btn.innerText = "执行更新";
    btn.onclick = () => performUpdate(ver);
    modal.style.display = 'flex';
}

/**
 * 2. 备份管理 (Tab & 同步恢复)
 */
function switchBackupTab(type) {
    currentBackupType = type;
    document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-btn-${type}`).classList.add('active');
    
    const localSec = document.getElementById('local-backups-section');
    const cloudSec = document.getElementById('cloud-backups-section');
    
    if (type === 'local') {
        localSec.classList.remove('hidden'); cloudSec.classList.add('hidden');
        loadBackups();
    } else {
        localSec.classList.add('hidden'); cloudSec.classList.remove('hidden');
        loadCloudBackups();
    }
}

async function loadBackups() {
    const container = document.getElementById('backups-list');
    container.innerHTML = '<div class="loading">正在加载本地文件...</div>';
    try {
        const res = await fetch('/get_backups');
        const data = await res.json();
        if (data.success && data.backups.length > 0) {
            container.innerHTML = '<div class="backups-container">' + data.backups.map(b => `
                <div class="backup-card">
                    <div class="backup-header"><div class="backup-filename"><i class="fas fa-file-archive"></i> ${b.filename}</div></div>
                    <div class="backup-details">
                        <div class="backup-detail-row"><strong>版本:</strong> <span>${b.version}</span></div>
                        <div class="backup-detail-row"><strong>创建时间:</strong> <span>${new Date(b.created_at).toLocaleString()}</span></div>
                        <div class="backup-detail-row"><strong>文件大小:</strong> <span>${(b.size / 1048576).toFixed(2)} MB</span></div>
                    </div>
                    <div class="backup-actions">
                        <button onclick="confirmRestore('${b.filename}')" class="btn btn-warning"><i class="fas fa-undo"></i> 恢复</button>
                        <button onclick="downloadBackup('${b.filename}')" class="btn btn-info"><i class="fas fa-download"></i> 下载</button>
                        <button onclick="confirmDeleteBackup('${b.filename}')" class="btn btn-danger"><i class="fas fa-trash-alt"></i> 删除</button>
                    </div>
                </div>`).join('') + '</div>';
        } else container.innerHTML = '<div class="no-backups">未发现任何本地备份文件</div>';
    } catch (e) { container.innerHTML = '<div class="error">读取本地目录失败</div>'; }
}

async function loadCloudBackups() {
    const container = document.getElementById('cloud-backups-list');
    const tip = document.getElementById('cloud-config-tip');
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> 正在连接 WebDAV...</div>';
    tip.classList.add('hidden');

    try {
        const res = await fetch('/get_cloud_backups');
        const data = await res.json();
        if (data.success && data.backups.length > 0) {
            container.innerHTML = '<div class="backups-container">' + data.backups.map(b => `
                <div class="backup-card cloud-item">
                    <div class="backup-header"><div class="backup-filename"><i class="fas fa-cloud"></i> ${b.filename}</div></div>
                    <div class="backup-details">
                        <div class="backup-detail-row"><strong>最后修改:</strong> <span>${b.modified}</span></div>
                        <div class="backup-detail-row"><strong>云端大小:</strong> <span>${(b.size / 1048576).toFixed(2)} MB</span></div>
                    </div>
                    <div class="backup-actions">
                        <button onclick="syncCloudFile('${b.filename}')" class="btn btn-info"><i class="fas fa-sync"></i> 同步到本地</button>
                        <button onclick="cloudRestore('${b.filename}')" class="btn btn-warning"><i class="fas fa-cloud-download-alt"></i> 云恢复</button>
                    </div>
                </div>`).join('') + '</div>';
        } else {
            container.innerHTML = `<div class="no-backups">${data.error || '云端尚未存放任何备份'}</div>`;
            tip.classList.remove('hidden');
        }
    } catch (e) { 
        container.innerHTML = '<div class="error">连接云端仓库失败</div>'; 
        tip.classList.remove('hidden');
    }
}

// 同步逻辑
async function syncCloudFile(filename, overwrite = false) {
    if (!overwrite && !confirm(`确定将云端备份 ${filename} 同步到本地吗？`)) return;
    const statusDiv = document.getElementById('update-status');
    statusDiv.innerHTML = `<div class="loading"><i class="fas fa-cloud-download-alt"></i> 正在下载 ${filename}...</div>`;
    try {
        const res = await fetch('/sync_cloud_backup', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ filename, overwrite })
        });
        const data = await res.json();
        if (data.success) {
            alert('同步成功！现在可以在本地备份中看到它。'); 
            switchBackupTab('local');
            statusDiv.innerHTML = "";
        } else if (data.error === "FILE_EXISTS") {
            if (confirm(data.message)) syncCloudFile(filename, true);
            else statusDiv.innerHTML = "";
        }
    } catch (e) { alert('同步过程中发生异常'); }
}

// 云恢复逻辑
async function cloudRestore(filename) {
    if (!confirm(`【警告】你确定要直接从云端版本 ${filename} 恢复吗？\n系统将自动完成下载、解压并回退，完成后需要重启机器人。`)) return;
    const statusDiv = document.getElementById('update-status');
    statusDiv.innerHTML = '<div class="loading">正在执行云端恢复流程，请勿关闭页面或断开电源...</div>';
    try {
        const res = await fetch('/cloud_restore_backup', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ filename })
        });
        const data = await res.json();
        if (data.success) {
            statusDiv.innerHTML = `<div class="success"><h3>恢复成功！</h3><p>${data.message}</p></div>`;
            alert('云端恢复成功，请手动重启机器人以应用更改。');
        } else {
            statusDiv.innerHTML = `<div class="error">恢复失败: ${data.error}</div>`;
        }
    } catch (e) { statusDiv.innerHTML = '<div class="error">连接已断开（可能是机器人正在重启），请稍后刷新。</div>'; }
}

/**
 * 3. 辅助功能
 */
function refreshCurrentBackupList() {
    if (currentBackupType === 'local') loadBackups(); else loadCloudBackups();
}

function toggleReleasesList() {
    const list = document.getElementById('releases-list');
    const btnText = document.getElementById('btn-text-list');
    releasesListExpanded = !releasesListExpanded;
    list.style.display = releasesListExpanded ? 'block' : 'none';
    btnText.innerText = releasesListExpanded ? '收起版本记录' : '查看历史版本';
    if (releasesListExpanded) viewAllReleases();
}

async function viewAllReleases() {
    const container = document.querySelector('.releases-container');
    container.innerHTML = '<div class="loading">正在获取 GitHub Releases...</div>';
    try {
        const res = await fetch('/get_releases');
        const data = await res.json();
        if (data.success) {
            container.innerHTML = data.releases.map(release => {
                const isCurrent = release.tag_name === data.current_version;
                return `
                <div class="release-card ${isCurrent ? 'current-release' : ''}">
                    <div class="release-header">
                        <div class="release-title">
                            <h4>${release.name} <span class="tag">${release.tag_name}</span></h4>
                            <p class="release-date">${new Date(release.published_at).toLocaleString()}</p>
                        </div>
                        <div class="release-actions">
                            ${isCurrent ? '<span class="current-badge">当前运行中</span>' : `<button onclick="performUpdate('${release.tag_name}')" class="btn btn-success btn-sm">强制更新</button>`}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
    } catch (e) { container.innerHTML = '<div class="error">获取版本列表失败</div>'; }
}

async function performUpdate(tag) {
    if (!confirm(`确定要将插件更新到 ${tag} 吗？\n更新前系统会自动为您创建一份当前版本的本地备份。`)) return;
    const statusDiv = document.getElementById('update-status');
    statusDiv.innerHTML = '<div class="loading">正在下载并解压更新包，这可能需要一分钟...</div>';
    try {
        const res = await fetch('/perform_update', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ release_tag: tag })
        });
        const data = await res.json();
        if (data.success) {
            statusDiv.innerHTML = '<div class="success"><h3>更新成功！</h3><p>系统已完成自动备份并应用新版本。请重启机器人。</p></div>';
            alert('更新成功，系统即将重启或请手动重启。');
        } else {
            statusDiv.innerHTML = `<div class="error">更新失败: ${data.error}</div>`;
        }
    } catch (e) { statusDiv.innerHTML = '<div class="error">机器人正在重启，请稍后刷新页面...</div>'; }
}

async function manualBackup() {
    const btn = event.target;
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 备份中...';
    btn.disabled = true;
    try {
        const res = await fetch('/manual_backup', { method: 'POST' });
        const data = await res.json();
        if (data.success) { 
            alert('备份成功！已同时尝试同步至云端（如果已开启）。'); 
            loadBackups(); 
        } else {
            alert('备份失败: ' + data.error);
        }
    } catch (e) { alert('备份请求异常'); }
    btn.innerHTML = originalText;
    btn.disabled = false;
}

async function confirmRestore(filename) {
    if (!confirm(`警告：确定要恢复本地备份 ${filename} 吗？\n这会覆盖当前的所有插件文件！`)) return;
    try {
        const res = await fetch('/restore_backup', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ backup_filename: filename })
        });
        const data = await res.json();
        if (data.success) alert('恢复成功，请重启机器人以生效。');
    } catch (e) { alert('系统正在处理恢复，请稍后重连。'); }
}

async function confirmDeleteBackup(filename) {
    if (!confirm(`确定要永久删除备份 ${filename} 吗？`)) return;
    try {
        const res = await fetch('/delete_backup', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ backup_filename: filename })
        });
        const data = await res.json();
        if (data.success) loadBackups();
    } catch (e) { alert('删除失败'); }
}

function downloadBackup(f) { window.open(`/download_backup/${encodeURIComponent(f)}`, '_blank'); }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

document.addEventListener('DOMContentLoaded', () => {
    checkForUpdates();
    switchBackupTab('local');
});
</script>
{% endblock %}
