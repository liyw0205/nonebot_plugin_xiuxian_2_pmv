function normalizeSessionRows(rows) {
    return (rows || []).map(s => {
        if (!s.title || String(s.title).trim().toLowerCase() === 'bot') {
            s.title = s.target_id || '未知会话';
        }
        s.last_preview = buildSessionPreview(s);
        return s;
    });
}

function getSessionRenderKey(s) {
    return `${getSessionKey(s)}__${s.last_row_id || ''}__${s.last_time || ''}`;
}

function updateLastSessionRowId(rows, reset = false, fallback = 0) {
    if (reset) {
        lastSessionRowId = Number(fallback || 0);
    } else {
        lastSessionRowId = Math.max(lastSessionRowId, Number(fallback || 0));
    }

    (rows || []).forEach(s => {
        const rowId = Number(s.last_row_id || 0);
        if (rowId > lastSessionRowId) {
            lastSessionRowId = rowId;
        }
    });
}

function sortSessionsByLatest(rows) {
    return (rows || []).sort((a, b) => {
        const idDelta = Number(b.last_row_id || 0) - Number(a.last_row_id || 0);
        if (idDelta) return idDelta;
        return String(b.last_time || '').localeCompare(String(a.last_time || ''));
    });
}

function renderSessionsFromCache(silent = false) {
    const list = document.getElementById('sessionList');
    const newKeys = sessionsCache.map(getSessionRenderKey);

    if (silent && arraysEqual(lastRenderedSessionKeys, newKeys)) {
        return;
    }

    const oldScrollTop = list.scrollTop;
    lastRenderedSessionKeys = newKeys;

    if (!sessionsCache.length) {
        list.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无会话</p></div>`;
        return;
    }

    list.innerHTML = sessionsCache.map((s, idx) => {
        const active = currentSession &&
            currentSession.scene === s.scene &&
            currentSession.target_id === s.target_id &&
            currentSession.adapter === s.adapter;

        const title = s.title || s.target_id || '未知会话';
        const sessionAvatar = isHttpUrl(s.avatar)
            ? renderAvatarImage(s.avatar)
            : escapeHtml(s.avatar_text || getInitial(title));

        return `
            <div class="session-item ${active ? 'active' : ''}" onclick="selectSession(${idx})">
                <div class="session-avatar">${sessionAvatar}</div>
                <div class="session-info">
                    <div class="session-title-row">
                        <div class="session-title">${escapeHtml(title)}</div>
                        <div class="session-time">${escapeHtml(shortTime(s.last_time))}</div>
                    </div>
                    <div class="session-meta">${escapeHtml(s.last_preview || s.target_id || '')}</div>
                </div>
            </div>
        `;
    }).join('');

    if (silent) {
        list.scrollTop = oldScrollTop;
    }
}

async function loadSessions(silent = false) {
    const scene = document.getElementById('sceneSelect').value;
    const adapter = document.getElementById('adapterSelect').value;
    const list = document.getElementById('sessionList');

    if (!silent) {
        list.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-spin"></i> 正在加载会话...</div>`;
    }

    try {
        const qs = new URLSearchParams({ scene });
        if (adapter) qs.set('adapter', adapter);

        const res = await fetch('/api/messages/sessions?' + qs.toString());
        const data = await res.json();

        if (!data.success) {
            if (!silent) {
                list.innerHTML = `<div class="error">加载失败：${escapeHtml(data.error || '未知错误')}</div>`;
            }
            return;
        }

        sessionsCache = sortSessionsByLatest(normalizeSessionRows(data.rows || []));
        updateLastSessionRowId(sessionsCache, true, data.last_row_id || 0);
        renderSessionsFromCache(silent);
    } catch (e) {
        if (!silent) {
            list.innerHTML = `<div class="error">请求异常：${escapeHtml(e)}</div>`;
        }
    }
}

async function loadSessionUpdates() {
    const scene = document.getElementById('sceneSelect').value;
    const adapter = document.getElementById('adapterSelect').value;

    if (!lastSessionRowId) {
        await loadSessions(true);
        return;
    }

    try {
        const qs = new URLSearchParams({
            scene,
            after_id: String(lastSessionRowId)
        });
        if (adapter) qs.set('adapter', adapter);

        const res = await fetch('/api/messages/sessions_since?' + qs.toString());
        const data = await res.json();

        if (!data.success) return;

        const updates = normalizeSessionRows(data.rows || []);
        updateLastSessionRowId(updates, false, data.last_row_id || lastSessionRowId);

        if (!updates.length) {
            lastSessionRowId = Math.max(lastSessionRowId, Number(data.last_row_id || 0));
            return;
        }

        const byKey = new Map();
        sessionsCache.forEach(s => byKey.set(getSessionKey(s), s));
        updates.forEach(s => byKey.set(getSessionKey(s), s));
        sessionsCache = sortSessionsByLatest(Array.from(byKey.values()));
        renderSessionsFromCache(true);
    } catch (e) {
        console.error('会话增量加载失败', e);
    }
}

function selectSession(index) {
    const s = sessionsCache[index];
    if (!s) return;

    lastRenderedMessageKeys = [];
    hideUnreadHint();
    hasUnreadWhileReadingHistory = false;
    currentDate = '';

        scene: s.scene,
        target_id: s.target_id,

        avatar_text: s.avatar_text || getInitial(s.title || s.target_id),
        avatar: s.avatar || ''
    };

    selectedReplyMessageId = '';
    selectedReplyRowId = '';
    selectedReplySummary = '';
    selectedQuoteReferenceId = '';
    selectedQuoteMessageId = '';
    selectedQuoteRowId = '';
    selectedQuoteSummary = '';

    updateReplyBar();

    setChatAvatar(currentSession.avatar_text || '?', currentSession.avatar);

function backToSessions() {

}

async function loadMessageDates() {
    const sel = document.getElementById('dateSelect');

    if (!currentSession) {
        sel.disabled = true;
        sel.innerHTML = `<option value="">全部历史</option>`;
        return;
    }

    try {
        const qs = new URLSearchParams({
            scene: currentSession.scene,
            target_id: currentSession.target_id,
            include_counts: '0'
        });

        if (currentSession.adapter) {
            qs.set('adapter', currentSession.adapter);
        }

        const res = await fetch('/api/messages/dates?' + qs.toString());
        const data = await res.json();

        if (!data.success) {
            currentDate = '';
            sel.innerHTML = `<option value="">全部历史</option>`;
            sel.value = '';
            sel.disabled = false;
            return;
        }

        const today = new Date().toISOString().slice(0, 10);
        const rows = data.rows || [];

        if (!rows.some(x => x.date === today)) {
            rows.unshift({
                date: today,
                label: '今天',
                count: null
            });
        }

        sel.innerHTML = `<option value="">全部历史</option>` + rows.map(x => {
            const countText = x.count !== null && x.count !== undefined && x.count !== '' ? ` (${x.count})` : '';
            return `<option value="${escapeHtml(x.date)}">${escapeHtml(x.label)}${countText}</option>`;
        }).join('');

        if (currentDate && !rows.some(x => x.date === currentDate)) {
            currentDate = '';
        }
        sel.value = currentDate;
        sel.disabled = false;

    } catch (e) {
        currentDate = '';
        sel.innerHTML = `<option value="">全部历史</option>`;
        sel.value = '';
        sel.disabled = false;
    }
}

    currentDate = document.getElementById('dateSelect').value;
    clearReplyTarget();
    lastRenderedMessageKeys = [];
    currentLastRowId = 0;
    currentOldestRowId = 0;
    hasMoreHistory = false;

async function loadMessagesSince() {
    if (!currentSession || isLoadingMessages) return;

    const box = document.getElementById('messageList');
    const wasBottom = shouldStickToBottom(box, 120);

    try {
        const qs = new URLSearchParams({
            scene: currentSession.scene,
            target_id: currentSession.target_id,
            last_row_id: String(currentLastRowId || 0)
        });

        if (currentSession.adapter) qs.set('adapter', currentSession.adapter);
        if (currentDate) qs.set('date', currentDate);

        const res = await fetch('/api/messages/list_since?' + qs.toString());
        const data = await res.json();

        if (!data.success || !data.rows || !data.rows.length) return;

        appendMessages(data.rows);

        currentLastRowId = Number(data.last_row_id || currentLastRowId);

        if (wasBottom) {
            scrollMessagesToBottom();
            hideUnreadHint();
            hasUnreadWhileReadingHistory = false;
        } else {
            hasUnreadWhileReadingHistory = true;
            showUnreadHint();
        }

    } catch (e) {
        console.error('增量加载失败', e);
    }
}

function appendMessages(rows) {
    const box = document.getElementById('messageList');
    rows = (rows || []).filter(row => !renderedRowExists(row.id));
    if (!rows.length) return;

    const startIndex = getMessageRows().length;
    box.insertAdjacentHTML('beforeend', renderMessageRows(rows, startIndex, getLastRenderedMessageDate()));
    normalizeDateDividers();
    reindexRenderedMessages();
    lastRenderedMessageKeys = lastRenderedMessageKeys.concat(rows.map(getMessageKey));
}


async function loadMessages(forceBottom = false, silent = false) {
    if (!currentSession || isLoadingMessages) return;

    isLoadingMessages = true;

    const box = document.getElementById('messageList');
    const wasBottom = shouldStickToBottom(box, 120);
    const oldScrollTop = box.scrollTop;
    const oldScrollHeight = box.scrollHeight;

    try {
        const keyword = document.getElementById('keywordInput').value.trim();

        const qs = new URLSearchParams({
            scene: currentSession.scene,
            direction: 'ALL',
            page: '1',
            page_size: '300',
            include_total: '0'
        });

        if (keyword) qs.set('keyword', keyword);
        if (currentSession.adapter) qs.set('adapter', currentSession.adapter);
        if (currentDate) qs.set('date', currentDate);

        qs.set(sceneTargetKey(currentSession.scene), currentSession.target_id);

        const res = await fetch('/api/messages/list?' + qs.toString());
        const data = await res.json();

        if (!data.success) {
            if (!silent) {
                box.innerHTML = `<div class="error">加载失败：${escapeHtml(data.error || '未知错误')}</div>`;
            }
            return;
        }

        let rows = data.rows || [];
        rows = rows.slice().reverse();

        const newKeys = rows.map(getMessageKey);
        const hasChanged = !arraysEqual(lastRenderedMessageKeys, newKeys);

        if (!hasChanged) {
            return;
        }

        if (!rows.length) {
            box.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无消息</p></div>`;
            lastRenderedMessageKeys = [];
            currentOldestRowId = 0;
            currentLastRowId = 0;
            hasMoreHistory = false;
            return;
        }

        box.innerHTML = renderMessageRows(rows, 0);
        normalizeDateDividers();
        reindexRenderedMessages();
        lastRenderedMessageKeys = newKeys;
        currentJumpIndex = rows.length - 1;
        
        if (rows.length) {
            currentOldestRowId = Number(rows[0].id || 0);
            currentLastRowId = Number(rows[rows.length - 1].id || 0);
        } else {
            currentOldestRowId = 0;
            currentLastRowId = 0;
        }
        hasMoreHistory = !!data.has_more;

        if (forceBottom || wasBottom) {
            setTimeout(() => {
                scrollMessagesToBottom();
                hasUnreadWhileReadingHistory = false;
                hideUnreadHint();
            }, 30);
        } else {
            preserveScrollAfterRender(box, oldScrollTop, oldScrollHeight);
            hasUnreadWhileReadingHistory = true;
            showUnreadHint();
        }

    } catch (e) {
        if (!silent) {
            box.innerHTML = `<div class="error">请求异常：${escapeHtml(e)}</div>`;
        }
    } finally {
        isLoadingMessages = false;
    }
}

async function loadOlderMessages() {
    if (!currentSession || isLoadingMessages || isLoadingHistory || !hasMoreHistory || !currentOldestRowId) return;

    isLoadingHistory = true;

    const box = document.getElementById('messageList');
    const oldScrollTop = box.scrollTop;
    const oldScrollHeight = box.scrollHeight;

    try {
        const keyword = document.getElementById('keywordInput').value.trim();
        const qs = new URLSearchParams({
            scene: currentSession.scene,
            target_id: currentSession.target_id,
            before_row_id: String(currentOldestRowId),
            page_size: '300'
        });

        if (keyword) qs.set('keyword', keyword);
        if (currentSession.adapter) qs.set('adapter', currentSession.adapter);
        if (currentDate) qs.set('date', currentDate);

        const res = await fetch('/api/messages/list_before?' + qs.toString());
        const data = await res.json();

        if (!data.success) {
            console.error('历史消息加载失败', data.error || '未知错误');
            return;
        }

        let rows = data.rows || [];
        rows = rows.slice().reverse().filter(row => !renderedRowExists(row.id));

        hasMoreHistory = !!data.has_more;

        if (!rows.length) {
            if (!data.has_more) hasMoreHistory = false;
            return;
        }

        box.insertAdjacentHTML('afterbegin', renderMessageRows(rows, 0));
        normalizeDateDividers();
        reindexRenderedMessages();
        lastRenderedMessageKeys = rows.map(getMessageKey).concat(lastRenderedMessageKeys);
        currentOldestRowId = Number(rows[0].id || currentOldestRowId);

        const delta = box.scrollHeight - oldScrollHeight;
        box.scrollTop = oldScrollTop + delta;
    } catch (e) {
        console.error('历史消息加载异常', e);
    } finally {
        isLoadingHistory = false;
    }
}

function maybePrefetchHistoryOnScroll() {
    if (!currentSession || isLoadingMessages || isLoadingHistory || !hasMoreHistory) return;

    const box = document.getElementById('messageList');
    const firstVisibleIndex = getFirstVisibleMessageIndex(box);

    if (firstVisibleIndex >= 0 && firstVisibleIndex <= 150) {
        loadOlderMessages();
    }
}

function onMessageListScroll() {
    if (shouldStickToBottom(document.getElementById('messageList'), 120)) {
        hasUnreadWhileReadingHistory = false;
        hideUnreadHint();
    }

    if (historyScrollTimer) {
        clearTimeout(historyScrollTimer);
    }
    historyScrollTimer = setTimeout(maybePrefetchHistoryOnScroll, 80);
}

function startMessagePress(event, el) {
    if (event.pointerType === 'mouse' && event.button !== 0) return;

    cancelMessagePress();
    messagePressTarget = el;
    messagePressStart = {
        x: event.clientX,
        y: event.clientY
    };

    messagePressTimer = setTimeout(() => {
        openMessageActionMenu(event, el);
        messagePressTimer = null;
    }, 560);
}

function moveMessagePress(event) {
    if (!messagePressTimer || !messagePressStart) return;

    const dx = Math.abs(event.clientX - messagePressStart.x);
    const dy = Math.abs(event.clientY - messagePressStart.y);

    if (dx > 12 || dy > 12) {
        cancelMessagePress();
    }
}

function cancelMessagePress() {
    if (messagePressTimer) {
        clearTimeout(messagePressTimer);
        messagePressTimer = null;
    }
    messagePressTarget = null;
    messagePressStart = null;
}

function openMessageActionMenu(event, el) {
    if (!currentSession || !el) return;

    event.preventDefault();
    event.stopPropagation();
    cancelMessagePress();

    messageActionTarget = el;
    closeMessageActionMenu();

    const canReplyMsgId = el.dataset.canReplyMsgId === '1';
    const canQuoteReference = el.dataset.canQuoteReference === '1';
    const isSend = el.dataset.isSend === '1';
    const msgId = el.dataset.messageId || '';
    const quoteRefId = getRowQuoteReferenceId(el);
    const canUseMsgId = !isSend && !activeSend && canReplyMsgId && !!msgId;
    const canQuote = !isSend && canQuoteReference && !!quoteRefId;

    const menu = document.createElement('div');
    menu.id = 'messageActionMenu';
    menu.className = 'message-action-menu';
    menu.innerHTML = `
        <button type="button" onclick="copyActionMenuMessage()">
            <i class="fas fa-copy"></i>
            <span>复制</span>
        </button>
        ${canUseMsgId ? `
            <button type="button" onclick="useMsgIdActionMenuMessage()">
                <i class="fas fa-link"></i>
                <span>使用 msg_id</span>
            </button>
        ` : ''}
        ${canQuote ? `
            <button type="button" onclick="quoteActionMenuMessage()">
                <i class="fas fa-reply"></i>
                <span>引用</span>
            </button>
        ` : ''}
    `;

    document.body.appendChild(menu);

    const margin = 8;
    const rect = menu.getBoundingClientRect();
    const x = Math.min(event.clientX || 0, window.innerWidth - rect.width - margin);
    const y = Math.min(event.clientY || 0, window.innerHeight - rect.height - margin);

    menu.style.left = `${Math.max(margin, x)}px`;
    menu.style.top = `${Math.max(margin, y)}px`;
}

function closeMessageActionMenu() {
    const menu = document.getElementById('messageActionMenu');
    if (menu) menu.remove();
}

async function copyActionMenuMessage() {
    if (!messageActionTarget) return;

    const text = messageActionTarget.dataset.copyText || messageActionTarget.dataset.preview || '';
    closeMessageActionMenu();

    if (!text) {
        showMessageToast('没有可复制内容');
        return;
    }

    try {
        if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
        } else {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            document.execCommand('copy');
            textarea.remove();
        }
        showMessageToast('已复制');
    } catch (e) {
        showMessageToast('复制失败');
    }
}

function useMsgIdActionMenuMessage() {
    if (!messageActionTarget) return;

    selectReplyMsgIdTarget(messageActionTarget);
    closeMessageActionMenu();
}

function quoteActionMenuMessage() {
    if (!messageActionTarget) return;

    selectQuoteTarget(messageActionTarget);
    closeMessageActionMenu();
}

function showMessageToast(text) {
    let toast = document.getElementById('messageToast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'messageToast';
        toast.className = 'message-toast';
        document.body.appendChild(toast);
    }

    toast.innerText = text;
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => {
        toast.remove();
    }, 1200);
}

function selectReplyTarget(el) {
    selectQuoteTarget(el);
}

function getRowQuoteReferenceId(el) {
    if (!el) return '';

    const refId = el.dataset.referenceId || '';
    if (refId) return refId;

    const scene = currentSession ? (currentSession.scene || '') : '';
    if (scene === 'channel_group' || scene === 'channel_private') {
        return el.dataset.messageId || '';
    }

    return '';
}

function getReplyTargetSummary(el) {
    const name = el.dataset.name || '对方';
    const preview = el.dataset.preview || '[消息]';
    return `${name}: ${preview}`;
}

function syncReplySelectionClasses() {
    document.querySelectorAll('.msg-row').forEach(row => {
        const msgId = row.dataset.messageId || '';
        const quoteRefId = getRowQuoteReferenceId(row);
        const selectedByMsgId = !!selectedReplyMessageId && selectedReplyMessageId === msgId;
        const selectedByQuote = !!selectedQuoteReferenceId && selectedQuoteReferenceId === quoteRefId;
        row.classList.toggle('reply-selected', selectedByMsgId || selectedByQuote);
    });
}

function updateReplyBar() {
    const parts = [];

    if (selectedReplyMessageId) {
        parts.push(`msg_id ${selectedReplySummary || selectedReplyMessageId}`);
    }
    if (selectedQuoteReferenceId) {
        parts.push(`引用 ${selectedQuoteSummary || selectedQuoteReferenceId}`);
    }

    const bar = document.getElementById('replyBar');
    const text = document.getElementById('replyText');
    if (!bar || !text) return;

    if (!parts.length) {
        bar.classList.add('hidden');
        text.innerText = '正在回复指定消息';
        return;
    }

    text.innerText = parts.join(' ｜ ');
    bar.classList.remove('hidden');
}

function selectReplyMsgIdTarget(el) {
    if (!currentSession) return;

    const isSend = el.dataset.isSend === '1';
    const canReplyMsgId = el.dataset.canReplyMsgId === '1';

    if (isSend) return;
    if (!canReplyMsgId) return;
    if (activeSend) {
        showMessageToast('主动发送不需要 msg_id');
        return;
    }

    const msgId = el.dataset.messageId || '';
    const rowId = el.dataset.rowId || '';

    if (!msgId) return;

    if (selectedReplyMessageId === msgId) {
        clearReplyMsgIdTarget();
        return;
    }

    selectedReplyMessageId = msgId;
    selectedReplyRowId = rowId;
    selectedReplySummary = getReplyTargetSummary(el);

    syncReplySelectionClasses();
    updateReplyBar();
}

function selectQuoteTarget(el) {
    if (!currentSession) return;

    const isSend = el.dataset.isSend === '1';
    const canQuoteReference = el.dataset.canQuoteReference === '1';

    if (isSend) return;
    if (!canQuoteReference) return;

    const quoteRefId = getRowQuoteReferenceId(el);
    const msgId = el.dataset.messageId || '';
    const rowId = el.dataset.rowId || '';

    if (!quoteRefId) return;

    if (selectedQuoteReferenceId === quoteRefId) {
        clearQuoteTarget();
        return;
    }

    selectedQuoteReferenceId = quoteRefId;
    selectedQuoteMessageId = msgId;
    selectedQuoteRowId = rowId;
    selectedQuoteSummary = getReplyTargetSummary(el);

    if (!activeSend && !selectedReplyMessageId && el.dataset.canReplyMsgId === '1' && msgId) {
        selectedReplyMessageId = msgId;
        selectedReplyRowId = rowId;
        selectedReplySummary = getReplyTargetSummary(el);
    }

    syncReplySelectionClasses();
    updateReplyBar();
}

function clearReplyMsgIdTarget() {
    selectedReplyMessageId = '';
    selectedReplyRowId = '';
    selectedReplySummary = '';

    syncReplySelectionClasses();
    updateReplyBar();
}

function clearQuoteTarget() {
    selectedQuoteReferenceId = '';
    selectedQuoteMessageId = '';
    selectedQuoteRowId = '';
    selectedQuoteSummary = '';

    syncReplySelectionClasses();
    updateReplyBar();
}

function clearReplyTarget() {
    selectedReplyMessageId = '';
    selectedReplyRowId = '';
    selectedReplySummary = '';
    selectedQuoteReferenceId = '';
    selectedQuoteMessageId = '';
    selectedQuoteRowId = '';
    selectedQuoteSummary = '';

    syncReplySelectionClasses();
    updateReplyBar();
}

function getMessageRows() {
    return Array.from(document.querySelectorAll('.msg-row'));
}

function jumpToMessage(index) {
    const rows = getMessageRows();
    if (!rows.length) return;

    index = Math.max(0, Math.min(index, rows.length - 1));
    currentJumpIndex = index;

    rows[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
    rows[index].style.outline = '2px solid var(--accent-color)';
    setTimeout(() => rows[index].style.outline = '', 800);
}

function jumpPrevMessage() {
    const rows = getMessageRows();
    if (!rows.length) return;

    if (currentJumpIndex < 0) currentJumpIndex = rows.length - 1;
    jumpToMessage(currentJumpIndex - 1);
}

function jumpNextMessage() {
    const rows = getMessageRows();
    if (!rows.length) return;

    if (currentJumpIndex < 0) currentJumpIndex = 0;
    jumpToMessage(currentJumpIndex + 1);
}

function reloadCurrentConversation() {

function toggleBroadcastPanel(force = null) {

        ? '<i class="fas fa-times"></i> 收起广播'
        : '<i class="fas fa-bullhorn"></i> 发送广播';

        setTimeout(() => document.getElementById('broadcastContent')?.focus(), 30);

function closeBroadcastStatus() {

    const btn = document.getElementById('broadcastStatusBtn');
    if (box) {
        box.classList.add('hidden');
    }
    if (btn) {
        btn.innerHTML = '<i class="fas fa-list"></i> 查看广播';
    }
}

async function sendBroadcast() {
    const adapter = document.getElementById('adapterSelect').value || (currentSession ? currentSession.adapter : '');
    const kind = document.getElementById('broadcastKind').value;
    const duration = document.getElementById('broadcastDuration').value || '1440';
    const contentEl = document.getElementById('broadcastContent');
    const content = contentEl.value.trim();
    const btn = document.getElementById('broadcastBtn');
    const resultBox = document.getElementById('broadcastResult');

    if (!adapter) {
        alert('请选择适配器');
        return;
    }

    if (!content) {
        alert('广播内容不能为空');
        return;
    }

    const oldText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
    resultBox.classList.add('hidden');

    try {
        const res = await fetch('/api/messages/broadcast', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                adapter,
                kind,
                duration_minutes: duration,
                content
            })
        });

        const data = await res.json();

        resultBox.classList.remove('hidden');
        resultBox.innerText = data.success
            ? (data.message || '广播已创建')
            : ('创建失败：' + (data.error || '未知错误'));

        if (data.success) {
            contentEl.value = '';
            await loadSessions(true);
        }
    } catch (e) {
        resultBox.classList.remove('hidden');
        resultBox.innerText = '请求异常：' + e;
    } finally {
        btn.disabled = false;
        btn.innerHTML = oldText;
    }
}

async function viewBroadcastStatus() {
    const btn = document.getElementById('broadcastStatusBtn');
    const box = document.getElementById('broadcastStatusBox');
    const oldText = btn.innerHTML;

    if (!box.classList.contains('hidden')) {
        box.classList.add('hidden');
        btn.innerHTML = '<i class="fas fa-list"></i> 查看广播';
        return;
    }

    toggleBroadcastPanel(false);

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 查看中...';

    try {
        const res = await fetch('/api/messages/broadcast/status');
        const data = await res.json();

        box.classList.remove('hidden');
        box.innerText = data.success
            ? (data.message || '当前没有广播。')
            : ('查看失败：' + (data.error || '未知错误'));
        btn.innerHTML = '<i class="fas fa-times"></i> 收起列表';
    } catch (e) {
        box.classList.remove('hidden');
        box.innerText = '请求异常：' + e;
        btn.innerHTML = '<i class="fas fa-times"></i> 收起列表';
    } finally {
        btn.disabled = false;
        if (btn.innerHTML.includes('查看中')) {
            btn.innerHTML = oldText;
        }
    }
}

function updateSendHint() {
    const hint = document.getElementById('sendHint');
    if (!hint) return;

    if (!currentSession) {
        hint.innerText = '未选择会话';
        return;
    }

    const adapter = currentSession.adapter || '自动';
    const activeText = activeSend && currentSession.adapter === 'QQ' ? ' ｜ 主动' : '';
    hint.innerText = `发送到：${currentSession.title}（${adapter}${activeText}）`;
}

async function postOutboundMessage(adapter, content, mediaType, mediaUrl, mediaFile) {
    const fd = new FormData();
    fd.append('adapter', adapter);
    fd.append('scene', currentSession.scene);
    fd.append('target_id', currentSession.target_id);
    fd.append('content', content || '');
    fd.append('send_mode', sendMode);
    fd.append('active_send', activeSend ? '1' : '0');
    fd.append('media_type', mediaType || '');
    fd.append('media_url', mediaUrl || '');
    fd.append('reply_message_id', selectedReplyMessageId || '');
    fd.append('quote_message_id', selectedQuoteMessageId || '');
    fd.append('quote_reference_id', selectedQuoteReferenceId || '');
    if (mediaFile) {
        fd.append('file', mediaFile);
    }

    const res = await fetch('/api/messages/send', { method: 'POST', body: fd });
    return res.json();
}

async function sendMessage() {
    if (!currentSession) {
        alert('请先选择会话');
        return;
    }

    const input = document.getElementById('messageInput');
    const content = input.value;
    const queue = mediaQueue.slice();

    if (!content.trim() && queue.length < 1) {
        alert('消息不能为空');
        return;
    }

    if (sendMode === 'markdown' && queue.length > 0) {
        alert('Markdown 模式暂不支持与媒体队列同时发送，请先清空媒体列表或改用普通消息');
        return;
    }

    const adapter = currentSession.adapter || document.getElementById('adapterSelect').value;
    if (!adapter) {
        alert('无法确定适配器，请选择明确会话或顶部适配器');
        return;
    }

    const btn = document.getElementById('sendBtn');
    const mediaBtn = document.getElementById('sendMediaBtn');
    const old = btn.innerHTML;
    const oldMedia = mediaBtn ? mediaBtn.innerHTML : '';

    btn.disabled = true;
    if (mediaBtn) mediaBtn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
    if (mediaBtn) mediaBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';

    try {
        let allOk = true;
        let lastError = '';

        if (queue.length > 0) {
            for (let i = 0; i < queue.length; i++) {
                const item = queue[i];
                const pieceContent = i === 0 ? content : '';
                const data = await postOutboundMessage(
                    adapter,
                    pieceContent,
                    item.type,
                    item.url,
                    item.file
                );
                if (!data.success) {
                    allOk = false;
                    lastError = data.error || '未知错误';
                    break;
                }
            }
        } else {
            const data = await postOutboundMessage(adapter, content, '', '', null);
            if (!data.success) {
                allOk = false;
                lastError = data.error || '未知错误';
            }
        }

        if (allOk) {
            clearInput();
            clearReplyTarget();
            lastRenderedMessageKeys = [];

            setTimeout(async () => {
                try {
                    await loadMessages(true, false);
                    await loadSessions(true);
                    await loadMessageDates();
                } catch (e) {
                    console.error('发送后刷新失败:', e);
                }
            }, 100);
        } else {
            alert('发送失败：' + lastError);
        }
    } catch (e) {
        alert('发送异常：' + e);
    } finally {
        btn.disabled = false;
        btn.innerHTML = old;
        updateMediaBadge();
        if (mediaBtn) mediaBtn.innerHTML = oldMedia;
    }
}

async function revokeMessage(btn) {
    const rowId = btn.dataset.rowId || '';
    const adapter = btn.dataset.adapter || '';
    const scene = btn.dataset.scene || '';
    const messageId = btn.dataset.messageId || '';
    const groupId = btn.dataset.groupId || '';
    const userId = btn.dataset.userId || '';

    if (!messageId) {
        alert('该消息没有 message_id，无法撤回');
        return;
    }

    if (!confirm('确定要撤回这条 Bot 消息吗？')) return;

    const oldText = btn.innerText;
    btn.disabled = true;
    btn.innerText = '撤回中...';

    try {
        const res = await fetch('/api/messages/revoke', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                row_id: rowId,
                adapter,
                scene,
                message_id: messageId,
                group_id: groupId,
                user_id: userId
            })
        });

        const data = await res.json();

        if (data.success) {
            btn.innerText = '已撤回';
            btn.disabled = true;

            lastRenderedMessageKeys = [];
            await loadMessages(false, false);
            await loadSessions(true);
        } else {
            alert('撤回失败：' + (data.error || '未知错误'));
            btn.innerText = oldText;
            btn.disabled = false;
        }
    } catch (e) {
        alert('撤回异常：' + e);
        btn.innerText = oldText;
        btn.disabled = false;
    }
}

function toggleAutoRefresh(force = null) {
    autoRefresh = (force === null) ? !autoRefresh : !!force;
    const btn = document.getElementById('autoRefreshBtn');

    if (autoRefresh) {
        btn?.classList.add('auto-refresh-on');

        if (autoRefreshTimer) clearInterval(autoRefreshTimer);

        autoRefreshTimer = setInterval(async () => {
            await loadSessionUpdates();
            if (currentSession) {
                await loadMessagesSince();
            }
        }, 1500);
    } else {
        btn?.classList.remove('auto-refresh-on');

        if (autoRefreshTimer) {
            clearInterval(autoRefreshTimer);
            autoRefreshTimer = null;
        }
    }
}

function refreshAll() {
    loadSessions(false);
    if (currentSession) {
        lastRenderedMessageKeys = [];
        currentOldestRowId = 0;
        currentLastRowId = 0;
        hasMoreHistory = false;
        loadMessages(false, false);
        loadMessageDates();
    }
}

function setMessageConfigStatus(text, isError = false) {
    const status = document.getElementById('messageConfigStatus');
    if (!status) return;
    status.textContent = text || '';
    status.classList.toggle('error', !!isError);
}

function setMessageConfigSaving(isSaving) {
    const btn = document.getElementById('messageConfigSaveBtn');
    if (!btn) return;
    btn.disabled = !!isSaving;
    btn.innerHTML = isSaving ? '<i class="fas fa-spinner fa-spin"></i> 保存中' : '<i class="fas fa-save"></i> 保存';
}

function fillMessageConfigInputs(config) {
    document.getElementById('messageConfigMaxSize').value = config.message_db_max_size_mb ?? 1000;
    document.getElementById('messageConfigGroupKeepDays').value = config.message_group_keep_days ?? 0;
    document.getElementById('messageConfigPrivateKeepDays').value = config.message_private_keep_days ?? 0;
}

async function loadMessageConfig() {
    setMessageConfigStatus('加载中...');
    const res = await fetch('/api/messages/config');
    const data = await res.json();
    if (!data.success) {
        throw new Error(data.error || '加载失败');
    }
    fillMessageConfigInputs(data.config || {});
    setMessageConfigStatus(data.record_enabled ? '' : '当前不记录新消息');
}

async function openMessageConfigPanel() {
    const overlay = document.getElementById('messageConfigOverlay');
    if (!overlay) return;
    overlay.classList.remove('hidden');

    try {
        await loadMessageConfig();
        document.getElementById('messageConfigMaxSize')?.focus();
    } catch (e) {
        setMessageConfigStatus(e.message || '加载失败', true);
    }
}

function closeMessageConfigPanel(event) {
    if (event && event.currentTarget !== event.target) {
        return;
    }
    document.getElementById('messageConfigOverlay')?.classList.add('hidden');
}

function readMessageConfigNumber(id, min, max) {
    const input = document.getElementById(id);
    const value = Number(input?.value ?? '');
    if (!Number.isInteger(value) || value < min || value > max) {
        throw new Error(`请输入 ${min} 到 ${max} 的整数`);
    }
    return value;
}

async function saveMessageConfig() {
    let payload;
    try {
        payload = {
            message_db_max_size_mb: readMessageConfigNumber('messageConfigMaxSize', 0, 10000),
            message_group_keep_days: readMessageConfigNumber('messageConfigGroupKeepDays', 0, 36500),
            message_private_keep_days: readMessageConfigNumber('messageConfigPrivateKeepDays', 0, 36500),
        };
    } catch (e) {
        setMessageConfigStatus(e.message || '配置无效', true);
        return;
    }

    try {
        setMessageConfigSaving(true);
        setMessageConfigStatus('');
        const res = await fetch('/api/messages/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!data.success) {
            throw new Error(data.error || '保存失败');
        }
        fillMessageConfigInputs(data.config || payload);
        setMessageConfigStatus(data.record_enabled ? '已保存' : '已保存，当前不记录新消息');
    } catch (e) {
        setMessageConfigStatus(e.message || '保存失败', true);
    } finally {
        setMessageConfigSaving(false);
    }
}

window.addEventListener('beforeunload', () => {
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    if (historyScrollTimer) clearTimeout(historyScrollTimer);
});

document.addEventListener('DOMContentLoaded', async () => {
    syncMobileViewportHeight();
    applyChatHeaderCollapsedFromStorage();
    setSendMode(sendMode);
    setActiveSend(activeSend);
    updateMediaBadge();
    applyMediaFileInputAttrs();
    document.getElementById('mediaOverlay')?.addEventListener('click', () => {
        minimizeMediaPanel();
    });
    document.getElementById('messageInput')?.addEventListener('focus', () => {
        if (mediaPanelOpen) {
            minimizeMediaPanel();
        }
        updateMediaBadge();
    });
    document.getElementById('messageList')?.addEventListener('scroll', onMessageListScroll, { passive: true });
    document.addEventListener('click', (event) => {
        const menu = document.getElementById('messageActionMenu');
        if (menu && !menu.contains(event.target)) {
            closeMessageActionMenu();
        }
        if (mediaPanelOpen) {
            const panel = document.getElementById('mediaPanel');
            const inPanel = panel && panel.contains(event.target);
            const isMediaTrigger = event.target.closest(
                '#mediaOpenBtn, #mediaOpenBtnExpanded, #mediaToggleBtn, #mediaFab, .media-fab, .composer-media-btn'
            );
            if (!inPanel && !isMediaTrigger) {
                minimizeMediaPanel();
            }
        }
    });
    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
            if (mediaPanelOpen) {
                minimizeMediaPanel();
                return;
            }
            closeMessageConfigPanel();
        }
    });
    await loadBots();
    await loadSessions(false);
    toggleAutoRefresh(true); // 默认开启自动刷新
});

document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        rerenderCurrentMessagesAfterAttachmentPatch();
    }, 300);
});
</script>
{% endblock %}
