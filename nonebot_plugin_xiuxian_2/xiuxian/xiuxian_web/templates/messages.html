async function loadMessageDates() {
    const sel = document.getElementById('dateSelect');

    if (!currentSession) {
        sel.disabled = true;
        sel.innerHTML = `<option value="">今天</option>`;
        return;
    }

    try {
        const qs = new URLSearchParams({
            scene: currentSession.scene,
            target_id: currentSession.target_id
        });

        if (currentSession.adapter) {
            qs.set('adapter', currentSession.adapter);
        }

        const res = await fetch('/api/messages/dates?' + qs.toString());
        const data = await res.json();

        if (!data.success) {
            const today = new Date().toISOString().slice(0, 10);
            currentDate = today;
            sel.innerHTML = `<option value="${today}">今天</option>`;
            sel.value = today;
            sel.disabled = false;
            return;
        }

        const today = new Date().toISOString().slice(0, 10);
        const rows = data.rows || [];

        if (!rows.some(x => x.date === today)) {
            rows.unshift({
                date: today,
                label: '今天',
                count: 0
            });
        }

        sel.innerHTML = rows.map(x => {
            return `<option value="${escapeHtml(x.date)}">${escapeHtml(x.label)} (${x.count})</option>`;
        }).join('');

        currentDate = rows[0]?.date || today;
        sel.value = currentDate;
        sel.disabled = false;

    } catch (e) {
        const today = new Date().toISOString().slice(0, 10);
        currentDate = today;
        sel.innerHTML = `<option value="${today}">今天</option>`;
        sel.value = today;
        sel.disabled = false;
    }
}

function onDateChange() {
    currentDate = document.getElementById('dateSelect').value;
    clearReplyTarget();
    lastRenderedMessageKeys = [];
    hideUnreadHint();
    loadMessages(true, false);
}

async function loadMessagesSince() {
    if (!currentSession || isLoadingMessages) return;

    const box = document.getElementById('messageList');
    const wasBottom = shouldStickToBottom(box, 120);

    try {
        const qs = new URLSearchParams({
            scene: currentSession.scene,
            target_id: currentSession.target_id,
            last_row_id: String(currentLastRowId || 0)
        });

        if (currentSession.adapter) qs.set('adapter', currentSession.adapter);
        if (currentDate) qs.set('date', currentDate);

        const res = await fetch('/api/messages/list_since?' + qs.toString());
        const data = await res.json();

        if (!data.success || !data.rows || !data.rows.length) return;

        appendMessages(data.rows);

        currentLastRowId = Number(data.last_row_id || currentLastRowId);

        if (wasBottom) {
            scrollMessagesToBottom();
            hideUnreadHint();
            hasUnreadWhileReadingHistory = false;
        } else {
            hasUnreadWhileReadingHistory = true;
            showUnreadHint();
        }

    } catch (e) {
        console.error('增量加载失败', e);
    }
}

function appendMessages(rows) {
    const box = document.getElementById('messageList');
    let html = '';

    rows.forEach((row) => {
        const isSend = row.direction === 'send';
        const name = isSend
            ? (row.username || row.nickname || 'Bot')
            : (row.username || row.nickname || row.user_id || '未知用户');
        const content = row.display_content || row.content || row.raw_message || '';
        const copyText = buildMessageCopyText(content);
        const previewText = copyText || String(content || '').slice(0, 60);
        const messageId = row.message_id || '';
        const replyUsed = Number(row.reply_used_count || 0);
        const canReply = !!row.can_reply;
        const replyExpired = !!row.reply_expired;

        const contentHtml = row.content_format === 'markdown' && !hasRenderableAttachment(content)
            ? renderMarkdown(content)
            : renderMessageContent(content);

        const rowClasses = [
            'msg-row',
            isSend ? 'send' : 'recv',
            canReply ? 'can-reply' : ''
        ].filter(Boolean).join(' ');

        html += `
            <div
                class="${rowClasses}"
                data-msg-index="0"
                data-row-id="${escapeHtml(row.id || '')}"
                data-message-id="${escapeHtml(messageId)}"
                data-is-send="${isSend ? '1' : '0'}"
                data-can-reply="${canReply ? '1' : '0'}"
                data-name="${escapeHtml(name)}"
                data-preview="${escapeHtml(previewText.slice(0, 60))}"
                data-copy-text="${escapeHtml(copyText)}"
                oncontextmenu="openMessageActionMenu(event, this); return false;"
                onpointerdown="startMessagePress(event, this)"
                onpointermove="moveMessagePress(event)"
                onpointerup="cancelMessagePress()"
                onpointercancel="cancelMessagePress()"
                onpointerleave="cancelMessagePress()"
            >
                ${renderAvatar(row, isSend)}
                <div class="msg-main">
                    <div class="msg-meta">
                        <span class="msg-name">${escapeHtml(name)}</span>
                        <span>${escapeHtml(shortTime(row.created_at))}</span>
                        <span>${escapeHtml(row.adapter || '')}</span>
                    </div>
                    <div class="msg-bubble">
                        ${contentHtml}
                    </div>
                    <div class="msg-extra">
                        ${!isSend && row.adapter === 'QQ' ? `已回复次数: ${replyUsed}/5` : ''}
                        ${!isSend && row.adapter === 'QQ' && replyExpired ? ` ｜ 已过期` : ''}
                        ${!isSend && row.adapter === 'QQ' && canReply ? ` ｜ 长按可复制/引用` : ''}
                        ${isSend && row.message_id ? `
                            <button
                                class="msg-revoke-btn"
                                onclick="event.stopPropagation(); revokeMessage(this)"
                                data-row-id="${escapeHtml(row.id || '')}"
                                data-adapter="${escapeHtml(row.adapter || '')}"
                                data-scene="${escapeHtml(row.scene || '')}"
                                data-message-id="${escapeHtml(row.message_id || '')}"
                                data-group-id="${escapeHtml(row.group_id || '')}"
                                data-user-id="${escapeHtml(row.user_id || '')}"
                                type="button"
                            >
                                撤回
                            </button>
                        ` : ''}
                    </div>
                </div>
            </div>
        `;
    });

    box.insertAdjacentHTML('beforeend', html);
}


async function loadMessages(forceBottom = false, silent = false) {
    if (!currentSession || isLoadingMessages) return;

    isLoadingMessages = true;

    const box = document.getElementById('messageList');
    const wasBottom = shouldStickToBottom(box, 120);
    const oldScrollTop = box.scrollTop;
    const oldScrollHeight = box.scrollHeight;

    try {
        const keyword = document.getElementById('keywordInput').value.trim();

        const qs = new URLSearchParams({
            scene: currentSession.scene,
            direction: 'ALL',
            page: '1',
            page_size: '180'
        });

        if (keyword) qs.set('keyword', keyword);
        if (currentSession.adapter) qs.set('adapter', currentSession.adapter);
        if (currentDate) qs.set('date', currentDate);

        qs.set(sceneTargetKey(currentSession.scene), currentSession.target_id);

        const res = await fetch('/api/messages/list?' + qs.toString());
        const data = await res.json();

        if (!data.success) {
            if (!silent) {
                box.innerHTML = `<div class="error">加载失败：${escapeHtml(data.error || '未知错误')}</div>`;
            }
            return;
        }

        let rows = data.rows || [];
        rows = rows.slice().reverse();

        const newKeys = rows.map(getMessageKey);
        const hasChanged = !arraysEqual(lastRenderedMessageKeys, newKeys);

        if (!hasChanged) {
            return;
        }

        if (!rows.length) {
            box.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无消息</p></div>`;
            lastRenderedMessageKeys = [];
            return;
        }

        let lastDate = '';
        let html = '';

        rows.forEach((row, idx) => {
            const datePart = (row.created_at || '').slice(0, 10);
            if (datePart && datePart !== lastDate) {
                lastDate = datePart;
                html += `<div class="msg-date-divider"><span>${escapeHtml(datePart)}</span></div>`;
            }

            const isSend = row.direction === 'send';
            const name = isSend
                ? (row.username || row.nickname || 'Bot')
                : (row.username || row.nickname || row.user_id || '未知用户');
            const content = row.display_content || row.content || row.raw_message || '';
            const copyText = buildMessageCopyText(content);
            const previewText = copyText || String(content || '').slice(0, 60);
            const messageId = row.message_id || '';
            const replyUsed = Number(row.reply_used_count || 0);
            const canReply = !!row.can_reply;
            const replyExpired = !!row.reply_expired;

            const contentHtml = row.content_format === 'markdown' && !hasRenderableAttachment(content)
                ? renderMarkdown(content)
                : renderMessageContent(content);

            const rowClasses = [
                'msg-row',
                isSend ? 'send' : 'recv',
                canReply ? 'can-reply' : '',
                selectedReplyMessageId && selectedReplyMessageId === messageId ? 'reply-selected' : ''
            ].filter(Boolean).join(' ');

            html += `
                <div
                    class="${rowClasses}"
                    data-msg-index="${idx}"
                    data-row-id="${escapeHtml(row.id || '')}"
                    data-message-id="${escapeHtml(messageId)}"
                    data-is-send="${isSend ? '1' : '0'}"
                    data-can-reply="${canReply ? '1' : '0'}"
                    data-name="${escapeHtml(name)}"
                    data-preview="${escapeHtml(previewText.slice(0, 60))}"
                    data-copy-text="${escapeHtml(copyText)}"
                    oncontextmenu="openMessageActionMenu(event, this); return false;"
                    onpointerdown="startMessagePress(event, this)"
                    onpointermove="moveMessagePress(event)"
                    onpointerup="cancelMessagePress()"
                    onpointercancel="cancelMessagePress()"
                    onpointerleave="cancelMessagePress()"
                >
                    ${renderAvatar(row, isSend)}
                    <div class="msg-main">
                        <div class="msg-meta">
                            <span class="msg-name">${escapeHtml(name)}</span>
                            <span>${escapeHtml(shortTime(row.created_at))}</span>
                            <span>${escapeHtml(row.adapter || '')}</span>
                        </div>
                        <div class="msg-bubble">
                            ${contentHtml}
                        </div>
                        <div class="msg-extra">
                            ${!isSend && row.adapter === 'QQ' ? `已回复次数: ${replyUsed}/5` : ''}
                            ${!isSend && row.adapter === 'QQ' && replyExpired ? ` ｜ 已过期` : ''}
                            ${!isSend && row.adapter === 'QQ' && canReply ? ` ｜ 长按可复制/引用` : ''}
                            ${isSend && row.message_id ? `
                                <button
                                    class="msg-revoke-btn"
                                    onclick="event.stopPropagation(); revokeMessage(this)"
                                    data-row-id="${escapeHtml(row.id || '')}"
                                    data-adapter="${escapeHtml(row.adapter || '')}"
                                    data-scene="${escapeHtml(row.scene || '')}"
                                    data-message-id="${escapeHtml(row.message_id || '')}"
                                    data-group-id="${escapeHtml(row.group_id || '')}"
                                    data-user-id="${escapeHtml(row.user_id || '')}"
                                    type="button"
                                >
                                    撤回
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        });

        box.innerHTML = html;
        lastRenderedMessageKeys = newKeys;
        currentJumpIndex = rows.length - 1;
        
        if (rows.length) {
            currentLastRowId = Number(rows[rows.length - 1].id || 0);
        } else {
            currentLastRowId = 0;
        }

        if (forceBottom || wasBottom) {
            setTimeout(() => {
                scrollMessagesToBottom();
                hasUnreadWhileReadingHistory = false;
                hideUnreadHint();
            }, 30);
        } else {
            preserveScrollAfterRender(box, oldScrollTop, oldScrollHeight);
            hasUnreadWhileReadingHistory = true;
            showUnreadHint();
        }

    } catch (e) {
        if (!silent) {
            box.innerHTML = `<div class="error">请求异常：${escapeHtml(e)}</div>`;
        }
    } finally {
        isLoadingMessages = false;
    }
}

function startMessagePress(event, el) {
    if (event.pointerType === 'mouse' && event.button !== 0) return;

    cancelMessagePress();
    messagePressTarget = el;
    messagePressStart = {
        x: event.clientX,
        y: event.clientY
    };

    messagePressTimer = setTimeout(() => {
        openMessageActionMenu(event, el);
        messagePressTimer = null;
    }, 560);
}

function moveMessagePress(event) {
    if (!messagePressTimer || !messagePressStart) return;

    const dx = Math.abs(event.clientX - messagePressStart.x);
    const dy = Math.abs(event.clientY - messagePressStart.y);

    if (dx > 12 || dy > 12) {
        cancelMessagePress();
    }
}

function cancelMessagePress() {
    if (messagePressTimer) {
        clearTimeout(messagePressTimer);
        messagePressTimer = null;
    }
    messagePressTarget = null;
    messagePressStart = null;
}

function openMessageActionMenu(event, el) {
    if (!currentSession || !el) return;

    event.preventDefault();
    event.stopPropagation();
    cancelMessagePress();

    messageActionTarget = el;
    closeMessageActionMenu();

    const canReply = el.dataset.canReply === '1';
    const isSend = el.dataset.isSend === '1';
    const msgId = el.dataset.messageId || '';
    const canQuote = !isSend && canReply && !!msgId;

    const menu = document.createElement('div');
    menu.id = 'messageActionMenu';
    menu.className = 'message-action-menu';
    menu.innerHTML = `
        <button type="button" onclick="copyActionMenuMessage()">
            <i class="fas fa-copy"></i>
            <span>复制</span>
        </button>
        ${canQuote ? `
            <button type="button" onclick="quoteActionMenuMessage()">
                <i class="fas fa-reply"></i>
                <span>引用</span>
            </button>
        ` : ''}
    `;

    document.body.appendChild(menu);

    const margin = 8;
    const rect = menu.getBoundingClientRect();
    const x = Math.min(event.clientX || 0, window.innerWidth - rect.width - margin);
    const y = Math.min(event.clientY || 0, window.innerHeight - rect.height - margin);

    menu.style.left = `${Math.max(margin, x)}px`;
    menu.style.top = `${Math.max(margin, y)}px`;
}

function closeMessageActionMenu() {
    const menu = document.getElementById('messageActionMenu');
    if (menu) menu.remove();
}

async function copyActionMenuMessage() {
    if (!messageActionTarget) return;

    const text = messageActionTarget.dataset.copyText || messageActionTarget.dataset.preview || '';
    closeMessageActionMenu();

    if (!text) {
        showMessageToast('没有可复制内容');
        return;
    }

    try {
        if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
        } else {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            document.execCommand('copy');
            textarea.remove();
        }
        showMessageToast('已复制');
    } catch (e) {
        showMessageToast('复制失败');
    }
}

function quoteActionMenuMessage() {
    if (!messageActionTarget) return;

    selectReplyTarget(messageActionTarget);
    closeMessageActionMenu();
}

function showMessageToast(text) {
    let toast = document.getElementById('messageToast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'messageToast';
        toast.className = 'message-toast';
        document.body.appendChild(toast);
    }

    toast.innerText = text;
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => {
        toast.remove();
    }, 1200);
}

function selectReplyTarget(el) {
    if (!currentSession) return;

    const isSend = el.dataset.isSend === '1';
    const canReply = el.dataset.canReply === '1';

    if (isSend) return;
    if (!canReply) return;

    const msgId = el.dataset.messageId || '';
    const rowId = el.dataset.rowId || '';

    if (!msgId) return;

    if (selectedReplyMessageId === msgId) {
        clearReplyTarget();
        return;
    }

    selectedReplyMessageId = msgId;
    selectedReplyRowId = rowId;

    document.querySelectorAll('.msg-row').forEach(x => x.classList.remove('reply-selected'));
    el.classList.add('reply-selected');

    const name = el.dataset.name || '对方';
    const preview = el.dataset.preview || '[消息]';

    document.getElementById('replyText').innerText = `引用 ${name}: ${preview}`;
    document.getElementById('replyBar').classList.remove('hidden');
}

function clearReplyTarget() {
    selectedReplyMessageId = '';
    selectedReplyRowId = '';

    document.querySelectorAll('.msg-row').forEach(x => x.classList.remove('reply-selected'));
    document.getElementById('replyBar').classList.add('hidden');
}

function getMessageRows() {
    return Array.from(document.querySelectorAll('.msg-row'));
}

function jumpToMessage(index) {
    const rows = getMessageRows();
    if (!rows.length) return;

    index = Math.max(0, Math.min(index, rows.length - 1));
    currentJumpIndex = index;

    rows[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
    rows[index].style.outline = '2px solid var(--accent-color)';
    setTimeout(() => rows[index].style.outline = '', 800);
}

function jumpPrevMessage() {
    const rows = getMessageRows();
    if (!rows.length) return;

    if (currentJumpIndex < 0) currentJumpIndex = rows.length - 1;
    jumpToMessage(currentJumpIndex - 1);
}

function jumpNextMessage() {
    const rows = getMessageRows();
    if (!rows.length) return;

    if (currentJumpIndex < 0) currentJumpIndex = 0;
    jumpToMessage(currentJumpIndex + 1);
}

function reloadCurrentConversation() {
    if (currentSession) {
        clearReplyTarget();
        lastRenderedMessageKeys = [];
        hideUnreadHint();
        loadMessages(true, false);
    } else {
        loadSessions(false);
    }
}

function onSceneChange() {
    currentSession = null;
    currentDate = '';
    clearReplyTarget();
    lastRenderedMessageKeys = [];
    lastRenderedSessionKeys = [];
    hideUnreadHint();
    resetChatPanel();
    loadSessions(false);
}

function onAdapterChange() {
    currentSession = null;
    currentDate = '';
    clearReplyTarget();
    lastRenderedMessageKeys = [];
    lastRenderedSessionKeys = [];
    hideUnreadHint();
    resetChatPanel();
    loadSessions(false);
}

function resetChatPanel() {
    const shell = getQqShell();
    if (shell) shell.classList.remove('mobile-chat-open');

    setChatAvatar('?', '');
    document.getElementById('chatTitle').innerText = '请选择一个会话';
    document.getElementById('chatSubTitle').innerText = '左侧选择群聊或私聊后查看消息';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('sendMediaBtn').disabled = true;
    updateSendHint();

    const dateSelect = document.getElementById('dateSelect');
    dateSelect.disabled = true;
    dateSelect.innerHTML = '<option value="">今天</option>';

    document.getElementById('messageList').innerHTML = `
        <div class="empty-state">
            <i class="fas fa-comments"></i>
            <p>请选择左侧会话</p>
        </div>
    `;
}

function clearInput() {
    document.getElementById('messageInput').value = '';
    clearMedia(true);
    if (mdPreviewing) toggleMarkdownPreview(true);
}

function toggleBroadcastPanel(force = null) {
    const panel = document.getElementById('broadcastPanel');
    const btn = document.getElementById('broadcastToggleBtn');
    if (!panel || !btn) return;

    const show = force === null ? panel.classList.contains('hidden') : !!force;
    if (show) {
        closeBroadcastStatus();
    }

    panel.classList.toggle('hidden', !show);
    btn.innerHTML = show
        ? '<i class="fas fa-times"></i> 收起广播'
        : '<i class="fas fa-bullhorn"></i> 发送广播';

    if (show) {
        setTimeout(() => document.getElementById('broadcastContent')?.focus(), 30);
    }
}

function closeBroadcastStatus() {
    const box = document.getElementById('broadcastStatusBox');
    const btn = document.getElementById('broadcastStatusBtn');
    if (box) {
        box.classList.add('hidden');
    }
    if (btn) {
        btn.innerHTML = '<i class="fas fa-list"></i> 查看广播';
    }
}

async function sendBroadcast() {
    const adapter = document.getElementById('adapterSelect').value || (currentSession ? currentSession.adapter : '');
    const kind = document.getElementById('broadcastKind').value;
    const duration = document.getElementById('broadcastDuration').value || '1440';
    const contentEl = document.getElementById('broadcastContent');
    const content = contentEl.value.trim();
    const btn = document.getElementById('broadcastBtn');
    const resultBox = document.getElementById('broadcastResult');

    if (!adapter) {
        alert('请选择适配器');
        return;
    }

    if (!content) {
        alert('广播内容不能为空');
        return;
    }

    const oldText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
    resultBox.classList.add('hidden');

    try {
        const res = await fetch('/api/messages/broadcast', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                adapter,
                kind,
                duration_minutes: duration,
                content
            })
        });

        const data = await res.json();

        resultBox.classList.remove('hidden');
        resultBox.innerText = data.success
            ? (data.message || '广播已创建')
            : ('创建失败：' + (data.error || '未知错误'));

        if (data.success) {
            contentEl.value = '';
            await loadSessions(true);
        }
    } catch (e) {
        resultBox.classList.remove('hidden');
        resultBox.innerText = '请求异常：' + e;
    } finally {
        btn.disabled = false;
        btn.innerHTML = oldText;
    }
}

async function viewBroadcastStatus() {
    const btn = document.getElementById('broadcastStatusBtn');
    const box = document.getElementById('broadcastStatusBox');
    const oldText = btn.innerHTML;

    if (!box.classList.contains('hidden')) {
        box.classList.add('hidden');
        btn.innerHTML = '<i class="fas fa-list"></i> 查看广播';
        return;
    }

    toggleBroadcastPanel(false);

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 查看中...';

    try {
        const res = await fetch('/api/messages/broadcast/status');
        const data = await res.json();

        box.classList.remove('hidden');
        box.innerText = data.success
            ? (data.message || '当前没有广播。')
            : ('查看失败：' + (data.error || '未知错误'));
        btn.innerHTML = '<i class="fas fa-times"></i> 收起列表';
    } catch (e) {
        box.classList.remove('hidden');
        box.innerText = '请求异常：' + e;
        btn.innerHTML = '<i class="fas fa-times"></i> 收起列表';
    } finally {
        btn.disabled = false;
        if (btn.innerHTML.includes('查看中')) {
            btn.innerHTML = oldText;
        }
    }
}

function updateSendHint() {
    const hint = document.getElementById('sendHint');
    if (!hint) return;

    if (!currentSession) {
        hint.innerText = '未选择会话';
        return;
    }

    const adapter = currentSession.adapter || '自动';
    const activeText = activeSend && currentSession.adapter === 'QQ' ? ' ｜ 主动' : '';
    hint.innerText = `发送到：${currentSession.title}（${adapter}${activeText}）`;
}

async function sendMessage() {
    if (!currentSession) {
        alert('请先选择会话');
        return;
    }

    const input = document.getElementById('messageInput');
    const content = input.value;
    const mediaType = document.getElementById('mediaType').value;
    const mediaUrl = document.getElementById('mediaUrl').value.trim();
    const mediaFile = document.getElementById('mediaFile').files[0];

    if (!content.trim() && !mediaUrl && !mediaFile) {
        alert('消息不能为空');
        return;
    }

    const adapter = currentSession.adapter || document.getElementById('adapterSelect').value;
    if (!adapter) {
        alert('无法确定适配器，请选择明确会话或顶部适配器');
        return;
    }

    const btn = document.getElementById('sendBtn');
    const mediaBtn = document.getElementById('sendMediaBtn');
    const old = btn.innerHTML;
    const oldMedia = mediaBtn.innerHTML;

    btn.disabled = true;
    mediaBtn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
    mediaBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';

    try {
        const fd = new FormData();
        fd.append('adapter', adapter);
        fd.append('scene', currentSession.scene);
        fd.append('target_id', currentSession.target_id);
        fd.append('content', content);
        fd.append('send_mode', sendMode);
        fd.append('active_send', activeSend ? '1' : '0');
        fd.append('media_type', mediaType);
        fd.append('media_url', mediaUrl);
        fd.append('reply_message_id', selectedReplyMessageId || '');
        fd.append('quote_message_id', selectedReplyMessageId || '');

        if (mediaFile) {
            fd.append('file', mediaFile);
        }

        const res = await fetch('/api/messages/send', {
            method: 'POST',
            body: fd
        });

        const data = await res.json();

                if (data.success) {
            clearInput();
            clearReplyTarget();
            lastRenderedMessageKeys = [];
        
            setTimeout(async () => {
                try {
                    await loadMessages(true, false);
                    await loadSessions(true);
                    await loadMessageDates();
                } catch (e) {
                    console.error('发送后刷新失败:', e);
                }
            }, 100);
        
        } else {
            alert('发送失败：' + (data.error || '未知错误'));
        }
    } catch (e) {
        alert('发送异常：' + e);
    } finally {
        btn.disabled = false;
        mediaBtn.disabled = false;
        btn.innerHTML = old;
        mediaBtn.innerHTML = oldMedia;
    }
}

async function revokeMessage(btn) {
    const rowId = btn.dataset.rowId || '';
    const adapter = btn.dataset.adapter || '';
    const scene = btn.dataset.scene || '';
    const messageId = btn.dataset.messageId || '';
    const groupId = btn.dataset.groupId || '';
    const userId = btn.dataset.userId || '';

    if (!messageId) {
        alert('该消息没有 message_id，无法撤回');
        return;
    }

    if (!confirm('确定要撤回这条 Bot 消息吗？')) return;

    const oldText = btn.innerText;
    btn.disabled = true;
    btn.innerText = '撤回中...';

    try {
        const res = await fetch('/api/messages/revoke', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                row_id: rowId,
                adapter,
                scene,
                message_id: messageId,
                group_id: groupId,
                user_id: userId
            })
        });

        const data = await res.json();

        if (data.success) {
            btn.innerText = '已撤回';
            btn.disabled = true;

            lastRenderedMessageKeys = [];
            await loadMessages(false, false);
            await loadSessions(true);
        } else {
            alert('撤回失败：' + (data.error || '未知错误'));
            btn.innerText = oldText;
            btn.disabled = false;
        }
    } catch (e) {
        alert('撤回异常：' + e);
        btn.innerText = oldText;
        btn.disabled = false;
    }
}

function toggleAutoRefresh(force = null) {
    autoRefresh = (force === null) ? !autoRefresh : !!force;
    const btn = document.getElementById('autoRefreshBtn');

    if (autoRefresh) {
        btn.style.background = 'var(--success-color)';
        btn.style.color = '#fff';

        if (autoRefreshTimer) clearInterval(autoRefreshTimer);

        autoRefreshTimer = setInterval(async () => {
            await loadSessions(true);   // 左侧暂时还能全量，后面再优化
            if (currentSession) {
                await loadMessagesSince();
            }
        }, 1500);
    } else {
        btn.style.background = '';
        btn.style.color = '';

        if (autoRefreshTimer) {
            clearInterval(autoRefreshTimer);
            autoRefreshTimer = null;
        }
    }
}

function refreshAll() {
    loadSessions(false);
    if (currentSession) {
        lastRenderedMessageKeys = [];
        loadMessageDates().then(() => loadMessages(false, false));
    }
}

window.addEventListener('beforeunload', () => {
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
});

document.addEventListener('DOMContentLoaded', async () => {
    syncMobileViewportHeight();
    setSendMode(sendMode);
    setActiveSend(activeSend);
    updateMediaBadge();
    document.getElementById('messageInput')?.addEventListener('focus', () => {
        setMediaPanelOpen(false);
        updateMediaBadge();
    });
    document.addEventListener('click', (event) => {
        const menu = document.getElementById('messageActionMenu');
        if (menu && !menu.contains(event.target)) {
            closeMessageActionMenu();
        }
    });
    await loadBots();
    await loadSessions(false);
    toggleAutoRefresh(true); // 默认开启自动刷新
});

document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        rerenderCurrentMessagesAfterAttachmentPatch();
    }, 300);
});
</script>
{% endblock %}
