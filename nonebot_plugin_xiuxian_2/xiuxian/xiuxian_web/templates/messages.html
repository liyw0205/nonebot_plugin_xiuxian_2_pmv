{% extends "base.html" %}

{% block content %}
<div class="qq-page">
    <div class="qq-window">
        <div class="qq-window-titlebar">
            <div class="qq-window-profile">
                <div class="qq-window-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div>
                    <strong>修仙助手</strong>
                    <span>Web QQ 消息管理</span>
                </div>
            </div>

            <div class="qq-window-tabs" aria-label="消息面板模式">
                <button class="active" type="button"><i class="fas fa-comment"></i> 会话</button>
                <button type="button" onclick="toggleBroadcastPanel(true)"><i class="fas fa-bullhorn"></i> 广播</button>
                <button type="button" onclick="refreshAll()"><i class="fas fa-sync"></i> 刷新</button>
                <button type="button" onclick="openMessageConfigPanel()"><i class="fas fa-cog"></i> 配置</button>
            </div>

            <div class="qq-window-controls" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div id="qqShell" class="qq-shell">
        <!-- 左侧会话 -->
        <aside id="sessionPane" class="qq-session-pane">
            <div class="qq-side-header">
                <div>
                    <h2><i class="fas fa-comments"></i> 消息</h2>
                    <p>Web QQ / NTQQ 风格消息面板</p>
                </div>
                <div class="qq-side-tools">
                    <button class="icon-btn" onclick="refreshAll()" title="刷新">
                        <i class="fas fa-sync"></i>
                    </button>
                    <button class="icon-btn" onclick="openMessageConfigPanel()" title="配置">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </div>

            <div class="qq-filter-bar">
                <select id="sceneSelect" onchange="onSceneChange()">
                    <option value="group">群消息</option>
                    <option value="private">私聊消息</option>
                    <option value="channel_group">频道消息</option>
                    <option value="channel_private">频道私信</option>
                </select>

                <select id="adapterSelect" onchange="onAdapterChange()">
                    <option value="">全部适配器</option>
                </select>
            </div>

            <div class="qq-search">
                <i class="fas fa-search"></i>
                <input
                    id="keywordInput"
                    type="text"
                    placeholder="搜索消息、昵称、ID"
                    onkeydown="if(event.key==='Enter') reloadCurrentConversation()"
                >
            </div>

            <div class="broadcast-toggle-row">
                <button id="broadcastToggleBtn" class="btn btn-warning btn-sm" onclick="toggleBroadcastPanel()" type="button">
                    <i class="fas fa-bullhorn"></i> 发送广播
                </button>
                <button id="broadcastStatusBtn" class="btn btn-info btn-sm" onclick="viewBroadcastStatus()" type="button">
                    <i class="fas fa-list"></i> 查看广播
                </button>
            </div>

            <div id="broadcastStatusBox" class="broadcast-result broadcast-status-box hidden"></div>

            <div id="broadcastPanel" class="broadcast-box hidden">
                <div class="broadcast-row">
                    <select id="broadcastKind">
                        <option value="group">群聊广播</option>
                        <option value="private">私聊广播</option>
                        <option value="global">全局广播</option>
                    </select>
                    <input id="broadcastDuration" type="number" min="1" value="1440" title="有效分钟">
                </div>
                <textarea id="broadcastContent" rows="3" placeholder="广播内容"></textarea>
                <div class="broadcast-actions">
                    <button id="broadcastBtn" class="btn btn-warning btn-sm" onclick="sendBroadcast()" type="button">
                        <i class="fas fa-paper-plane"></i> 创建广播
                    </button>
                </div>
                <div id="broadcastResult" class="broadcast-result hidden"></div>
            </div>

            <div id="sessionList" class="qq-session-list">
                <div class="loading">正在加载会话...</div>
            </div>
        </aside>

        <!-- 右侧聊天 -->
        <section id="chatPane" class="qq-chat-pane">
            <div id="chatHeader" class="qq-chat-header">
                <button class="mobile-back" onclick="backToSessions()" type="button">
                    <i class="fas fa-chevron-left"></i>
                </button>

                <div id="chatAvatar" class="qq-chat-avatar">?</div>

                <div class="qq-chat-title-wrap">
                    <div class="qq-chat-title-line">
                        <div id="chatTitle" class="qq-chat-title">请选择一个会话</div>
                        <button id="chatHeaderCollapseBtn" class="chat-header-fold-btn" type="button" onclick="toggleChatHeaderCollapsed()" title="展开顶栏" aria-expanded="false">
                            <i class="fas fa-chevron-up"></i>
                        </button>
                    </div>
                    <div id="chatHeaderDetails" class="chat-header-details">
                        <div id="chatSubTitle" class="qq-chat-subtitle">左侧选择群聊或私聊后查看消息</div>

                        <div class="chat-date-row">
                            <select id="dateSelect" onchange="onDateChange()" disabled>
                                <option value="">今天</option>
                            </select>

                            <div class="qq-header-tools">
                                <button onclick="scrollMessagesToTop()" title="最旧消息" type="button">
                                    <i class="fas fa-angles-up"></i>
                                </button>
                                <button onclick="scrollMessagesToBottom()" title="最新消息" type="button">
                                    <i class="fas fa-angles-down"></i>
                                </button>
                                <button onclick="jumpPrevMessage()" title="上一条消息" type="button">
                                    <i class="fas fa-arrow-up"></i>
                                </button>
                                <button onclick="jumpNextMessage()" title="下一条消息" type="button">
                                    <i class="fas fa-arrow-down"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <button id="autoRefreshBtn" class="icon-btn" onclick="toggleAutoRefresh()" title="自动刷新" type="button">
                    <i class="fas fa-bolt"></i>
                </button>
            </div>

            <div id="messageList" class="qq-message-list">
                <div class="empty-state">
                    <i class="fas fa-comments"></i>
                    <p>请选择左侧会话</p>
                </div>
            </div>

            <!-- 输入区：默认收起，媒体面板独立 -->
            <div class="qq-composer" id="composerBox">
                <div id="replyBar" class="reply-bar hidden">
                    <div>
                        <i class="fas fa-reply"></i>
                        <span id="replyText">正在回复指定消息</span>
                    </div>
                    <button onclick="clearReplyTarget()" type="button" title="取消回复目标">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="composer-collapsed" id="composerCollapsed">
                    <div class="composer-collapsed-main" onclick="expandComposer()" role="button" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')expandComposer()">
                        <i class="fas fa-comment-dots"></i>
                        <span>输入消息...</span>
                    </div>
                    <div class="composer-collapsed-actions">
                        <button id="mediaOpenBtn" class="composer-mini-btn media-label-btn" type="button" onclick="openMediaPanel()" title="媒体">
                            <i class="fas fa-paperclip"></i>
                            <span>媒体</span>
                            <span id="mediaCountBadgeCollapsed" class="media-count-badge media-count-badge--inline hidden">0</span>
                        </button>
                        <button id="mediaToggleBtn" class="composer-mini-btn media-plus-btn" type="button" onclick="openMediaPanel()" title="更多">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>

                <div class="composer-expanded hidden" id="composerExpanded">
                    <div class="composer-toolbar">
                        <div class="composer-mode-row">
                            <button id="sendModeToggleBtn" class="mode-toggle-card" onclick="toggleSendMode()" type="button">
                                <i id="sendModeIcon" class="fas fa-comment-dots"></i>
                                <span id="sendModeText">普通消息</span>
                            </button>

                            <button id="activeSendToggleBtn" class="mode-toggle-card active-send-toggle" onclick="toggleActiveSend()" type="button">
                                <i class="fas fa-bolt"></i>
                                <span>主动</span>
                            </button>
                        </div>
                    
                        <button id="mdPreviewBtn" class="preview-btn" onclick="toggleMarkdownPreview()" type="button">
                            <i class="fas fa-eye"></i> 预览
                        </button>
                    </div>

                    <div id="mdPreviewBox" class="md-preview-box hidden"></div>

                    <textarea id="messageInput" placeholder="输入消息..." rows="2"></textarea>

                    <div class="composer-actions">
                        <div class="composer-actions-left">
                            <button class="btn btn-secondary btn-sm" onclick="collapseComposer()" type="button">
                                收起
                            </button>
                            <button id="mediaOpenBtnExpanded" class="btn btn-secondary btn-sm composer-media-btn" type="button" onclick="openMediaPanel()" title="媒体">
                                <i class="fas fa-paperclip"></i> 媒体
                                <span id="mediaCountBadgeExpanded" class="media-count-badge media-count-badge--btn hidden">0</span>
                            </button>
                        </div>

                        <div class="composer-actions-right">
                            <button class="btn btn-secondary btn-sm" onclick="clearInput()" type="button">
                                清空
                            </button>
                            <button id="sendBtn" class="btn btn-success btn-sm" onclick="sendMessage()" disabled type="button">
                                <i class="fas fa-paper-plane"></i> 发送
                            </button>
                        </div>
                    </div>
                </div>

                <span id="sendHint">未选择会话</span>
            </div>

            <div id="mediaOverlay" class="media-overlay hidden" aria-hidden="true" onclick="minimizeMediaPanel()"></div>
            <div id="mediaPanel" class="media-panel hidden" role="dialog" aria-label="发送媒体" onclick="event.stopPropagation()">
                <div class="media-panel-head">
                    <strong>发送媒体</strong>
                    <button type="button" class="media-panel-close" onclick="dismissMediaPanel()" title="关闭并隐藏图标">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="media-type-row">
                    <button type="button" onclick="chooseMediaType('image')">
                        <i class="fas fa-image"></i>
                        图片
                    </button>
                    <button type="button" onclick="chooseMediaType('audio')">
                        <i class="fas fa-microphone"></i>
                        语音
                    </button>
                    <button type="button" onclick="chooseMediaType('video')">
                        <i class="fas fa-video"></i>
                        视频
                    </button>
                    <button type="button" onclick="chooseMediaType('file')">
                        <i class="fas fa-file"></i>
                        文件
                    </button>
                </div>

                <div id="mediaDraftBox" class="media-draft-box">
                    <input id="mediaUrl" type="text" placeholder="媒体链接" onkeydown="if(event.key==='Enter'){event.preventDefault();addMediaUrlDraft();}">
                    <label class="upload-btn">
                        <i class="fas fa-paperclip"></i>
                        <input id="mediaFile" type="file" multiple hidden onchange="onMediaFilePicked()">
                        <span id="fileNameText">选择文件</span>
                    </label>
                </div>

                <div id="mediaQueueSection" class="media-queue-section hidden">
                    <div class="media-queue-head">
                        <span>已选 <strong id="mediaQueueCount">0</strong> 项</span>
                        <button type="button" class="media-queue-clear" onclick="clearMediaQueue()">清空列表</button>
                    </div>
                    <ul id="mediaQueueList" class="media-queue-list"></ul>
                </div>

                <div class="media-panel-foot">
                    <button id="sendMediaBtn" class="btn btn-success btn-sm" onclick="sendMessage()" disabled type="button">
                        <i class="fas fa-paper-plane"></i> 发送媒体
                    </button>
                </div>
            </div>
            <button id="mediaFab" class="media-fab hidden" type="button" onclick="restoreMediaPanel()" title="媒体">
                <i class="fas fa-paperclip"></i>
                <span id="mediaCountBadgeFab" class="media-count-badge hidden">0</span>
            </button>
        </section>
        </div>
    </div>
</div>

<div id="messageConfigOverlay" class="message-config-overlay hidden" onclick="closeMessageConfigPanel(event)">
    <div class="message-config-dialog" role="dialog" aria-modal="true" aria-labelledby="messageConfigTitle" onclick="event.stopPropagation()">
        <div class="message-config-header">
            <h3 id="messageConfigTitle"><i class="fas fa-cog"></i> 消息配置</h3>
            <button class="icon-btn" type="button" onclick="closeMessageConfigPanel()" title="关闭">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="message-config-form">
            <label>
                <span>记录上限 MB</span>
                <input id="messageConfigMaxSize" type="number" min="0" max="10000" step="1" inputmode="numeric" title="0 表示不记录消息">
            </label>
            <label>
                <span>群聊保留天数</span>
                <input id="messageConfigGroupKeepDays" type="number" min="0" max="36500" step="1" inputmode="numeric">
            </label>
            <label>
                <span>私聊保留天数</span>
                <input id="messageConfigPrivateKeepDays" type="number" min="0" max="36500" step="1" inputmode="numeric">
            </label>
        </div>

        <div id="messageConfigStatus" class="message-config-status"></div>

        <div class="message-config-actions">
            <button class="btn btn-secondary btn-sm" type="button" onclick="closeMessageConfigPanel()">取消</button>
            <button id="messageConfigSaveBtn" class="btn btn-primary btn-sm" type="button" onclick="saveMessageConfig()">
                <i class="fas fa-save"></i> 保存
            </button>
        </div>
    </div>
</div>

<style>
.qq-page {
    height: calc(100vh - 130px);
    min-height: 680px;
}

.qq-shell {
    height: 100%;
    display: grid;
    grid-template-columns: 330px minmax(0, 1fr);
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 25px var(--shadow-color);
}

/* 左侧会话 */
.qq-session-pane {
    border-right: 1px solid var(--border-color);
    background: color-mix(in srgb, var(--bg-primary) 80%, var(--bg-secondary));
    display: flex;
    flex-direction: column;
    min-width: 0;
}

.qq-side-header {
    height: 78px;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.qq-side-header h2 {
    font-size: 1.25rem;
    margin: 0;
    padding: 0;
}

.qq-side-header p {
    margin: 2px 0 0;
    font-size: 0.78rem;
    color: var(--text-secondary);
}

.qq-side-tools {
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.icon-btn {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: var(--bg-secondary);
    color: var(--text-primary);
    cursor: pointer;
    box-shadow: 0 2px 6px var(--shadow-color);
}

.icon-btn:hover {
    background: var(--accent-color);
    color: white;
}

.qq-filter-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 12px 10px;
}

.qq-filter-bar select {
    padding: 8px;
    font-size: 13px;
}

.qq-search {
    margin: 0 12px 10px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 999px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
}

.qq-search input {
    border: none;
    background: transparent;
    box-shadow: none;
    padding: 9px 0;
}

.qq-search input:focus {
    box-shadow: none;
}

.broadcast-toggle-row {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-secondary);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
}

.broadcast-box {
    padding: 8px 12px 10px;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-secondary);
}

.broadcast-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 82px;
    gap: 8px;
    margin-bottom: 7px;
}

.broadcast-row select,
.broadcast-row input,
.broadcast-box textarea {
    width: 100%;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 0.84rem;
}

.broadcast-row select,
.broadcast-row input {
    height: 34px;
    padding: 0 8px;
}

.broadcast-box textarea {
    resize: vertical;
    min-height: 62px;
    max-height: 130px;
    padding: 8px;
    font-family: inherit;
}

.broadcast-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 7px;
}

.broadcast-result {
    margin-top: 7px;
    padding: 8px;
    border-radius: 6px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    font-size: 0.78rem;
    line-height: 1.45;
    white-space: pre-wrap;
    max-height: 180px;
    overflow-y: auto;
}

.broadcast-status-box {
    margin: 0;
    border-radius: 0;
    border-left: none;
    border-right: none;
}

.qq-session-list {
    overflow-y: auto;
    padding: 6px 8px 12px;
    flex: 1;
}

.session-item {
    display: flex;
    gap: 10px;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.18s;
    margin-bottom: 4px;
}

.session-item:hover {
    background: color-mix(in srgb, var(--accent-color) 8%, transparent);
}

.session-item.active {
    background: color-mix(in srgb, var(--accent-color) 18%, transparent);
}

.session-avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-color), var(--info-color));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
    overflow: hidden;
}

.session-avatar img,
.qq-chat-avatar img,
.msg-avatar img,
.avatar-img {
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    object-fit: cover;
    display: block;
    border-radius: inherit;
}

.session-info {
    flex: 1;
    min-width: 0;
}

.session-title-row {
    display: flex;
    gap: 8px;
    justify-content: space-between;
}

.session-title {
    font-weight: 700;
    color: var(--text-primary);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}

.session-time {
    font-size: 0.7rem;
    color: var(--text-secondary);
    flex-shrink: 0;
}

.session-meta {
    margin-top: 3px;
    font-size: 0.78rem;
    color: var(--text-secondary);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}

/* 右侧聊天 */
.qq-chat-pane {
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
    background:
        radial-gradient(circle at 20% 10%, color-mix(in srgb, var(--accent-color) 8%, transparent), transparent 30%),
        var(--bg-secondary);
}

.qq-chat-header {
    min-height: 74px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    gap: 12px;
    background: color-mix(in srgb, var(--bg-secondary) 92%, transparent);
    backdrop-filter: blur(8px);
}

.mobile-back {
    display: none;
    border: none;
    background: transparent;
    color: var(--text-primary);
    font-size: 1.2rem;
}

.qq-chat-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-color), var(--success-color));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
    overflow: hidden;
}

.qq-chat-title-wrap {
    flex: 1;
    min-width: 0;
}

.qq-chat-title-line {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
}

.qq-chat-title-line .qq-chat-title {
    flex: 1;
    min-width: 0;
}

.chat-header-fold-btn {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 8px;
    background: color-mix(in srgb, var(--bg-primary) 88%, transparent);
    color: var(--text-secondary);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
}

.chat-header-details {
    overflow: hidden;
    transition: max-height 0.2s ease, opacity 0.18s ease;
}

.qq-chat-header.header-collapsed .chat-header-details {
    max-height: 0;
    opacity: 0;
    pointer-events: none;
    margin: 0;
}

.qq-chat-header.header-collapsed .chat-header-fold-btn i {
    transform: rotate(180deg);
}

.qq-chat-title {
    font-weight: 800;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.qq-chat-subtitle {
    font-size: 0.78rem;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.chat-date-row {
    margin-top: 3px;
}

.chat-date-row select {
    width: auto;
    min-width: 112px;
    max-width: 180px;
    padding: 3px 8px;
    font-size: 0.72rem;
    border-radius: 999px;
    background: var(--bg-primary);
}

.qq-message-list {
    flex: 1;
    overflow-y: auto;
    padding: 18px 18px 12px;
    scroll-behavior: smooth;
}

.msg-date-divider {
    text-align: center;
    margin: 12px 0;
}

.msg-date-divider span {
    font-size: 0.72rem;
    color: var(--text-secondary);
    background: color-mix(in srgb, var(--bg-primary) 85%, transparent);
    border: 1px solid var(--border-color);
    padding: 3px 10px;
    border-radius: 999px;
}

.msg-row {
    display: flex;
    gap: 9px;
    margin-bottom: 13px;
    align-items: flex-start;
}

.msg-row.send {
    flex-direction: row-reverse;
}

.msg-avatar {
    width: 34px;
    height: 34px;
    min-width: 34px;
    max-width: 34px;
    min-height: 34px;
    max-height: 34px;
    flex: 0 0 34px;
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    background: var(--info-color);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    flex-shrink: 0;
    overflow: hidden;
}

.msg-avatar > img {
    width: 100% !important;
    height: 100% !important;
    min-width: 100%;
    min-height: 100%;
    max-width: 100% !important;
    max-height: 100% !important;
    object-fit: cover;
    border-radius: 50%;
    flex: 0 0 100%;
}

.msg-main {
    max-width: min(72%, 760px);
}

.msg-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 0.7rem;
    color: var(--text-secondary);
    margin-bottom: 4px;
}

.msg-row.send .msg-meta {
    justify-content: flex-end;
}

.msg-name {
    font-weight: 600;
}

.msg-bubble {
    position: relative;
    padding: 9px 12px;
    border-radius: 13px;
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    word-break: break-word;
    box-shadow: 0 2px 8px var(--shadow-color);
}

.msg-row.recv .msg-bubble {
    border-top-left-radius: 4px;
}

.msg-row.send .msg-bubble {
    background: color-mix(in srgb, var(--accent-color) 18%, var(--bg-primary));
    border-color: color-mix(in srgb, var(--accent-color) 35%, var(--border-color));
    border-top-right-radius: 4px;
}

.msg-row.can-reply .msg-bubble {
    cursor: pointer;
}

.msg-row.can-reply .msg-bubble:hover {
    border-color: var(--accent-color);
}

.message-action-menu {
    position: fixed;
    z-index: 2000;
    min-width: 132px;
    padding: 6px;
    border-radius: 10px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    box-shadow: 0 8px 24px var(--shadow-color);
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.message-action-menu button {
    border: none;
    border-radius: 8px;
    padding: 8px 10px;
    background: transparent;
    color: var(--text-primary);
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.86rem;
}

.message-action-menu button:hover {
    background: color-mix(in srgb, var(--accent-color) 12%, var(--bg-primary));
    color: var(--accent-color);
}

.message-toast {
    position: fixed;
    left: 50%;
    bottom: 92px;
    z-index: 2100;
    transform: translateX(-50%);
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(0, 0, 0, .76);
    color: #fff;
    font-size: 0.78rem;
    pointer-events: none;
}

.msg-row.reply-selected .msg-bubble {
    outline: 2px solid var(--accent-color);
    background: color-mix(in srgb, var(--accent-color) 16%, var(--bg-primary));
}

.msg-md {
    line-height: 1.55;
}

.msg-md p {
    margin: 0.25rem 0;
}

.msg-md table {
    width: auto;
    max-width: 100%;
    font-size: 0.85rem;
}

.msg-md code {
    background: rgba(0,0,0,.12);
    padding: 1px 4px;
    border-radius: 4px;
}

.msg-raw {
    white-space: pre-wrap;
}

/* Markdown 代码块默认折叠 */
.md-code-fold {
    background: rgba(0, 0, 0, .12);
    border-radius: 8px;
    margin: 6px 0;
    overflow: hidden;
}

.md-code-fold summary {
    cursor: pointer;
    padding: 7px 9px;
    font-size: 0.78rem;
    color: var(--text-secondary);
    user-select: none;
}

.md-code-fold pre {
    margin: 0;
    padding: 8px;
    border-radius: 0;
    max-height: 360px;
    overflow: auto;
    background: rgba(0, 0, 0, .16);
}

.msg-extra {
    margin-top: 4px;
    font-size: 0.66rem;
    color: var(--text-secondary);
    opacity: 0.78;
}

.chat-date-row {
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.chat-date-row select {
    width: auto;
    min-width: 112px;
    max-width: 180px;
    padding: 3px 8px;
    font-size: 0.72rem;
    border-radius: 999px;
    background: var(--bg-primary);
}

.qq-header-tools {
    display: flex;
    align-items: center;
    gap: 5px;
}

.qq-header-tools button {
    width: 26px;
    height: 26px;
    border: none;
    border-radius: 50%;
    background: var(--bg-primary);
    color: var(--text-primary);
    box-shadow: 0 2px 6px var(--shadow-color);
    cursor: pointer;
    font-size: 0.72rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.qq-header-tools button:hover {
    background: var(--accent-color);
    color: #fff;
}

/* 输入区 */
.qq-composer {
    border-top: 1px solid var(--border-color);
    background: color-mix(in srgb, var(--bg-secondary) 96%, transparent);
    padding: 9px 10px;
}

.reply-bar {
    margin-bottom: 6px;
    background: color-mix(in srgb, var(--accent-color) 12%, var(--bg-primary));
    border-left: 4px solid var(--accent-color);
    border-radius: 8px;
    padding: 7px 9px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.82rem;
    color: var(--text-primary);
}

.reply-bar button {
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
}

.composer-collapsed {
    min-height: 42px;
    border-radius: 999px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 6px 0 10px;
}

.composer-collapsed-main {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: text;
    padding: 6px 0;
}

.composer-collapsed-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
}

.composer-mini-btn {
    position: relative;
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--accent-color);
    color: #fff;
}

.composer-mini-btn.media-label-btn {
    height: 28px;
    padding: 0 8px;
    border-radius: 999px;
    gap: 4px;
    font-size: 0.72rem;
    font-weight: 600;
    background: color-mix(in srgb, var(--accent-color) 14%, var(--bg-secondary));
    color: var(--accent-color);
    border: 1px solid color-mix(in srgb, var(--accent-color) 35%, var(--border-color));
}

.composer-mini-btn.media-plus-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
}

.composer-collapsed-main > span {
    flex: 1;
    color: var(--text-secondary);
    font-size: 0.9rem;
}

.media-count-badge--inline {
    position: static;
    min-width: 15px;
    height: 15px;
    font-size: 0.55rem;
    line-height: 11px;
    border-width: 1px;
    margin-left: 2px;
}

.media-toggle-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.media-count-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    min-width: 17px;
    height: 17px;
    padding: 0 4px;
    border-radius: 999px;
    background: var(--danger-color);
    color: #fff;
    border: 2px solid var(--bg-primary);
    font-size: 0.62rem;
    line-height: 13px;
    font-weight: 800;
    text-align: center;
    box-shadow: 0 1px 4px var(--shadow-color);
}

.composer-expanded {
    animation: fadeIn .18s ease-out;
}

.composer-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
}

.composer-mode-row {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    flex-wrap: wrap;
}

.mode-toggle-card {
    border: 1px solid var(--border-color);
    background: var(--bg-primary);
    color: var(--text-primary);
    border-radius: 999px;
    padding: 7px 13px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    font-size: 0.84rem;
    font-weight: 600;
    box-shadow: 0 2px 8px var(--shadow-color);
    transition: all .18s ease;
}

.mode-toggle-card:hover {
    border-color: var(--accent-color);
    color: var(--accent-color);
}

.mode-toggle-card.markdown {
    background: var(--accent-color);
    color: #fff;
    border-color: var(--accent-color);
}

.mode-toggle-card.markdown:hover {
    color: #fff;
    filter: brightness(0.96);
}

.mode-toggle-card.active-send-toggle.enabled {
    background: var(--warning-color);
    color: #fff;
    border-color: var(--warning-color);
}

.mode-toggle-card.active-send-toggle.enabled:hover {
    color: #fff;
    filter: brightness(0.96);
}

.media-summary-chip {
    border: 1px solid color-mix(in srgb, var(--accent-color) 45%, var(--border-color));
    background: color-mix(in srgb, var(--accent-color) 12%, var(--bg-primary));
    color: var(--accent-color);
    border-radius: 999px;
    padding: 6px 10px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 700;
}

.media-summary-chip strong {
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 999px;
    background: var(--accent-color);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.68rem;
    line-height: 1;
}

.preview-btn {
    display: none;
    border: none;
    border-radius: 999px;
    padding: 6px 12px;
    background: var(--bg-primary);
    color: var(--text-primary);
    cursor: pointer;
    border: 1px solid var(--border-color);
}

.preview-btn.show {
    display: inline-flex;
    gap: 6px;
    align-items: center;
}

#messageInput {
    resize: vertical;
    min-height: 54px;
    max-height: 140px;
    font-family: Consolas, Monaco, monospace;
}

.md-preview-box {
    min-height: 54px;
    max-height: 160px;
    overflow-y: auto;
    background: var(--bg-primary);
    border: 1px solid var(--accent-color);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 6px;
}

.hidden {
    display: none !important;
}

.message-config-overlay {
    position: fixed;
    inset: 0;
    z-index: 2200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    background: rgba(10, 24, 42, 0.46);
    backdrop-filter: blur(3px);
}

.message-config-dialog {
    width: min(420px, 100%);
    border-radius: 8px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    box-shadow: 0 18px 46px rgba(0, 0, 0, 0.28);
    color: var(--text-primary);
}

.message-config-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-color);
}

.message-config-header h3 {
    margin: 0;
    font-size: 1rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.message-config-form {
    display: grid;
    gap: 12px;
    padding: 16px;
}

.message-config-form label {
    display: grid;
    grid-template-columns: 128px minmax(0, 1fr);
    align-items: center;
    gap: 10px;
    font-weight: 600;
}

.message-config-form input {
    width: 100%;
    min-width: 0;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 8px 10px;
    background: var(--bg-primary);
    color: var(--text-primary);
}

.message-config-status {
    min-height: 20px;
    padding: 0 16px;
    font-size: 0.82rem;
    color: var(--text-secondary);
}

.message-config-status.error {
    color: var(--danger-color);
}

.message-config-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 14px 16px 16px;
}

.media-panel {
    display: none;
    margin-top: 0;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 12px 40px var(--shadow-color);
}

.media-panel:not(.hidden) {
    display: block;
}

.media-panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 0.9rem;
    color: var(--text-primary);
}

.media-panel-close {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 8px;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    cursor: pointer;
}

.media-overlay {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 40;
    background: color-mix(in srgb, #000 28%, transparent);
}

.media-overlay:not(.hidden) {
    display: block;
}

.media-fab {
    display: none;
    position: absolute;
    right: 12px;
    bottom: calc(72px + env(safe-area-inset-bottom));
    z-index: 45;
    width: 46px;
    height: 46px;
    border: none;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-color), var(--success-color));
    color: #fff;
    box-shadow: 0 4px 14px var(--shadow-color);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    font-size: 1.05rem;
}

.media-fab:not(.hidden) {
    display: inline-flex;
}

.media-fab .media-count-badge {
    top: -2px;
    right: -2px;
}

.qq-chat-pane.media-panel-open .media-panel {
    position: absolute;
    left: 50%;
    top: 50%;
    right: auto;
    bottom: auto;
    transform: translate(-50%, -50%);
    z-index: 50;
    width: min(92vw, 400px);
    max-height: min(72vh, 480px);
    overflow-y: auto;
    margin-top: 0;
}

.qq-chat-pane.media-panel-open .media-panel-head {
    display: flex;
}

.media-draft-box {
    margin-top: 10px;
    display: grid;
    gap: 8px;
}

.media-draft-hint {
    font-size: 0.78rem;
    color: var(--text-secondary);
    line-height: 1.35;
}

.media-draft-box input[type="text"] {
    width: 100%;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 8px 10px;
    background: var(--bg-secondary);
    color: var(--text-primary);
}

.media-queue-section {
    margin-top: 10px;
    border-top: 1px solid var(--border-color);
    padding-top: 8px;
}

.media-queue-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
}

.media-queue-clear {
    border: none;
    background: transparent;
    color: var(--danger-color);
    cursor: pointer;
    font-size: 0.8rem;
}

.media-queue-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 180px;
    overflow-y: auto;
}

.media-queue-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--bg-secondary);
    font-size: 0.8rem;
}

.media-queue-item-type {
    flex: 0 0 auto;
    font-weight: 600;
    color: var(--accent-color);
    min-width: 2.2em;
}

.media-queue-item-label {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text-primary);
}

.media-queue-item-remove {
    flex: 0 0 auto;
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
}

.media-queue-item-remove:hover {
    color: var(--danger-color);
    background: color-mix(in srgb, var(--danger-color) 12%, transparent);
}

.media-panel-foot {
    margin-top: 12px;
    display: flex;
    justify-content: flex-end;
}

.media-type-row button.media-type-active {
    outline: 2px solid var(--accent-color);
    background: color-mix(in srgb, var(--accent-color) 18%, var(--bg-secondary));
}

.composer-actions-left,
.composer-actions-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
}

.composer-media-btn {
    position: relative;
}

.media-count-badge--btn {
    position: static;
    margin-left: 4px;
    min-width: 16px;
    height: 16px;
    font-size: 0.65rem;
    padding: 0 4px;
    border-radius: 8px;
    background: var(--accent-color);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.media-count-badge--btn.hidden {
    display: none;
}

.media-type-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}

.media-type-row button {
    border: none;
    background: var(--bg-secondary);
    color: var(--text-primary);
    border-radius: 8px;
    padding: 10px 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: center;
    cursor: pointer;
}

.media-type-row button:hover {
    background: var(--accent-color);
    color: #fff;
}

.media-input-box {
    margin-top: 10px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
}

.media-current {
    grid-column: 1 / -1;
    font-size: 0.82rem;
    color: var(--text-secondary);
}

.media-current button {
    margin-left: 8px;
    border: none;
    background: transparent;
    color: var(--danger-color);
    cursor: pointer;
}

.msg-revoke-btn {
    margin-left: 6px;
    border: none;
    background: transparent;
    color: var(--danger-color);
    cursor: pointer;
    font-size: 0.72rem;
    padding: 0 4px;
}

.msg-revoke-btn:hover {
    text-decoration: underline;
}

.upload-btn {
    margin: 0;
    border: 1px solid var(--border-color);
    background: var(--bg-secondary);
    border-radius: 6px;
    padding: 0 12px;
    height: 40px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    min-width: 92px;
    justify-content: center;
}

.composer-actions {
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: center;
}

#sendHint {
    display: block;
    color: var(--text-secondary);
    font-size: 0.72rem;
    margin-top: 5px;
}

.empty-state {
    height: 100%;
    min-height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: var(--text-secondary);
}

/* 手机端：QQ 手机版逻辑 */
@media (max-width: 768px) {
    .qq-page {
        height: calc(100dvh - 88px);
        min-height: 0;
    }

    .qq-shell {
        display: block;
        border-radius: 0;
        height: 100%;
    }

    .qq-session-pane,
    .qq-chat-pane {
        width: 100%;
        height: 100%;
    }

    .qq-chat-pane {
        display: none;
    }

    .qq-shell.mobile-chat-open .qq-session-pane {
        display: none;
    }

    .qq-shell.mobile-chat-open .qq-chat-pane {
        display: flex;
    }

    .mobile-back {
        display: block;
    }

    .qq-chat-header {
        min-height: 54px;
        padding: 5px 8px;
        gap: 8px;
    }

    .qq-chat-avatar {
        width: 32px;
        height: 32px;
        font-size: 0.8rem;
    }

    .mobile-back {
        font-size: 1rem;
        width: 26px;
        height: 30px;
        flex-shrink: 0;
    }

    .qq-chat-title {
        font-size: 0.9rem;
    }

    .qq-chat-subtitle {
        font-size: 0.66rem;
    }

    .chat-date-row {
        margin-top: 2px;
        gap: 5px;
    }

    .chat-date-row select {
        min-width: 92px;
        max-width: 150px;
        padding: 2px 7px;
        font-size: 0.66rem;
    }

    .msg-main {
        max-width: 84%;
    }

    .qq-message-list {
        padding: 8px 7px 6px;
    }

    .msg-date-divider {
        margin: 7px 0;
    }

    .msg-date-divider span {
        padding: 2px 8px;
        font-size: 0.65rem;
    }

    .msg-row {
        gap: 7px;
        margin-bottom: 8px;
    }

    .msg-avatar {
        width: 28px;
        height: 28px;
        min-width: 28px;
        max-width: 28px;
        min-height: 28px;
        max-height: 28px;
        flex-basis: 28px;
        font-size: 0.68rem;
    }

    .msg-meta {
        gap: 4px;
        margin-bottom: 2px;
        font-size: 0.62rem;
        line-height: 1.2;
    }

    .msg-bubble {
        padding: 6px 9px;
        border-radius: 10px;
        font-size: 0.9rem;
        line-height: 1.42;
    }

    .msg-md {
        line-height: 1.42;
    }

    .msg-md p {
        margin: 0.12rem 0;
    }

    @media (max-width: 768px) {
        .qq-header-tools button {
            width: 24px;
            height: 24px;
            font-size: 0.66rem;
        }
    }

    .qq-composer {
        padding: 5px 6px calc(5px + env(safe-area-inset-bottom));
    }

    .reply-bar {

const SCENE_LABELS = {
    group: "群消息",
    private: "私聊消息",
    channel_group: "频道消息",
    channel_private: "频道私信",
};

function getStoredValue(key, fallback = '') {
    try {
        const value = localStorage.getItem(key);
        return value === null ? fallback : value;
    } catch (e) {
        return fallback;
    }
}

function setStoredValue(key, value) {
    try {
        localStorage.setItem(key, value);
    } catch (e) {}
}

function getQqShell() {
    return document.getElementById('qqShell') || document.querySelector('.qq-shell');
}

function syncMobileViewportHeight() {
    document.documentElement.style.setProperty('--xiuxian-vvh', `${window.innerHeight}px`);
}

window.addEventListener('resize', syncMobileViewportHeight, { passive: true });
window.addEventListener('orientationchange', () => {
    setTimeout(syncMobileViewportHeight, 120);
}, { passive: true });

function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, m => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[m]));
}

function fmtTime(s) {
    if (!s) return '';
    return String(s).replace('T', ' ').slice(0, 19);
}

function shortTime(s) {
    if (!s) return '';
    const x = fmtTime(s);
    const today = new Date().toISOString().slice(0, 10);
    if (x.startsWith(today)) return x.slice(11, 16);
    return x.slice(5, 16);
}

function getInitial(text, fallback = '?') {
    text = String(text || '').trim();
    return text ? text.slice(0, 1).toUpperCase() : fallback;
}

function isHttpUrl(url) {
    return /^https?:\/\//i.test(String(url || '').trim());
}

function renderAvatarImage(url) {
    return `<img class="avatar-img" src="${escapeHtml(url)}" alt="" loading="lazy">`;
}

function setChatAvatar(text, avatar) {
    const box = document.getElementById('chatAvatar');
    if (!box) return;

    if (isHttpUrl(avatar)) {
        box.innerHTML = renderAvatarImage(avatar);
    } else {
        box.innerText = text || '?';
    }
}

function sceneTargetKey(scene) {
    if (scene === 'group' || scene === 'channel_group') return 'group_id';
    return 'user_id';
}

function shouldStickToBottom(el, threshold = 120) {
    return (el.scrollHeight - el.scrollTop - el.clientHeight) <= threshold;
}

function scrollMessagesToBottom() {
    const box = document.getElementById('messageList');
    box.scrollTop = box.scrollHeight;
    hasUnreadWhileReadingHistory = false;
    hideUnreadHint();
}

function scrollMessagesToTop() {
    const box = document.getElementById('messageList');
    box.scrollTop = 0;
}

function getSessionKey(s) {
    return `${s.adapter || ''}__${s.scene || ''}__${s.target_id || ''}`;
}

function getMessageKey(row) {
    return String(row.message_id || row.id || `${row.created_at}_${row.user_id}_${row.content || ''}`);
}

function arraysEqual(a, b) {
    if (a === b) return true;
    if (!a || !b || a.length !== b.length) return false;
    for (let i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) return false;
    }
    return true;
}

function preserveScrollAfterRender(box, oldScrollTop, oldScrollHeight) {
    const newScrollHeight = box.scrollHeight;
    const delta = newScrollHeight - oldScrollHeight;
    box.scrollTop = oldScrollTop + delta;
}

function getSelectedMediaCount() {
    return mediaQueue.length;
}

function syncMediaTypeButtons() {
    document.querySelectorAll('.media-type-row button').forEach(btn => {
        const onclick = btn.getAttribute('onclick') || '';
        const m = onclick.match(/chooseMediaType\('([^']+)'\)/);
        const t = m ? m[1] : '';
        btn.classList.toggle('media-type-active', !!mediaSendType && t === mediaSendType);
    });
}

function resetMediaDraftInputs() {
    const urlEl = document.getElementById('mediaUrl');
    const fileEl = document.getElementById('mediaFile');
    const nameEl = document.getElementById('fileNameText');
    if (urlEl) urlEl.value = '';
    if (fileEl) fileEl.value = '';
    if (nameEl) nameEl.innerText = '选择文件';
}

function renderMediaQueue() {
    const section = document.getElementById('mediaQueueSection');
    const list = document.getElementById('mediaQueueList');
    const countEl = document.getElementById('mediaQueueCount');
    const n = mediaQueue.length;

    if (countEl) countEl.innerText = String(n);
    if (section) section.classList.toggle('hidden', n < 1);
    if (!list) return;

    list.innerHTML = mediaQueue.map(item => {
        const typeLabel = MEDIA_TYPE_LABELS[item.type] || item.type;
        const label = escapeHtml(item.label || '');
        return `<li class="media-queue-item" data-id="${item.id}">
            <span class="media-queue-item-type">${escapeHtml(typeLabel)}</span>
            <span class="media-queue-item-label" title="${label}">${label}</span>
            <button type="button" class="media-queue-item-remove" onclick="removeMediaQueueItem(${item.id})" title="移除此项">
                <i class="fas fa-times"></i>
            </button>
        </li>`;
    }).join('');
}

function updateMediaBadge() {
    const count = getSelectedMediaCount();
    const badgeCollapsed = document.getElementById('mediaCountBadgeCollapsed');
    const badgeFab = document.getElementById('mediaCountBadgeFab');
    const badgeExpanded = document.getElementById('mediaCountBadgeExpanded');
    const toggleBtn = document.getElementById('mediaToggleBtn');
    const mediaOpenBtn = document.getElementById('mediaOpenBtn');
    const mediaOpenBtnExpanded = document.getElementById('mediaOpenBtnExpanded');

    [badgeCollapsed, badgeFab, badgeExpanded].forEach(badge => {
        if (!badge) return;
        badge.innerText = String(count);
        badge.classList.toggle('hidden', count < 1);
    });

    const title = count > 0 ? `已选 ${count} 个媒体` : '媒体';
    if (toggleBtn) toggleBtn.title = title;
    if (mediaOpenBtn) mediaOpenBtn.title = title;
    if (mediaOpenBtnExpanded) mediaOpenBtnExpanded.title = title;

    renderMediaQueue();

    const mediaBtn = document.getElementById('sendMediaBtn');
    const canSendMedia = !!currentSession && count > 0;
    if (mediaBtn) mediaBtn.disabled = !canSendMedia;
}

function removeMediaQueueItem(id) {
    mediaQueue = mediaQueue.filter(x => x.id !== id);
    updateMediaBadge();
}

function clearMediaQueue() {
    mediaQueue = [];
    resetMediaDraftInputs();
    updateMediaBadge();
}

function addMediaUrlDraft() {
    if (!mediaSendType) {
        alert('请先选择媒体类型');
        return;
    }

    const urlEl = document.getElementById('mediaUrl');
    const url = (urlEl?.value || '').trim();
    if (!url) {
        return;
    }

    mediaQueue.push({
        id: ++mediaQueueIdSeq,
        type: mediaSendType,
        url,
        file: null,
        label: url
    });

    resetMediaDraftInputs();
    updateMediaBadge();
}

function applyMediaFileInputAttrs() {
    const fileEl = document.getElementById('mediaFile');
    if (!fileEl) return;
    fileEl.multiple = true;
    const acceptMap = {
        image: 'image/*',
        audio: 'audio/*',
        video: 'video/*',
        file: ''
    };
    fileEl.accept = acceptMap[mediaSendType] ?? '';
}

function enqueueMediaFile(file) {
    if (!file || !mediaSendType) return false;
    mediaQueue.push({
        id: ++mediaQueueIdSeq,
        type: mediaSendType,
        url: '',
        file,
        label: file.name
    });
    return true;
}

function onMediaFilePicked() {
    const fileEl = document.getElementById('mediaFile');
    const nameEl = document.getElementById('fileNameText');
    const files = fileEl?.files ? Array.from(fileEl.files) : [];

    if (!files.length) {
        if (nameEl) nameEl.innerText = '选择文件';
        return;
    }

    if (!mediaSendType) {
        alert('请先选择媒体类型');
        if (fileEl) fileEl.value = '';
        if (nameEl) nameEl.innerText = '选择文件';
        return;
    }

    for (const f of files) {
        enqueueMediaFile(f);
    }

    if (fileEl) fileEl.value = '';
    if (nameEl) nameEl.innerText = '选择文件';
    updateMediaBadge();
}

function setMediaFabVisible(visible) {
    mediaFabVisible = !!visible;
    const fab = document.getElementById('mediaFab');
    if (fab) {
        fab.classList.toggle('hidden', !mediaFabVisible);
    }
}

function setMediaPanelOpen(open, options = {}) {
    const wantOpen = !!open;
    const minimizeToFab = options.minimizeToFab === true;
    const hideFab = options.hideFab === true;

    mediaPanelOpen = wantOpen;
    const panel = document.getElementById('mediaPanel');
    const overlay = document.getElementById('mediaOverlay');
    const chatPane = document.getElementById('chatPane');

    if (panel) {
        panel.classList.toggle('hidden', !mediaPanelOpen);
    }
    if (overlay) {
        overlay.classList.toggle('hidden', !mediaPanelOpen);
        overlay.setAttribute('aria-hidden', mediaPanelOpen ? 'false' : 'true');
    }
    if (chatPane) {
        chatPane.classList.toggle('media-panel-open', mediaPanelOpen);
    }

    if (!wantOpen) {
        if (hideFab) {
            setMediaFabVisible(false);
        } else if (minimizeToFab) {
            setMediaFabVisible(true);
        }
    } else {
        setMediaFabVisible(false);
    }
}

}

function openMediaPanel() {
    setMediaPanelOpen(true);
    syncMediaTypeButtons();
    updateMediaBadge();

function minimizeMediaPanel() {
    if (!mediaPanelOpen) return;
    const minimizeToFab = isMobileChatLayout();
    setMediaPanelOpen(false, { minimizeToFab, hideFab: !minimizeToFab });
    updateMediaBadge();
}

function dismissMediaPanel() {
    setMediaPanelOpen(false, { hideFab: true });
    updateMediaBadge();
}

function restoreMediaPanel() {

function toggleMediaPanel() {
    if (mediaPanelOpen) {

    } else {

}

function extractMarkdownPreviewText(text) {
    text = String(text || '');
    if (!text.includes('<markdown:MessageMarkdown')) return text;

    const m = text.match(/content=(['"])((?:\\.|(?!\1).)*)\1/s);
    if (!m) return text;

    let val = m[2] || '';
    val = val
        .replace(/\\\\/g, '\0')
        .replace(/\\r/g, '\r')
        .replace(/\\n/g, '\n')
        .replace(/\\t/g, '\t')
        .replace(/\\"/g, '"')
        .replace(/\\'/g, "'")
        .replace(/\0/g, '\\');

    return val;
}

function buildSessionPreview(s) {
    // 后端如果已经给了 last_preview，直接使用，避免 “昵称：昵称：内容”
    if (s.last_preview) {
        let preview = extractMarkdownPreviewText(s.last_preview);
        preview = stripQQFaceMarkup(preview);
        preview = String(preview).replace(/\r/g, ' ').replace(/\n/g, ' ').trim();
        if (!preview) preview = '[空消息]';
        if (preview.length > 60) preview = preview.slice(0, 60) + '...';
        return preview;
    }

    let raw = s.last_content || s.raw_message || '';
    raw = extractMarkdownPreviewText(raw);
    raw = stripQQFaceMarkup(raw);
    raw = String(raw).replace(/\r/g, ' ').replace(/\n/g, ' ').trim();

    if (!raw) raw = '[空消息]';
    if (raw.length > 60) raw = raw.slice(0, 60) + '...';

    if (s.scene === 'group' || s.scene === 'channel_group') {
        if (s.direction === 'send') return raw;

        const sender = s.username || s.nickname || s.user_id || '未知用户';

        // 防御：如果内容本身已经以 “昵称：” 开头，不再重复拼接
        if (raw.startsWith(`${sender}：`) || raw.startsWith(`${sender}:`)) {
            return raw;
        }

        return `${sender}：${raw}`;
    }

    return raw;
}

function renderMarkdown(text) {
    try {
        if (!window.marked) {
            return `<div class="msg-raw">${escapeHtml(text)}</div>`;
        }

        const renderer = new marked.Renderer();

        renderer.code = function(code, lang) {
            let codeText = code;
            let language = lang || 'code';

            if (typeof code === 'object' && code !== null) {
                codeText = code.text || code.raw || '';
                language = code.lang || 'code';
            }

            language = language || 'code';

            return `
                <details class="md-code-fold">
                    <summary>
                        <i class="fas fa-code"></i>
                        代码块 ${language ? `(${escapeHtml(language)})` : ''}
                    </summary>
                    <pre><code class="language-${escapeHtml(language)}">${escapeHtml(codeText)}</code></pre>
                </details>
            `;
        };

        const raw = marked.parse(String(text || ''), { renderer });
        const clean = window.DOMPurify ? DOMPurify.sanitize(raw) : raw;

        return `<div class="msg-md">${clean}</div>`;
    } catch (e) {
        return `<div class="msg-raw">${escapeHtml(text)}</div>`;
    }
}

function looksLikeMarkdown(text) {
    text = String(text || '');
    return /(^#{1,6}\s)|(\*\*.+\*\*)|(```)|(^[-*]\s)|(\$\$.+\$\$)|(\|.+\|)/m.test(text);
}

function normalizeAttachmentRepr(text) {
    text = String(text || '');
    const hadMessageSegmentRepr = /\b(?:Text|Attachment)\(/.test(text);

    text = text.replace(
        /Text\(type=['"]text['"],\s*data=\{([\s\S]*?)\}\)/g,
        function(full, dataBody) {
            return extractReprField(dataBody, 'text');
        }
    );

    /**
     * 兼容 Python / NoneBot repr：
     * Attachment(type='image', data={'url': 'https://xxx'})
     * Attachment(type="image", data={"url": "https://xxx"})
     * Attachment(type='file', data={'url': 'https://xxx'})
     *
     * data 内如果有其他字段，也尽量只提取 url。
     */
    text = text.replace(
        /Attachment\(type=['"]([^'"]+)['"],\s*data=\{([\s\S]*?)\}\)/g,
        function(full, type, dataBody) {
            const url = extractAttachmentUrlFromData(dataBody);
            if (!url) return '';

            return `<attachment[${type}]:${url}>`;
        }
    );

    text = text.replace(
        /\[(图片消息|语音消息|视频消息|文件消息|附件消息)\]\s*(https?:\/\/[^\s<>"']+)/g,
        function(full, label, url) {
            const typeMap = {
                '图片消息': 'image',
                '语音消息': 'audio',
                '视频消息': 'video',
                '文件消息': 'file',
                '附件消息': 'attachment'
            };
            return `<attachment[${typeMap[label] || 'attachment'}]:${normalizeLoggedHttpUrl(url)}>`;
        }
    );

    text = text.replace(
        /<attachment\[([^\]]+)\]:(https?:\/\/[^>]+)>/g,
        function(full, type, url) {
            return `<attachment[${type}]:${normalizeLoggedHttpUrl(url)}>`;
        }
    );

    if (hadMessageSegmentRepr) {
        text = cleanupMessageSegmentRepr(text);
    }

    return text;
}

function normalizeLoggedHttpUrl(url) {
    return String(url || '').replace(/\s+/g, '').trim();
}

function decodeReprString(value) {
    return String(value || '')
        .replace(/\\r/g, '\r')
        .replace(/\\n/g, '\n')
        .replace(/\\t/g, '\t')
        .replace(/\\'/g, "'")
        .replace(/\\"/g, '"')
        .replace(/\\\\/g, '\\');
}

function extractReprField(dataBody, field) {
    dataBody = String(dataBody || '');
    const escapedField = String(field).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const singleRe = new RegExp(`['"]${escapedField}['"]\\s*:\\s*'((?:\\\\.|[^'])*)'`);
    const doubleRe = new RegExp(`['"]${escapedField}['"]\\s*:\\s*"((?:\\\\.|[^"])*)"`);
    const match = dataBody.match(singleRe) || dataBody.match(doubleRe);
    return match ? decodeReprString(match[1]) : '';
}

function extractAttachmentUrlFromData(dataBody) {
    for (const field of ['url', 'file', 'path', 'src']) {
        const value = extractReprField(dataBody, field);
        if (/^https?:\/\//i.test(value)) {
            return normalizeLoggedHttpUrl(value);
        }
    }
    return '';
}

function cleanupMessageSegmentRepr(text) {
    let value = String(text || '').trim();

    if (value.startsWith('[') && value.endsWith(']')) {
        value = value.slice(1, -1).trim();
    }

    value = value.replace(/^\s*,\s*/, '');
    value = value.replace(/\s*,\s*$/, '');
    value = value.replace(/\s*,\s*(?=<attachment\[)/g, '\n');
    value = value.replace(/(<attachment\[[^\]]+\]:https?:\/\/[^>]+>)\s*,\s*/g, '$1\n');
    value = value.replace(/\n{3,}/g, '\n\n');

    return value.trim();
}

function decodeQQFaceExtText(ext) {
    try {
        let value = String(ext || '').replace(/\s+/g, '');
        value += '='.repeat((4 - value.length % 4) % 4);
        const binary = atob(value);
        const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
        const raw = new TextDecoder('utf-8').decode(bytes);
        const data = JSON.parse(raw);
        return String(data.text || '').trim();
    } catch (e) {
        return '';
    }
}

function stripQQFaceMarkup(text) {
    text = String(text || '');

    text = text.replace(
        /<faceType=\d+,\s*faceId=(?:"[^"]*"|'[^']*'|[^,>]+),\s*ext=(?:"([^"]*)"|'([^']*)'|([^>]+))>\s*/g,
        function(full, ext1, ext2, ext3) {
            const label = decodeQQFaceExtText(ext1 || ext2 || ext3 || '');
            return label ? `[表情:${label}]` : '';
        }
    );

    return text.replace(/\uFFFC/g, '').trim();
}

function buildMessageCopyText(text) {
    let value = stripQQFaceMarkup(normalizeAttachmentRepr(String(text || '')));
    value = value.replace(
        /<attachment\[([^\]]+)\]:(https?:\/\/[^>]+)>/g,
        function(full, type, url) {
            return `[${getAttachmentLabel(type)}] ${url}`;
        }
    );
    return value.trim();
}

function getAttachmentLabel(type) {
    type = String(type || '').toLowerCase();

    const labelMap = {
        image: '图片消息',
        file: '文件消息',
        audio: '语音消息',
        record: '语音消息',
        voice: '语音消息',
        video: '视频消息',
        attachment: '附件消息'
    };

    return labelMap[type] || `${type}附件`;
}

function shouldProxyImageUrl(url) {
    try {
        const parsed = new URL(String(url || '').trim());
        const host = parsed.hostname.toLowerCase();
        return host === 'multimedia.nt.qq.com.cn' || host.endsWith('.qpic.cn');
    } catch (e) {
        return false;
    }
}

function getImageRenderUrl(url) {
    url = String(url || '').trim();
    if (!shouldProxyImageUrl(url)) return url;
    return `/api/messages/media_proxy?url=${encodeURIComponent(url)}`;
}

function renderAttachmentHtml(type, url) {
    type = String(type || '').toLowerCase();
    url = String(url || '').trim();

    if (!url) return '';

    const safeUrl = escapeHtml(url);
    const safeImageUrl = escapeHtml(getImageRenderUrl(url));
    const label = escapeHtml(getAttachmentLabel(type));

    /**
     * 图片：用 Markdown 图片语法渲染
     */
    if (type === 'image') {
        return `
            <div class="msg-media msg-image">
                <img src="${safeImageUrl}" alt="${label}" loading="lazy" onerror="this.closest('.msg-image')?.classList.add('load-failed')">
                <a class="msg-image-fallback" href="${safeUrl}" target="_blank" rel="noopener noreferrer">打开图片链接</a>
            </div>
        `;
    }

    /**
     * 音频：直接播放器
     */
    if (type === 'audio' || type === 'record' || type === 'voice') {
        return `
            <div class="msg-media msg-audio">
                <div style="font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 4px;">
                    <i class="fas fa-microphone"></i> ${label}
                </div>
                <audio controls preload="none" style="max-width: 280px; width: 100%;">
                    <source src="${safeUrl}">
                    当前浏览器不支持音频播放
                </audio>
                <div style="margin-top: 4px;">
                    <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" style="font-size: 0.75rem;">
                        打开音频链接
                    </a>
                </div>
            </div>
        `;
    }

    /**
     * 视频：直接播放器
     */
    if (type === 'video') {
        return `
            <div class="msg-media msg-video">
                <div style="font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 4px;">
                    <i class="fas fa-video"></i> ${label}
                </div>
                <video controls preload="metadata" style="max-width: min(320px, 100%); max-height: 360px; border-radius: 10px; display: block;">
                    <source src="${safeUrl}">
                    当前浏览器不支持视频播放
                </video>
                <div style="margin-top: 4px;">
                    <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" style="font-size: 0.75rem;">
                        打开视频链接
                    </a>
                </div>
            </div>
        `;
    }

    /**
     * 文件：链接
     */
    if (type === 'file') {
        return `
            <div class="msg-media msg-file" style="margin-top: 6px;">
                <a href="${safeUrl}" target="_blank" rel="noopener noreferrer"
                   class="btn btn-info btn-sm"
                   style="display: inline-flex; align-items: center; gap: 6px;">
                    <i class="fas fa-file-download"></i>
                    ${label}
                </a>
            </div>
        `;
    }

    /**
     * 其他未知类型：附件链接
     */
    return `
        <div class="msg-media msg-attachment" style="margin-top: 6px;">
            <a href="${safeUrl}" target="_blank" rel="noopener noreferrer"
               class="btn btn-info btn-sm"
               style="display: inline-flex; align-items: center; gap: 6px;">
                <i class="fas fa-paperclip"></i>
                ${label}
            </a>
        </div>
    `;
}

function renderPlainWithAttachments(text) {
    text = stripQQFaceMarkup(normalizeAttachmentRepr(String(text || '')));

    const re = /<attachment\[([^\]]+)\]:(https?:\/\/[^>]+)>/g;

    let html = '';
    let lastIndex = 0;
    let match;

    while ((match = re.exec(text)) !== null) {
        const before = text.slice(lastIndex, match.index);

        /**
         * 附件前的普通文字：
         * 如果像 Markdown，就按 Markdown 渲染；
         * 否则安全 escape 后保留换行。
         */
        if (before) {
            if (looksLikeMarkdown(before)) {
                html += renderMarkdown(before);
            } else {
                html += `<div class="msg-raw">${escapeHtml(before)}</div>`;
            }
        }

        html += renderAttachmentHtml(match[1], match[2]);

        lastIndex = re.lastIndex;
    }

    const rest = text.slice(lastIndex);
    if (rest) {
        if (looksLikeMarkdown(rest)) {
            html += renderMarkdown(rest);
        } else {
            html += `<div class="msg-raw">${escapeHtml(rest)}</div>`;
        }
    }

    return `<div class="msg-attachment-wrap">${html}</div>`;
}

function renderMessageContent(text) {
    text = stripQQFaceMarkup(normalizeAttachmentRepr(String(text || '')));

    /**
     * 只要包含附件标记，就统一走附件渲染。
     */
    if (/<attachment\[[^\]]+\]:https?:\/\/[^>]+>/.test(text)) {
        return renderPlainWithAttachments(text);
    }

    /**
     * 兼容 Attachment(...) 还没被正常转成 attachment token 的情况。
     */
    if (/Attachment\(type=['"][^'"]+['"],\s*data=\{[\s\S]*?['"]url['"]\s*:\s*['"]https?:\/\/[^'"]+['"][\s\S]*?\}\)/.test(text)) {
        return renderPlainWithAttachments(text);
    }

    /**
     * 原有 Markdown 正常渲染。
     */
    if (looksLikeMarkdown(text)) {
        return renderMarkdown(text);
    }

    /**
     * 普通文本安全显示。
     */
    return `<div class="msg-raw">${escapeHtml(text)}</div>`;
}

function hasRenderableAttachment(text) {
    text = stripQQFaceMarkup(normalizeAttachmentRepr(String(text || '')));
    return /<attachment\[[^\]]+\]:https?:\/\/[^>]+>/.test(text);
}

/**
 * 刷新当前会话，让旧消息立即用新渲染逻辑显示。
 */
function rerenderCurrentMessagesAfterAttachmentPatch() {
    try {
        if (typeof currentSession !== 'undefined' && currentSession) {
            lastRenderedMessageKeys = [];
            loadMessages(false, false);
        }
    } catch (e) {
        console.warn('附件渲染补丁刷新失败:', e);
    }
}

function renderAvatar(row, isSend = false) {

    if (avatar && isHttpUrl(avatar)) {

    }

    if (isSend) {
        return `<div class="msg-avatar" style="background:var(--success-color);">${escapeHtml(getInitial(name, '机'))}</div>`;
    }

    return `<div class="msg-avatar">${escapeHtml(getInitial(name, '人'))}</div>`;
}

function renderMessageRow(row, idx = 0) {
    const isSend = row.direction === 'send';
    const name = isSend
        ? (row.username || row.nickname || 'Bot')
        : (row.username || row.nickname || row.user_id || '未知用户');
    const content = row.display_content || row.content || row.raw_message || '';
    const copyText = buildMessageCopyText(content);
    const previewText = copyText || String(content || '').slice(0, 60);
    const messageId = row.message_id || '';
    const referenceId = row.reference_id || '';
    const quoteKey = referenceId || ((row.scene === 'channel_group' || row.scene === 'channel_private') ? messageId : '');
    const replyUsed = Number(row.reply_used_count || 0);
    const canReplyMsgId = !!row.can_reply_msg_id;
    const canQuoteReference = !!row.can_quote_reference;
    const canQuote = !!row.can_quote || !!row.can_reply;
    const canReply = canQuote;
    const replyExpired = !!row.reply_expired;
    const replyCountLimited = !!row.reply_count_limited;
    const createdDate = (row.created_at || '').slice(0, 10);

    const contentHtml = row.content_format === 'markdown' && !hasRenderableAttachment(content)
        ? renderMarkdown(content)
        : renderMessageContent(content);

    const rowClasses = [
        'msg-row',
        isSend ? 'send' : 'recv',
        canReply ? 'can-reply' : '',
        selectedReplyMessageId && selectedReplyMessageId === messageId ? 'reply-selected' : '',
        selectedQuoteReferenceId && selectedQuoteReferenceId === quoteKey ? 'reply-selected' : ''
    ].filter(Boolean).join(' ');

    return `
        <div
            class="${rowClasses}"
            data-msg-index="${idx}"
            data-row-id="${escapeHtml(row.id || '')}"
            data-created-date="${escapeHtml(createdDate)}"
            data-message-id="${escapeHtml(messageId)}"
            data-reference-id="${escapeHtml(referenceId)}"
            data-is-send="${isSend ? '1' : '0'}"
            data-can-reply="${canReply ? '1' : '0'}"
            data-can-reply-msg-id="${canReplyMsgId ? '1' : '0'}"
            data-can-quote-reference="${canQuoteReference ? '1' : '0'}"
            data-can-quote="${canQuote ? '1' : '0'}"
            data-name="${escapeHtml(name)}"
            data-preview="${escapeHtml(previewText.slice(0, 60))}"
            data-copy-text="${escapeHtml(copyText)}"
            oncontextmenu="openMessageActionMenu(event, this); return false;"
            onpointerdown="startMessagePress(event, this)"
            onpointermove="moveMessagePress(event)"
            onpointerup="cancelMessagePress()"
            onpointercancel="cancelMessagePress()"
            onpointerleave="cancelMessagePress()"
        >
            ${renderAvatar(row, isSend)}
            <div class="msg-main">
                <div class="msg-meta">
                    <span class="msg-name">${escapeHtml(name)}</span>
                    <span>${escapeHtml(shortTime(row.created_at))}</span>
                    <span>${escapeHtml(row.adapter || '')}</span>
                </div>
                <div class="msg-bubble">
                    ${contentHtml}
                </div>
                <div class="msg-extra">
                    ${!isSend && row.adapter === 'QQ' ? `已回复次数: ${replyUsed}/5` : ''}
                    ${!isSend && row.adapter === 'QQ' && canReplyMsgId ? ` ｜ 可用 msg_id` : ''}
                    ${!isSend && row.adapter === 'QQ' && !canReplyMsgId && replyExpired ? ` ｜ msg_id 已过期` : ''}
                    ${!isSend && row.adapter === 'QQ' && !canReplyMsgId && !replyExpired && replyCountLimited ? ` ｜ msg_id 次数已满` : ''}
                    ${!isSend && row.adapter === 'QQ' && canQuoteReference ? ` ｜ 可引用` : ''}
                    ${!isSend && row.adapter === 'QQ' && canQuote ? ` ｜ 长按可操作` : ''}
                    ${isSend && row.message_id ? `
                        <button
                            class="msg-revoke-btn"
                            onclick="event.stopPropagation(); revokeMessage(this)"
                            data-row-id="${escapeHtml(row.id || '')}"
                            data-adapter="${escapeHtml(row.adapter || '')}"
                            data-scene="${escapeHtml(row.scene || '')}"
                            data-message-id="${escapeHtml(row.message_id || '')}"
                            data-group-id="${escapeHtml(row.group_id || '')}"
                            data-user-id="${escapeHtml(row.user_id || '')}"
                            type="button"
                        >
                            撤回
                        </button>
                    ` : ''}
                </div>
            </div>
        </div>
    `;
}

function renderMessageRows(rows, startIndex = 0, carryDate = '') {
    let lastDate = carryDate || '';
    let html = '';

    (rows || []).forEach((row, offset) => {
        const datePart = (row.created_at || '').slice(0, 10);
        if (datePart && datePart !== lastDate) {
            lastDate = datePart;
            html += `<div class="msg-date-divider" data-date="${escapeHtml(datePart)}"><span>${escapeHtml(datePart)}</span></div>`;
        }
        html += renderMessageRow(row, startIndex + offset);
    });

    return html;
}

function renderedRowExists(rowId) {
    if (!rowId) return false;
    return getMessageRows().some(row => row.dataset.rowId === String(rowId));
}

function normalizeDateDividers() {
    const box = document.getElementById('messageList');
    let activeDate = '';

    Array.from(box.children).forEach(child => {
        if (child.classList.contains('msg-date-divider')) {
            const date = child.dataset.date || child.innerText.trim();
            if (date && date === activeDate) {
                child.remove();
            } else {
                activeDate = date;
            }
            return;
        }

        if (child.classList.contains('msg-row')) {
            const rowDate = child.dataset.createdDate || '';
            if (rowDate) {
                activeDate = rowDate;
            }
        }
    });
}

function reindexRenderedMessages() {
    getMessageRows().forEach((row, idx) => {
        row.dataset.msgIndex = String(idx);
    });
}

function getLastRenderedMessageDate() {
    const rows = getMessageRows();
    if (!rows.length) return '';
    return rows[rows.length - 1].dataset.createdDate || '';
}

function getFirstVisibleMessageIndex(box) {
    const rows = getMessageRows();
    if (!rows.length) return -1;

    const boxTop = box.getBoundingClientRect().top;
    for (let i = 0; i < rows.length; i++) {
        if (rows[i].getBoundingClientRect().bottom >= boxTop + 8) {
            return i;
        }
    }

    return rows.length - 1;
}
