{% extends "base.html" %}

{% block content %}
<div class="qq-page">
    <div class="qq-window">
        <div class="qq-window-titlebar">
            <div class="qq-window-profile">
                <div class="qq-window-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div>
                    <strong>修仙助手</strong>
                    <span>Web QQ 消息管理</span>
                </div>
            </div>

            <div class="qq-window-tabs" aria-label="消息面板模式">
                <button class="active" type="button"><i class="fas fa-comment"></i> 会话</button>
                <button type="button" onclick="toggleBroadcastPanel(true)"><i class="fas fa-bullhorn"></i> 广播</button>
                <button type="button" onclick="refreshAll()"><i class="fas fa-sync"></i> 刷新</button>
            </div>

            <div class="qq-window-controls" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div id="qqShell" class="qq-shell">
        <!-- 左侧会话 -->
        <aside id="sessionPane" class="qq-session-pane">
            <div class="qq-side-header">
                <div>
                    <h2><i class="fas fa-comments"></i> 消息</h2>
                    <p>Web QQ / NTQQ 风格消息面板</p>
                </div>
                <button class="icon-btn" onclick="refreshAll()" title="刷新">
                    <i class="fas fa-sync"></i>
                </button>
            </div>

            <div class="qq-filter-bar">
                <select id="sceneSelect" onchange="onSceneChange()">
                    <option value="group">群消息</option>
                    <option value="private">私聊消息</option>
                    <option value="channel_group">频道消息</option>
                    <option value="channel_private">频道私信</option>
                </select>

                <select id="adapterSelect" onchange="onAdapterChange()">
                    <option value="">全部适配器</option>
                </select>
            </div>

            <div class="qq-search">
                <i class="fas fa-search"></i>
                <input
                    id="keywordInput"
                    type="text"
                    placeholder="搜索消息、昵称、ID"
                    onkeydown="if(event.key==='Enter') reloadCurrentConversation()"
                >
            </div>

            <div class="broadcast-toggle-row">
                <button id="broadcastToggleBtn" class="btn btn-warning btn-sm" onclick="toggleBroadcastPanel()" type="button">
                    <i class="fas fa-bullhorn"></i> 发送广播
                </button>
                <button id="broadcastStatusBtn" class="btn btn-info btn-sm" onclick="viewBroadcastStatus()" type="button">
                    <i class="fas fa-list"></i> 查看广播
                </button>
            </div>

            <div id="broadcastStatusBox" class="broadcast-result broadcast-status-box hidden"></div>

            <div id="broadcastPanel" class="broadcast-box hidden">
                <div class="broadcast-row">
                    <select id="broadcastKind">
                        <option value="group">群聊广播</option>
                        <option value="private">私聊广播</option>
                        <option value="global">全局广播</option>
                    </select>
                    <input id="broadcastDuration" type="number" min="1" value="1440" title="有效分钟">
                </div>
                <textarea id="broadcastContent" rows="3" placeholder="广播内容"></textarea>
                <div class="broadcast-actions">
                    <button id="broadcastBtn" class="btn btn-warning btn-sm" onclick="sendBroadcast()" type="button">
                        <i class="fas fa-paper-plane"></i> 创建广播
                    </button>
                </div>
                <div id="broadcastResult" class="broadcast-result hidden"></div>
            </div>

            <div id="sessionList" class="qq-session-list">
                <div class="loading">正在加载会话...</div>
            </div>
        </aside>

        <!-- 右侧聊天 -->
        <section id="chatPane" class="qq-chat-pane">
            <div class="qq-chat-header">
                <button class="mobile-back" onclick="backToSessions()">
                    <i class="fas fa-chevron-left"></i>
                </button>

                <div id="chatAvatar" class="qq-chat-avatar">?</div>

                <div class="qq-chat-title-wrap">
                    <div id="chatTitle" class="qq-chat-title">请选择一个会话</div>
                    <div id="chatSubTitle" class="qq-chat-subtitle">左侧选择群聊或私聊后查看消息</div>

                    <div class="chat-date-row">
                        <select id="dateSelect" onchange="onDateChange()" disabled>
                            <option value="">今天</option>
                        </select>

                        <div class="qq-header-tools">
                            <button onclick="scrollMessagesToTop()" title="最旧消息" type="button">
                                <i class="fas fa-angles-up"></i>
                            </button>
                            <button onclick="scrollMessagesToBottom()" title="最新消息" type="button">
                                <i class="fas fa-angles-down"></i>
                            </button>
                            <button onclick="jumpPrevMessage()" title="上一条消息" type="button">
                                <i class="fas fa-arrow-up"></i>
                            </button>
                            <button onclick="jumpNextMessage()" title="下一条消息" type="button">
                                <i class="fas fa-arrow-down"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <button id="autoRefreshBtn" class="icon-btn" onclick="toggleAutoRefresh()" title="自动刷新">
                    <i class="fas fa-bolt"></i>
                </button>
            </div>

            <div id="messageList" class="qq-message-list">
                <div class="empty-state">
                    <i class="fas fa-comments"></i>
                    <p>请选择左侧会话</p>
                </div>
            </div>

            <!-- 输入区：默认收起，媒体面板独立 -->
            <div class="qq-composer" id="composerBox">
                <div id="replyBar" class="reply-bar hidden">
                    <div>
                        <i class="fas fa-reply"></i>
                        <span id="replyText">正在回复指定消息</span>
                    </div>
                    <button onclick="clearReplyTarget()" type="button" title="取消回复目标">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="composer-collapsed" id="composerCollapsed" onclick="expandComposer()">
                    <i class="fas fa-comment-dots"></i>
                    <span>输入消息...</span>
                    <button id="mediaToggleBtn" class="media-toggle-btn" type="button" onclick="event.stopPropagation(); toggleMediaPanel()" title="发送媒体">
                        <i class="fas fa-plus"></i>
                        <span id="mediaCountBadge" class="media-count-badge hidden">0</span>
                    </button>
                </div>

                <div class="composer-expanded hidden" id="composerExpanded">
                    <div class="composer-toolbar">
                        <div class="composer-mode-row">
                            <button id="sendModeToggleBtn" class="mode-toggle-card" onclick="toggleSendMode()" type="button">
                                <i id="sendModeIcon" class="fas fa-comment-dots"></i>
                                <span id="sendModeText">普通消息</span>
                            </button>

                            <button id="activeSendToggleBtn" class="mode-toggle-card active-send-toggle" onclick="toggleActiveSend()" type="button">
                                <i class="fas fa-bolt"></i>
                                <span>主动</span>
                            </button>

                            <button id="mediaSummaryChip" class="media-summary-chip hidden" onclick="toggleMediaPanel()" type="button" title="查看已选媒体">
                                <i class="fas fa-paperclip"></i>
                                <span>媒体</span>
                                <strong id="mediaSummaryCount">0</strong>
                            </button>
                        </div>
                    
                        <button id="mdPreviewBtn" class="preview-btn" onclick="toggleMarkdownPreview()" type="button">
                            <i class="fas fa-eye"></i> 预览
                        </button>
                    </div>

                    <div id="mdPreviewBox" class="md-preview-box hidden"></div>

                    <textarea id="messageInput" placeholder="输入消息..." rows="2"></textarea>

                    <div class="composer-actions">
                        <button class="btn btn-secondary btn-sm" onclick="collapseComposer()" type="button">
                            收起
                        </button>

                        <div>
                            <button class="btn btn-secondary btn-sm" onclick="clearInput()" type="button">
                                清空
                            </button>
                            <button id="sendBtn" class="btn btn-success btn-sm" onclick="sendMessage()" disabled type="button">
                                <i class="fas fa-paper-plane"></i> 发送
                            </button>
                        </div>
                    </div>
                </div>

                <div id="mediaPanel" class="media-panel hidden">
                    <input type="hidden" id="mediaType" value="">

                    <div class="media-type-row">
                        <button onclick="chooseMediaType('image')" type="button">
                            <i class="fas fa-image"></i>
                            图片
                        </button>
                        <button onclick="chooseMediaType('audio')" type="button">
                            <i class="fas fa-microphone"></i>
                            语音
                        </button>
                        <button onclick="chooseMediaType('video')" type="button">
                            <i class="fas fa-video"></i>
                            视频
                        </button>
                        <button onclick="chooseMediaType('file')" type="button">
                            <i class="fas fa-file"></i>
                            文件
                        </button>
                    </div>

                    <div id="mediaInputBox" class="media-input-box hidden">
                        <div class="media-current">
                            当前媒体：<strong id="mediaCurrentText">未选择</strong>
                            <button onclick="clearMedia()" type="button">清除</button>
                        </div>

                        <input id="mediaUrl" type="text" placeholder="媒体链接，可留空" oninput="updateMediaBadge()">

                        <label class="upload-btn">
                            <i class="fas fa-paperclip"></i>
                            <input id="mediaFile" type="file" hidden onchange="onFileChosen()">
                            <span id="fileNameText">选择文件</span>
                        </label>

                        <button id="sendMediaBtn" class="btn btn-success btn-sm" onclick="sendMessage()" disabled type="button">
                            <i class="fas fa-paper-plane"></i> 发送媒体
                        </button>
                    </div>
                </div>

                <span id="sendHint">未选择会话</span>
            </div>
        </section>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

<style>
.qq-page {
    height: calc(100vh - 130px);
    min-height: 680px;
}

.qq-shell {
    height: 100%;
    display: grid;
    grid-template-columns: 330px minmax(0, 1fr);
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 25px var(--shadow-color);
}

/* 左侧会话 */
.qq-session-pane {
    border-right: 1px solid var(--border-color);
    background: color-mix(in srgb, var(--bg-primary) 80%, var(--bg-secondary));
    display: flex;
    flex-direction: column;
    min-width: 0;
}

.qq-side-header {
    height: 78px;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.qq-side-header h2 {
    font-size: 1.25rem;
    margin: 0;
    padding: 0;
}

.qq-side-header p {
    margin: 2px 0 0;
    font-size: 0.78rem;
    color: var(--text-secondary);
}

.icon-btn {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: var(--bg-secondary);
    color: var(--text-primary);
    cursor: pointer;
    box-shadow: 0 2px 6px var(--shadow-color);
}

.icon-btn:hover {
    background: var(--accent-color);
    color: white;
}

.qq-filter-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 12px 10px;
}

.qq-filter-bar select {
    padding: 8px;
    font-size: 13px;
}

.qq-search {
    margin: 0 12px 10px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 999px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
}

.qq-search input {
    border: none;
    background: transparent;
    box-shadow: none;
    padding: 9px 0;
}

.qq-search input:focus {
    box-shadow: none;
}

.broadcast-toggle-row {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-secondary);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
}

.broadcast-box {
    padding: 8px 12px 10px;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-secondary);
}

.broadcast-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 82px;
    gap: 8px;
    margin-bottom: 7px;
}

.broadcast-row select,
.broadcast-row input,
.broadcast-box textarea {
    width: 100%;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 0.84rem;
}

.broadcast-row select,
.broadcast-row input {
    height: 34px;
    padding: 0 8px;
}

.broadcast-box textarea {
    resize: vertical;
    min-height: 62px;
    max-height: 130px;
    padding: 8px;
    font-family: inherit;
}

.broadcast-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 7px;
}

.broadcast-result {
    margin-top: 7px;
    padding: 8px;
    border-radius: 6px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    font-size: 0.78rem;
    line-height: 1.45;
    white-space: pre-wrap;
    max-height: 180px;
    overflow-y: auto;
}

.broadcast-status-box {
    margin: 0;
    border-radius: 0;
    border-left: none;
    border-right: none;
}

.qq-session-list {
    overflow-y: auto;
    padding: 6px 8px 12px;
    flex: 1;
}

.session-item {
    display: flex;
    gap: 10px;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.18s;
    margin-bottom: 4px;
}

.session-item:hover {
    background: color-mix(in srgb, var(--accent-color) 8%, transparent);
}

.session-item.active {
    background: color-mix(in srgb, var(--accent-color) 18%, transparent);
}

.session-avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-color), var(--info-color));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
    overflow: hidden;
}

.session-avatar img,
.qq-chat-avatar img,
.msg-avatar img,
.avatar-img {
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    object-fit: cover;
    display: block;
    border-radius: inherit;
}

.session-info {
    flex: 1;
    min-width: 0;
}

.session-title-row {
    display: flex;
    gap: 8px;
    justify-content: space-between;
}

.session-title {
    font-weight: 700;
    color: var(--text-primary);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}

.session-time {
    font-size: 0.7rem;
    color: var(--text-secondary);
    flex-shrink: 0;
}

.session-meta {
    margin-top: 3px;
    font-size: 0.78rem;
    color: var(--text-secondary);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}

/* 右侧聊天 */
.qq-chat-pane {
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
    background:
        radial-gradient(circle at 20% 10%, color-mix(in srgb, var(--accent-color) 8%, transparent), transparent 30%),
        var(--bg-secondary);
}

.qq-chat-header {
    min-height: 74px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    gap: 12px;
    background: color-mix(in srgb, var(--bg-secondary) 92%, transparent);
    backdrop-filter: blur(8px);
}

.mobile-back {
    display: none;
    border: none;
    background: transparent;
    color: var(--text-primary);
    font-size: 1.2rem;
}

.qq-chat-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-color), var(--success-color));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
    overflow: hidden;
}

.qq-chat-title-wrap {
    flex: 1;
    min-width: 0;
}

.qq-chat-title {
    font-weight: 800;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.qq-chat-subtitle {
    font-size: 0.78rem;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.chat-date-row {
    margin-top: 3px;
}

.chat-date-row select {
    width: auto;
    min-width: 112px;
    max-width: 180px;
    padding: 3px 8px;
    font-size: 0.72rem;
    border-radius: 999px;
    background: var(--bg-primary);
}

.qq-message-list {
    flex: 1;
    overflow-y: auto;
    padding: 18px 18px 12px;
    scroll-behavior: smooth;
}

.msg-date-divider {
    text-align: center;
    margin: 12px 0;
}

.msg-date-divider span {
    font-size: 0.72rem;
    color: var(--text-secondary);
    background: color-mix(in srgb, var(--bg-primary) 85%, transparent);
    border: 1px solid var(--border-color);
    padding: 3px 10px;
    border-radius: 999px;
}

.msg-row {
    display: flex;
    gap: 9px;
    margin-bottom: 13px;
    align-items: flex-start;
}

.msg-row.send {
    flex-direction: row-reverse;
}

.msg-avatar {
    width: 34px;
    height: 34px;
    min-width: 34px;
    max-width: 34px;
    min-height: 34px;
    max-height: 34px;
    flex: 0 0 34px;
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    background: var(--info-color);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    flex-shrink: 0;
    overflow: hidden;
}

.msg-avatar > img {
    width: 100% !important;
    height: 100% !important;
    min-width: 100%;
    min-height: 100%;
    max-width: 100% !important;
    max-height: 100% !important;
    object-fit: cover;
    border-radius: 50%;
    flex: 0 0 100%;
}

.msg-main {
    max-width: min(72%, 760px);
}

.msg-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 0.7rem;
    color: var(--text-secondary);
    margin-bottom: 4px;
}

.msg-row.send .msg-meta {
    justify-content: flex-end;
}

.msg-name {
    font-weight: 600;
}

.msg-bubble {
    position: relative;
    padding: 9px 12px;
    border-radius: 13px;
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    word-break: break-word;
    box-shadow: 0 2px 8px var(--shadow-color);
}

.msg-row.recv .msg-bubble {
    border-top-left-radius: 4px;
}

.msg-row.send .msg-bubble {
    background: color-mix(in srgb, var(--accent-color) 18%, var(--bg-primary));
    border-color: color-mix(in srgb, var(--accent-color) 35%, var(--border-color));
    border-top-right-radius: 4px;
}

.msg-row.can-reply .msg-bubble {
    cursor: pointer;
}

.msg-row.can-reply .msg-bubble:hover {
    border-color: var(--accent-color);
}

.message-action-menu {
    position: fixed;
    z-index: 2000;
    min-width: 132px;
    padding: 6px;
    border-radius: 10px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    box-shadow: 0 8px 24px var(--shadow-color);
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.message-action-menu button {
    border: none;
    border-radius: 8px;
    padding: 8px 10px;
    background: transparent;
    color: var(--text-primary);
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.86rem;
}

.message-action-menu button:hover {
    background: color-mix(in srgb, var(--accent-color) 12%, var(--bg-primary));
    color: var(--accent-color);
}

.message-toast {
    position: fixed;
    left: 50%;
    bottom: 92px;
    z-index: 2100;
    transform: translateX(-50%);
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(0, 0, 0, .76);
    color: #fff;
    font-size: 0.78rem;
    pointer-events: none;
}

.msg-row.reply-selected .msg-bubble {
    outline: 2px solid var(--accent-color);
    background: color-mix(in srgb, var(--accent-color) 16%, var(--bg-primary));
}

.msg-md {
    line-height: 1.55;
}

.msg-md p {
    margin: 0.25rem 0;
}

.msg-md table {
    width: auto;
    max-width: 100%;
    font-size: 0.85rem;
}

.msg-md code {
    background: rgba(0,0,0,.12);
    padding: 1px 4px;
    border-radius: 4px;
}

.msg-raw {
    white-space: pre-wrap;
}

/* Markdown 代码块默认折叠 */
.md-code-fold {
    background: rgba(0, 0, 0, .12);
    border-radius: 8px;
    margin: 6px 0;
    overflow: hidden;
}

.md-code-fold summary {
    cursor: pointer;
    padding: 7px 9px;
    font-size: 0.78rem;
    color: var(--text-secondary);
    user-select: none;
}

.md-code-fold pre {
    margin: 0;
    padding: 8px;
    border-radius: 0;
    max-height: 360px;
    overflow: auto;
    background: rgba(0, 0, 0, .16);
}

.msg-extra {
    margin-top: 4px;
    font-size: 0.66rem;
    color: var(--text-secondary);
    opacity: 0.78;
}

.chat-date-row {
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.chat-date-row select {
    width: auto;
    min-width: 112px;
    max-width: 180px;
    padding: 3px 8px;
    font-size: 0.72rem;
    border-radius: 999px;
    background: var(--bg-primary);
}

.qq-header-tools {
    display: flex;
    align-items: center;
    gap: 5px;
}

.qq-header-tools button {
    width: 26px;
    height: 26px;
    border: none;
    border-radius: 50%;
    background: var(--bg-primary);
    color: var(--text-primary);
    box-shadow: 0 2px 6px var(--shadow-color);
    cursor: pointer;
    font-size: 0.72rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.qq-header-tools button:hover {
    background: var(--accent-color);
    color: #fff;
}

/* 输入区 */
.qq-composer {
    border-top: 1px solid var(--border-color);
    background: color-mix(in srgb, var(--bg-secondary) 96%, transparent);
    padding: 9px 10px;
}

.reply-bar {
    margin-bottom: 6px;
    background: color-mix(in srgb, var(--accent-color) 12%, var(--bg-primary));
    border-left: 4px solid var(--accent-color);
    border-radius: 8px;
    padding: 7px 9px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.82rem;
    color: var(--text-primary);
}

.reply-bar button {
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
}

.composer-collapsed {
    min-height: 42px;
    border-radius: 999px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 10px;
    cursor: text;
}

.composer-collapsed > span {
    flex: 1;
    color: var(--text-secondary);
    font-size: 0.9rem;
}

.composer-collapsed button {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--accent-color);
    color: white;
    cursor: pointer;
}

.media-toggle-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.media-count-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    min-width: 17px;
    height: 17px;
    padding: 0 4px;
    border-radius: 999px;
    background: var(--danger-color);
    color: #fff;
    border: 2px solid var(--bg-primary);
    font-size: 0.62rem;
    line-height: 13px;
    font-weight: 800;
    text-align: center;
    box-shadow: 0 1px 4px var(--shadow-color);
}

.composer-expanded {
    animation: fadeIn .18s ease-out;
}

.composer-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
}

.composer-mode-row {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    flex-wrap: wrap;
}

.mode-toggle-card {
    border: 1px solid var(--border-color);
    background: var(--bg-primary);
    color: var(--text-primary);
    border-radius: 999px;
    padding: 7px 13px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    font-size: 0.84rem;
    font-weight: 600;
    box-shadow: 0 2px 8px var(--shadow-color);
    transition: all .18s ease;
}

.mode-toggle-card:hover {
    border-color: var(--accent-color);
    color: var(--accent-color);
}

.mode-toggle-card.markdown {
    background: var(--accent-color);
    color: #fff;
    border-color: var(--accent-color);
}

.mode-toggle-card.markdown:hover {
    color: #fff;
    filter: brightness(0.96);
}

.mode-toggle-card.active-send-toggle.enabled {
    background: var(--warning-color);
    color: #fff;
    border-color: var(--warning-color);
}

.mode-toggle-card.active-send-toggle.enabled:hover {
    color: #fff;
    filter: brightness(0.96);
}

.media-summary-chip {
    border: 1px solid color-mix(in srgb, var(--accent-color) 45%, var(--border-color));
    background: color-mix(in srgb, var(--accent-color) 12%, var(--bg-primary));
    color: var(--accent-color);
    border-radius: 999px;
    padding: 6px 10px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 700;
}

.media-summary-chip strong {
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 999px;
    background: var(--accent-color);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.68rem;
    line-height: 1;
}

.preview-btn {
    display: none;
    border: none;
    border-radius: 999px;
    padding: 6px 12px;
    background: var(--bg-primary);
    color: var(--text-primary);
    cursor: pointer;
    border: 1px solid var(--border-color);
}

.preview-btn.show {
    display: inline-flex;
    gap: 6px;
    align-items: center;
}

#messageInput {
    resize: vertical;
    min-height: 54px;
    max-height: 140px;
    font-family: Consolas, Monaco, monospace;
}

.md-preview-box {
    min-height: 54px;
    max-height: 160px;
    overflow-y: auto;
    background: var(--bg-primary);
    border: 1px solid var(--accent-color);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 6px;
}

.hidden {
    display: none !important;
}

.media-panel {
    margin-top: 8px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 10px;
}

.media-type-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}

.media-type-row button {
    border: none;
    background: var(--bg-secondary);
    color: var(--text-primary);
    border-radius: 8px;
    padding: 10px 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: center;
    cursor: pointer;
}

.media-type-row button:hover {
    background: var(--accent-color);
    color: #fff;
}

.media-input-box {
    margin-top: 10px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
}

.media-current {
    grid-column: 1 / -1;
    font-size: 0.82rem;
    color: var(--text-secondary);
}

.media-current button {
    margin-left: 8px;
    border: none;
    background: transparent;
    color: var(--danger-color);
    cursor: pointer;
}

.msg-revoke-btn {
    margin-left: 6px;
    border: none;
    background: transparent;
    color: var(--danger-color);
    cursor: pointer;
    font-size: 0.72rem;
    padding: 0 4px;
}

.msg-revoke-btn:hover {
    text-decoration: underline;
}

.upload-btn {
    margin: 0;
    border: 1px solid var(--border-color);
    background: var(--bg-secondary);
    border-radius: 6px;
    padding: 0 12px;
    height: 40px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    min-width: 92px;
    justify-content: center;
}

.composer-actions {
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: center;
}

#sendHint {
    display: block;
    color: var(--text-secondary);
    font-size: 0.72rem;
    margin-top: 5px;
}

.empty-state {
    height: 100%;
    min-height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: var(--text-secondary);
}

/* 手机端：QQ 手机版逻辑 */
@media (max-width: 768px) {
    .qq-page {
        height: calc(100dvh - 88px);
        min-height: 0;
    }

    .qq-shell {
        display: block;
        border-radius: 0;
        height: 100%;
    }

    .qq-session-pane,
    .qq-chat-pane {
        width: 100%;
        height: 100%;
    }

    .qq-chat-pane {
        display: none;
    }

    .qq-shell.mobile-chat-open .qq-session-pane {
        display: none;
    }

    .qq-shell.mobile-chat-open .qq-chat-pane {
        display: flex;
    }

    .mobile-back {
        display: block;
    }

    .qq-chat-header {
        min-height: 54px;
        padding: 5px 8px;
        gap: 8px;
    }

    .qq-chat-avatar {
        width: 32px;
        height: 32px;
        font-size: 0.8rem;
    }

    .mobile-back {
        font-size: 1rem;
        width: 26px;
        height: 30px;
        flex-shrink: 0;
    }

    .qq-chat-title {
        font-size: 0.9rem;
    }

    .qq-chat-subtitle {
        font-size: 0.66rem;
    }

    .chat-date-row {
        margin-top: 2px;
        gap: 5px;
    }

    .chat-date-row select {
        min-width: 92px;
        max-width: 150px;
        padding: 2px 7px;
        font-size: 0.66rem;
    }

    .msg-main {
        max-width: 84%;
    }

    .qq-message-list {
        padding: 8px 7px 6px;
    }

    .msg-date-divider {
        margin: 7px 0;
    }

    .msg-date-divider span {
        padding: 2px 8px;
        font-size: 0.65rem;
    }

    .msg-row {
        gap: 7px;
        margin-bottom: 8px;
    }

    .msg-avatar {
        width: 28px;
        height: 28px;
        min-width: 28px;
        max-width: 28px;
        min-height: 28px;
        max-height: 28px;
        flex-basis: 28px;
        font-size: 0.68rem;
    }

    .msg-meta {
        gap: 4px;
        margin-bottom: 2px;
        font-size: 0.62rem;
        line-height: 1.2;
    }

    .msg-bubble {
        padding: 6px 9px;
        border-radius: 10px;
        font-size: 0.9rem;
        line-height: 1.42;
    }

    .msg-md {
        line-height: 1.42;
    }

    .msg-md p {
        margin: 0.12rem 0;
    }

    @media (max-width: 768px) {
        .qq-header-tools button {
            width: 24px;
            height: 24px;
            font-size: 0.66rem;
        }
    }

    .qq-composer {
        padding: 5px 6px calc(5px + env(safe-area-inset-bottom));
    }

    .reply-bar {
        margin-bottom: 4px;
        padding: 5px 7px;
        border-radius: 7px;
        font-size: 0.74rem;
    }

    .composer-collapsed {
        min-height: 36px;
        gap: 6px;
        padding: 0 8px;
    }

    .composer-collapsed > span {
        font-size: 0.82rem;
    }

    .composer-collapsed button {
        width: 28px;
        height: 28px;
    }

    .media-count-badge {
        top: -5px;
        right: -5px;
        min-width: 16px;
        height: 16px;
        font-size: 0.58rem;
        line-height: 12px;
    }

    .composer-toolbar {
        gap: 5px;
        margin-bottom: 4px;
    }

    .composer-mode-row {
        gap: 5px;
    }

    .mode-toggle-card,
    .media-summary-chip,
    .preview-btn {
        padding: 5px 9px;
        font-size: 0.74rem;
        gap: 5px;
    }

    .composer-expanded textarea {
        min-height: 42px !important;
        max-height: 90px;
        padding: 0.55rem;
        font-size: 0.85rem;
    }

    .media-panel {
        margin-top: 5px;
        padding: 7px;
        border-radius: 8px;
    }

    .media-type-row {
        gap: 5px;
    }

    .media-type-row button {
        padding: 7px 4px;
        gap: 3px;
        font-size: 0.74rem;
    }

    .media-input-box {
        margin-top: 7px;
        gap: 6px;
    }

    .media-current {
        font-size: 0.74rem;
    }

    .upload-btn {
        height: 34px;
        min-width: 0;
        padding: 0 10px;
        font-size: 0.8rem;
    }

    #mediaUrl {
        padding: 0.55rem;
        font-size: 0.82rem;
    }

    .media-input-box {
        grid-template-columns: 1fr;
    }

    .composer-actions {
        flex-direction: row;
        align-items: center;
        margin-top: 6px;
    }

    .composer-actions > div {
        display: flex;
        gap: 6px;
    }

    .composer-actions .btn {
        flex: 1;
        padding: 0.42rem 0.7rem;
        font-size: 0.78rem;
    }

    #sendHint {
        display: none;
    }

    .msg-extra {
        margin-top: 2px;
        font-size: 0.58rem;
        line-height: 1.25;
    }
}

    .msg-bubble img,
    .msg-md img {

    .msg-row.send .msg-bubble img,

    .msg-image-fallback {

    }

    .msg-image.load-failed img {

    .msg-image.load-failed .msg-image-fallback {

    }
    
    @media (max-width: 768px) {
        .msg-bubble img,
        .msg-md img {
            max-width: min(220px, 100%);

        }

/* Rebuilt desktop QQ shell and mobile chat flow */
body.messages-layout {

    background:
        linear-gradient(135deg, #e8f3ff 0%, #f6fbff 46%, #edf7f2 100%);
}

body.messages-layout #particles-js {
    display: none;
}

body.messages-layout header {
    height: 54px;
    padding: 0 18px;
    background: rgba(255, 255, 255, 0.82);
    border-bottom: 1px solid rgba(114, 143, 170, 0.22);
    box-shadow: 0 8px 24px rgba(36, 74, 110, 0.08);
}

body.messages-layout .logo-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: #12b7f5;
    font-size: 1rem;
}

body.messages-layout .logo-text {
    font-size: 1.04rem;
}

body.messages-layout nav {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
}

body.messages-layout nav::-webkit-scrollbar {
    display: none;
}

body.messages-layout nav ul {
    gap: 4px;
    flex-wrap: nowrap;
    flex-shrink: 0;
}

body.messages-layout nav a,
body.messages-layout .settings-button {
    height: 34px;
    padding: 0 10px;
    border-radius: 6px;
    font-size: 0.84rem;
}

body.messages-layout .settings-dropdown {
    margin-left: 0;

body.messages-layout .container {

    max-width: none;
    height: calc(100vh - 54px);
    padding: 14px 18px;
    margin: 0;
}

const SCENE_LABELS = {
    group: "群消息",

    channel_group: "频道消息",
    channel_private: "频道私信",
};

function getStoredValue(key, fallback = '') {
    try {
        const value = localStorage.getItem(key);
        return value === null ? fallback : value;
    } catch (e) {
        return fallback;
    }
}

function setStoredValue(key, value) {
    try {
        localStorage.setItem(key, value);
    } catch (e) {}
}

function getQqShell() {
    return document.getElementById('qqShell') || document.querySelector('.qq-shell');
}

function syncMobileViewportHeight() {
    document.documentElement.style.setProperty('--xiuxian-vvh', `${window.innerHeight}px`);
}

window.addEventListener('resize', syncMobileViewportHeight, { passive: true });
window.addEventListener('orientationchange', () => {
    setTimeout(syncMobileViewportHeight, 120);
}, { passive: true });

function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, m => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[m]));
}

function fmtTime(s) {
    if (!s) return '';
    return String(s).replace('T', ' ').slice(0, 19);
}

function shortTime(s) {
    if (!s) return '';
    const x = fmtTime(s);
    const today = new Date().toISOString().slice(0, 10);
    if (x.startsWith(today)) return x.slice(11, 16);
    return x.slice(5, 16);
}

function getInitial(text, fallback = '?') {
    text = String(text || '').trim();
    return text ? text.slice(0, 1).toUpperCase() : fallback;
}

function isHttpUrl(url) {
    return /^https?:\/\//i.test(String(url || '').trim());
}

function renderAvatarImage(url) {
    return `<img class="avatar-img" src="${escapeHtml(url)}" alt="" loading="lazy">`;
}

function setChatAvatar(text, avatar) {
    const box = document.getElementById('chatAvatar');
    if (!box) return;

    if (isHttpUrl(avatar)) {
        box.innerHTML = renderAvatarImage(avatar);
    } else {
        box.innerText = text || '?';
    }
}

function sceneTargetKey(scene) {
    if (scene === 'group' || scene === 'channel_group') return 'group_id';
    return 'user_id';
}

function shouldStickToBottom(el, threshold = 120) {
    return (el.scrollHeight - el.scrollTop - el.clientHeight) <= threshold;
}

function scrollMessagesToBottom() {
    const box = document.getElementById('messageList');
    box.scrollTop = box.scrollHeight;
    hasUnreadWhileReadingHistory = false;
    hideUnreadHint();
}

function scrollMessagesToTop() {
    const box = document.getElementById('messageList');
    box.scrollTop = 0;
}

function getSessionKey(s) {
    return `${s.adapter || ''}__${s.scene || ''}__${s.target_id || ''}`;
}

function getMessageKey(row) {
    return String(row.message_id || row.id || `${row.created_at}_${row.user_id}_${row.content || ''}`);
}

function arraysEqual(a, b) {
    if (a === b) return true;
    if (!a || !b || a.length !== b.length) return false;
    for (let i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) return false;
    }
    return true;
}

function preserveScrollAfterRender(box, oldScrollTop, oldScrollHeight) {
    const newScrollHeight = box.scrollHeight;
    const delta = newScrollHeight - oldScrollHeight;
    box.scrollTop = oldScrollTop + delta;
}

function getSelectedMediaCount() {
    const type = document.getElementById('mediaType')?.value || mediaSendType;
    const url = document.getElementById('mediaUrl')?.value.trim() || '';
    const file = document.getElementById('mediaFile')?.files?.[0];

    return type && (url || file) ? 1 : 0;
}

function updateMediaBadge() {
    const count = getSelectedMediaCount();
    const badge = document.getElementById('mediaCountBadge');
    const chip = document.getElementById('mediaSummaryChip');
    const summaryCount = document.getElementById('mediaSummaryCount');
    const toggleBtn = document.getElementById('mediaToggleBtn');

    if (badge) {
        badge.innerText = String(count);
        badge.classList.toggle('hidden', count < 1);
    }

    if (chip) {
        chip.classList.toggle('hidden', count < 1);
    }

    if (summaryCount) {
        summaryCount.innerText = String(count);
    }

    if (toggleBtn) {
        toggleBtn.title = count > 0 ? `已选 ${count} 个媒体` : '发送媒体';
    }
}

function setMediaPanelOpen(open) {
    mediaPanelOpen = !!open;
    const panel = document.getElementById('mediaPanel');
    if (panel) {
        panel.classList.toggle('hidden', !mediaPanelOpen);

function showUnreadHint() {
    let hint = document.getElementById('newMessageHint');
    if (!hint) {
        hint = document.createElement('div');
        hint.id = 'newMessageHint';
        hint.innerHTML = `<i class="fas fa-arrow-down"></i> 有新消息`;
        hint.style.cssText = `
            position: absolute;

            cursor: pointer;
        `;
        hint.onclick = () => {
            scrollMessagesToBottom();
            hasUnreadWhileReadingHistory = false;
            hint.remove();
        };
        document.getElementById('chatPane').appendChild(hint);
    }
}

function hideUnreadHint() {
    const hint = document.getElementById('newMessageHint');
    if (hint) hint.remove();
}

function extractMarkdownPreviewText(text) {
    text = String(text || '');
    if (!text.includes('<markdown:MessageMarkdown')) return text;

    const m = text.match(/content=(['"])((?:\\.|(?!\1).)*)\1/s);
    if (!m) return text;

    let val = m[2] || '';
    val = val
        .replace(/\\\\/g, '\0')
        .replace(/\\r/g, '\r')
        .replace(/\\n/g, '\n')
        .replace(/\\t/g, '\t')
        .replace(/\\"/g, '"')
        .replace(/\\'/g, "'")
        .replace(/\0/g, '\\');

    return val;
}

function buildSessionPreview(s) {
    // 后端如果已经给了 last_preview，直接使用，避免 “昵称：昵称：内容”
    if (s.last_preview) {
        let preview = extractMarkdownPreviewText(s.last_preview);
        preview = stripQQFaceMarkup(preview);
        preview = String(preview).replace(/\r/g, ' ').replace(/\n/g, ' ').trim();
        if (!preview) preview = '[空消息]';
        if (preview.length > 60) preview = preview.slice(0, 60) + '...';
        return preview;
    }

    let raw = s.last_content || s.raw_message || '';
    raw = extractMarkdownPreviewText(raw);
    raw = stripQQFaceMarkup(raw);
    raw = String(raw).replace(/\r/g, ' ').replace(/\n/g, ' ').trim();

    if (!raw) raw = '[空消息]';
    if (raw.length > 60) raw = raw.slice(0, 60) + '...';

    if (s.scene === 'group' || s.scene === 'channel_group') {
        if (s.direction === 'send') return raw;

        const sender = s.username || s.nickname || s.user_id || '未知用户';

        // 防御：如果内容本身已经以 “昵称：” 开头，不再重复拼接
        if (raw.startsWith(`${sender}：`) || raw.startsWith(`${sender}:`)) {
            return raw;
        }

        return `${sender}：${raw}`;
    }

    return raw;
}

function renderMarkdown(text) {
    try {
        if (!window.marked) {
            return `<div class="msg-raw">${escapeHtml(text)}</div>`;
        }

        const renderer = new marked.Renderer();

        renderer.code = function(code, lang) {
            let codeText = code;
            let language = lang || 'code';

            if (typeof code === 'object' && code !== null) {
                codeText = code.text || code.raw || '';
                language = code.lang || 'code';
            }

            language = language || 'code';

            return `
                <details class="md-code-fold">
                    <summary>
                        <i class="fas fa-code"></i>
                        代码块 ${language ? `(${escapeHtml(language)})` : ''}
                    </summary>
                    <pre><code class="language-${escapeHtml(language)}">${escapeHtml(codeText)}</code></pre>
                </details>
            `;
        };

        const raw = marked.parse(String(text || ''), { renderer });
        const clean = window.DOMPurify ? DOMPurify.sanitize(raw) : raw;

        return `<div class="msg-md">${clean}</div>`;
    } catch (e) {
        return `<div class="msg-raw">${escapeHtml(text)}</div>`;
    }
}

function looksLikeMarkdown(text) {
    text = String(text || '');
    return /(^#{1,6}\s)|(\*\*.+\*\*)|(```)|(^[-*]\s)|(\$\$.+\$\$)|(\|.+\|)/m.test(text);
}

function normalizeAttachmentRepr(text) {
    text = String(text || '');
    const hadMessageSegmentRepr = /\b(?:Text|Attachment)\(/.test(text);

    text = text.replace(
        /Text\(type=['"]text['"],\s*data=\{([\s\S]*?)\}\)/g,
        function(full, dataBody) {
            return extractReprField(dataBody, 'text');
        }
    );

    /**
     * 兼容 Python / NoneBot repr：
     * Attachment(type='image', data={'url': 'https://xxx'})
     * Attachment(type="image", data={"url": "https://xxx"})
     * Attachment(type='file', data={'url': 'https://xxx'})
     *
     * data 内如果有其他字段，也尽量只提取 url。
     */
    text = text.replace(
        /Attachment\(type=['"]([^'"]+)['"],\s*data=\{([\s\S]*?)\}\)/g,
        function(full, type, dataBody) {
            const url = extractAttachmentUrlFromData(dataBody);
            if (!url) return '';

            return `<attachment[${type}]:${url}>`;
        }
    );

    text = text.replace(
        /\[(图片消息|语音消息|视频消息|文件消息|附件消息)\]\s*(https?:\/\/[^\s<>"']+)/g,
        function(full, label, url) {
            const typeMap = {
                '图片消息': 'image',
                '语音消息': 'audio',
                '视频消息': 'video',
                '文件消息': 'file',
                '附件消息': 'attachment'
            };
            return `<attachment[${typeMap[label] || 'attachment'}]:${normalizeLoggedHttpUrl(url)}>`;
        }
    );

    text = text.replace(
        /<attachment\[([^\]]+)\]:(https?:\/\/[^>]+)>/g,
        function(full, type, url) {
            return `<attachment[${type}]:${normalizeLoggedHttpUrl(url)}>`;
        }
    );

    if (hadMessageSegmentRepr) {
        text = cleanupMessageSegmentRepr(text);
    }

    return text;
}

function normalizeLoggedHttpUrl(url) {
    return String(url || '').replace(/\s+/g, '').trim();
}

function decodeReprString(value) {
    return String(value || '')
        .replace(/\\r/g, '\r')
        .replace(/\\n/g, '\n')
        .replace(/\\t/g, '\t')
        .replace(/\\'/g, "'")
        .replace(/\\"/g, '"')
        .replace(/\\\\/g, '\\');
}

function extractReprField(dataBody, field) {
    dataBody = String(dataBody || '');
    const escapedField = String(field).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const singleRe = new RegExp(`['"]${escapedField}['"]\\s*:\\s*'((?:\\\\.|[^'])*)'`);
    const doubleRe = new RegExp(`['"]${escapedField}['"]\\s*:\\s*"((?:\\\\.|[^"])*)"`);
    const match = dataBody.match(singleRe) || dataBody.match(doubleRe);
    return match ? decodeReprString(match[1]) : '';
}

function extractAttachmentUrlFromData(dataBody) {
    for (const field of ['url', 'file', 'path', 'src']) {
        const value = extractReprField(dataBody, field);
        if (/^https?:\/\//i.test(value)) {
            return normalizeLoggedHttpUrl(value);
        }
    }
    return '';
}

function cleanupMessageSegmentRepr(text) {
    let value = String(text || '').trim();

    if (value.startsWith('[') && value.endsWith(']')) {
        value = value.slice(1, -1).trim();
    }

    value = value.replace(/^\s*,\s*/, '');
    value = value.replace(/\s*,\s*$/, '');
    value = value.replace(/\s*,\s*(?=<attachment\[)/g, '\n');
    value = value.replace(/(<attachment\[[^\]]+\]:https?:\/\/[^>]+>)\s*,\s*/g, '$1\n');
    value = value.replace(/\n{3,}/g, '\n\n');

    return value.trim();
}

function decodeQQFaceExtText(ext) {
    try {
        let value = String(ext || '').replace(/\s+/g, '');
        value += '='.repeat((4 - value.length % 4) % 4);
        const binary = atob(value);
        const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
        const raw = new TextDecoder('utf-8').decode(bytes);
        const data = JSON.parse(raw);
        return String(data.text || '').trim();
    } catch (e) {
        return '';
    }
}

function stripQQFaceMarkup(text) {
    text = String(text || '');

    text = text.replace(
        /<faceType=\d+,\s*faceId=(?:"[^"]*"|'[^']*'|[^,>]+),\s*ext=(?:"([^"]*)"|'([^']*)'|([^>]+))>\s*/g,
        function(full, ext1, ext2, ext3) {
            const label = decodeQQFaceExtText(ext1 || ext2 || ext3 || '');
            return label ? `[表情:${label}]` : '';
        }
    );

    return text.replace(/\uFFFC/g, '').trim();
}

function buildMessageCopyText(text) {
    let value = stripQQFaceMarkup(normalizeAttachmentRepr(String(text || '')));
    value = value.replace(
        /<attachment\[([^\]]+)\]:(https?:\/\/[^>]+)>/g,
        function(full, type, url) {
            return `[${getAttachmentLabel(type)}] ${url}`;
        }
    );
    return value.trim();
}

function getAttachmentLabel(type) {
    type = String(type || '').toLowerCase();

    const labelMap = {
        image: '图片消息',
        file: '文件消息',
        audio: '语音消息',
        record: '语音消息',
        voice: '语音消息',
        video: '视频消息',
        attachment: '附件消息'
    };

    return labelMap[type] || `${type}附件`;
}

function shouldProxyImageUrl(url) {
    try {
        const parsed = new URL(String(url || '').trim());
        const host = parsed.hostname.toLowerCase();
        return host === 'multimedia.nt.qq.com.cn' || host.endsWith('.qpic.cn');
    } catch (e) {
        return false;
    }
}

function getImageRenderUrl(url) {
    url = String(url || '').trim();
    if (!shouldProxyImageUrl(url)) return url;
    return `/api/messages/media_proxy?url=${encodeURIComponent(url)}`;
}

function renderAttachmentHtml(type, url) {
    type = String(type || '').toLowerCase();
    url = String(url || '').trim();

    if (!url) return '';

    const safeUrl = escapeHtml(url);
    const safeImageUrl = escapeHtml(getImageRenderUrl(url));
    const label = escapeHtml(getAttachmentLabel(type));

    /**
     * 图片：用 Markdown 图片语法渲染
     */
    if (type === 'image') {
        return `
            <div class="msg-media msg-image">
                <img src="${safeImageUrl}" alt="${label}" loading="lazy" onerror="this.closest('.msg-image')?.classList.add('load-failed')">
                <a class="msg-image-fallback" href="${safeUrl}" target="_blank" rel="noopener noreferrer">打开图片链接</a>
            </div>
        `;
    }

    /**
     * 音频：直接播放器
     */
    if (type === 'audio' || type === 'record' || type === 'voice') {
        return `
            <div class="msg-media msg-audio">
                <div style="font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 4px;">
                    <i class="fas fa-microphone"></i> ${label}
                </div>
                <audio controls preload="none" style="max-width: 280px; width: 100%;">
                    <source src="${safeUrl}">
                    当前浏览器不支持音频播放
                </audio>
                <div style="margin-top: 4px;">
                    <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" style="font-size: 0.75rem;">
                        打开音频链接
                    </a>
                </div>
            </div>
        `;
    }

    /**
     * 视频：直接播放器
     */
    if (type === 'video') {
        return `
            <div class="msg-media msg-video">
                <div style="font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 4px;">
                    <i class="fas fa-video"></i> ${label}
                </div>
                <video controls preload="metadata" style="max-width: min(320px, 100%); max-height: 360px; border-radius: 10px; display: block;">
                    <source src="${safeUrl}">
                    当前浏览器不支持视频播放
                </video>
                <div style="margin-top: 4px;">
                    <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" style="font-size: 0.75rem;">
                        打开视频链接
                    </a>
                </div>
            </div>
        `;
    }

    /**
     * 文件：链接
     */
    if (type === 'file') {
        return `
            <div class="msg-media msg-file" style="margin-top: 6px;">
                <a href="${safeUrl}" target="_blank" rel="noopener noreferrer"
                   class="btn btn-info btn-sm"
                   style="display: inline-flex; align-items: center; gap: 6px;">
                    <i class="fas fa-file-download"></i>
                    ${label}
                </a>
            </div>
        `;
    }

    /**
     * 其他未知类型：附件链接
     */
    return `
        <div class="msg-media msg-attachment" style="margin-top: 6px;">
            <a href="${safeUrl}" target="_blank" rel="noopener noreferrer"
               class="btn btn-info btn-sm"
               style="display: inline-flex; align-items: center; gap: 6px;">
                <i class="fas fa-paperclip"></i>
                ${label}
            </a>
        </div>
    `;
}

function renderPlainWithAttachments(text) {
    text = stripQQFaceMarkup(normalizeAttachmentRepr(String(text || '')));

    const re = /<attachment\[([^\]]+)\]:(https?:\/\/[^>]+)>/g;

    let html = '';
    let lastIndex = 0;
    let match;

    while ((match = re.exec(text)) !== null) {
        const before = text.slice(lastIndex, match.index);

        /**
         * 附件前的普通文字：
         * 如果像 Markdown，就按 Markdown 渲染；
         * 否则安全 escape 后保留换行。
         */
        if (before) {
            if (looksLikeMarkdown(before)) {
                html += renderMarkdown(before);
            } else {
                html += `<div class="msg-raw">${escapeHtml(before)}</div>`;
            }
        }

        html += renderAttachmentHtml(match[1], match[2]);

        lastIndex = re.lastIndex;
    }

    const rest = text.slice(lastIndex);
    if (rest) {
        if (looksLikeMarkdown(rest)) {
            html += renderMarkdown(rest);
        } else {
            html += `<div class="msg-raw">${escapeHtml(rest)}</div>`;
        }
    }

    return `<div class="msg-attachment-wrap">${html}</div>`;
}

function renderMessageContent(text) {
    text = stripQQFaceMarkup(normalizeAttachmentRepr(String(text || '')));

    /**
     * 只要包含附件标记，就统一走附件渲染。
     */
    if (/<attachment\[[^\]]+\]:https?:\/\/[^>]+>/.test(text)) {
        return renderPlainWithAttachments(text);
    }

    /**
     * 兼容 Attachment(...) 还没被正常转成 attachment token 的情况。
     */
    if (/Attachment\(type=['"][^'"]+['"],\s*data=\{[\s\S]*?['"]url['"]\s*:\s*['"]https?:\/\/[^'"]+['"][\s\S]*?\}\)/.test(text)) {
        return renderPlainWithAttachments(text);
    }

    /**
     * 原有 Markdown 正常渲染。
     */
    if (looksLikeMarkdown(text)) {
        return renderMarkdown(text);
    }

    /**
     * 普通文本安全显示。
     */
    return `<div class="msg-raw">${escapeHtml(text)}</div>`;
}

function hasRenderableAttachment(text) {
    text = stripQQFaceMarkup(normalizeAttachmentRepr(String(text || '')));
    return /<attachment\[[^\]]+\]:https?:\/\/[^>]+>/.test(text);
}

/**
 * 刷新当前会话，让旧消息立即用新渲染逻辑显示。
 */
function rerenderCurrentMessagesAfterAttachmentPatch() {
    try {
        if (typeof currentSession !== 'undefined' && currentSession) {
            lastRenderedMessageKeys = [];
            loadMessages(false, false);
        }
    } catch (e) {
        console.warn('附件渲染补丁刷新失败:', e);
    }
}

async function loadSessions(silent = false) {
    const scene = document.getElementById('sceneSelect').value;
    const adapter = document.getElementById('adapterSelect').value;
    const list = document.getElementById('sessionList');

    if (!silent) {
        list.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-spin"></i> 正在加载会话...</div>`;
    }

    try {
        const qs = new URLSearchParams({ scene });
        if (adapter) qs.set('adapter', adapter);

        const res = await fetch('/api/messages/sessions?' + qs.toString());
        const data = await res.json();

        if (!data.success) {
            if (!silent) {
                list.innerHTML = `<div class="error">加载失败：${escapeHtml(data.error || '未知错误')}</div>`;
            }
            return;
        }

        const newRows = data.rows || [];

        newRows.forEach(s => {
            if (!s.title || String(s.title).trim().toLowerCase() === 'bot') {
                s.title = s.target_id || '未知会话';
            }
            s.last_preview = buildSessionPreview(s);
        });

        const newKeys = newRows.map(getSessionKey);

        if (silent && arraysEqual(lastRenderedSessionKeys, newKeys)) {
            sessionsCache = newRows;
            return;
        }

        const oldScrollTop = list.scrollTop;

        sessionsCache = newRows;
        lastRenderedSessionKeys = newKeys;

        if (!sessionsCache.length) {
            list.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无会话</p></div>`;
            return;
        }

        list.innerHTML = sessionsCache.map((s, idx) => {
            const active = currentSession &&
                currentSession.scene === s.scene &&
                currentSession.target_id === s.target_id &&
                currentSession.adapter === s.adapter;

            const title = s.title || s.target_id || '未知会话';
            const sessionAvatar = isHttpUrl(s.avatar)
                ? renderAvatarImage(s.avatar)
                : escapeHtml(s.avatar_text || getInitial(title));

            return `
                <div class="session-item ${active ? 'active' : ''}" onclick="selectSession(${idx})">
                    <div class="session-avatar">${sessionAvatar}</div>
                    <div class="session-info">
                        <div class="session-title-row">
                            <div class="session-title">${escapeHtml(title)}</div>
                            <div class="session-time">${escapeHtml(shortTime(s.last_time))}</div>
                        </div>
                        <div class="session-meta">${escapeHtml(s.last_preview || s.target_id || '')}</div>
                    </div>
                </div>
            `;
        }).join('');

        if (silent) {
            list.scrollTop = oldScrollTop;
        }
    } catch (e) {
        if (!silent) {
            list.innerHTML = `<div class="error">请求异常：${escapeHtml(e)}</div>`;
        }
    }
}

function selectSession(index) {
    const s = sessionsCache[index];
    if (!s) return;

    lastRenderedMessageKeys = [];
    hideUnreadHint();
    hasUnreadWhileReadingHistory = false;

    currentSession = {
        adapter: s.adapter || document.getElementById('adapterSelect').value || '',
        scene: s.scene,
        target_id: s.target_id,
        title: s.title || s.target_id,
        avatar_text: s.avatar_text || getInitial(s.title || s.target_id),
        avatar: s.avatar || ''
    };

    selectedReplyMessageId = '';
    selectedReplyRowId = '';

    setChatAvatar(currentSession.avatar_text || '?', currentSession.avatar);
    document.getElementById('chatTitle').innerText = currentSession.title || '未知会话';
    document.getElementById('chatSubTitle').innerText =
        `${currentSession.adapter || '全部适配器'} ｜ ${SCENE_LABELS[currentSession.scene] || currentSession.scene} ｜ ${currentSession.target_id}`;

    document.getElementById('sendBtn').disabled = false;
    document.getElementById('sendMediaBtn').disabled = false;
    updateSendHint();

    const shell = getQqShell();
    if (shell) shell.classList.add('mobile-chat-open');

    loadSessions(true);
    loadMessageDates().then(() => loadMessages(true, false));
}
