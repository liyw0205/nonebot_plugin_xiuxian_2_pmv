name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: Optional release tag
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select release tag
        id: tag
        env:
          REQUESTED_TAG: ${{ inputs.tag_name }}
        run: |
          if [ -n "$REQUESTED_TAG" ]; then
            tag_name="$REQUESTED_TAG"
          else
            tag_name="v$(TZ=Asia/Shanghai date +%Y%m%d%H%M%S)"
          fi
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Build source archive
        run: git archive --format=tar.gz --output=project.tar.gz HEAD

      - name: Prepare release notes
        run: git log -1 --pretty=%B > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        run: |
          gh release create "$TAG_NAME" project.tar.gz \
            --target "$GITHUB_SHA" \
            --title "Release $TAG_NAME" \
            --notes-file release-notes.md
